<!DOCTYPE html>

<head>
  <meta charset="UTF-8">
  <title>Bibi 4</title>
   <link rel="stylesheet" href="image.css">

  <style>
   
    @font-face {
      font-family: 'Lex';
      src: url('fonts/Lexend_Regular.ttf') format('truetype');
    }

    body {
      font-family: 'Lex', sans-serif;
    }

    svg {
      border: none;
    }

    /* Allgemeine hover/focus-Stile */
    a:hover > path,
    a:hover > rect {
      fill: rgba(65, 65, 65, 0.7) !important;
    }

    a:focus { outline: none; }
    a:focus-visible > path,
    a:focus-visible > rect {
      stroke: black;
      fill: rgba(65, 65, 65, 0.2);
      stroke-width: 3px;
      outline-offset: 4px;
      filter: drop-shadow(0 0 6px rgb(0, 0, 0)) drop-shadow(0 0 6px rgb(0, 0, 0));
    }

    /* Wesen-Hitbereich: transparent, aber anklickbar */
    #wesen-link > path {
      fill: transparent;
      pointer-events: all;
    }

    #wesen-link:hover > path,
    #wesen-link:focus-visible > path {
      fill: rgba(65, 65, 65, 0.7) !important;
    }

    /* Dialog */
    #dialog-overlay {
      display: none;
      position: fixed;
      inset: 0;
      z-index: 100;
    }

    #dialog-overlay.open {
      display: block;
    }

    #dialog-svg {
      position: fixed;
      inset: 0;
      width: 100vw;
      height: 100vh;
    }

    .d-weiter-btn,
    .d-zu-btn {
      cursor: pointer;
    }

    a.d-zu-btn > path {
      pointer-events: all;
    }

    a.d-weiter-btn > path {
      fill: transparent;
      pointer-events: all;
    }

    a.d-weiter-btn:hover > path,
    a.d-weiter-btn:focus-visible > path {
      fill: rgba(65, 65, 65, 0.7) !important;
    }
  </style>
</head>

<body>
