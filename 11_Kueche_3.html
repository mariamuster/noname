<!DOCTYPE html>
<html lang="de">

<head>
  <meta charset="UTF-8">
  <title>Hinweise Küche</title>
  <link rel="stylesheet" href="image.css">
  <link rel="stylesheet" href="icons.css">
  <style>
    @font-face {
      font-family: 'Lex';
      src: url('fonts/Lexend_Regular.ttf') format('truetype');
    }

    body {
      font-family: 'Lex', sans-serif;
    }

    a:hover>path,
    a:hover>rect {
      fill: rgba(65, 65, 65, 0.7) !important;
    }

    a:focus-visible {
      outline: none;
    }

    a:focus-visible>path,
    a:focus-visible>rect {
      stroke: #005fcc;
      fill: rgba(0,95,204,0.08);
      stroke-width: 3px;
      filter: drop-shadow(0 0 4px #005fcc) drop-shadow(0 0 8px rgba(0,95,204,0.4));
    }

    a.d-zu-btn>path {
      pointer-events: all;
    }

    a.d-weiter-btn>path {
      fill: transparent;
      pointer-events: all;
    }

    a.d-weiter-btn:hover>path,
    a.d-weiter-btn:focus-visible>path {
      fill: rgba(65, 65, 65, 0.7) !important;
    }

    #dialog-overlay {
      display: none;
      position: fixed;
      inset: 0;
      z-index: 100;
    }

    #dialog-overlay.open {
      display: block;
    }

    #dialog-svg {
      position: fixed;
      inset: 0;
      width: 100vw;
      height: 100vh;
    }

    .d-weiter-btn,
    .d-zu-btn {
      cursor: pointer;
    }

    /* Pfeil-Link */
    #pfeil-link {
      cursor: pointer;
    }

    #pfeil-link>path {
      pointer-events: all;
    }

    #pfeil-link:focus {
      outline: none;
    }
  </style>
</head>

<body>
  <div class="room-wrapper">
    <img src="img/11_Kueche_2.svg"
      alt="Eine Küche mit Ablage, Herd, Spülbecken und vielen Schränken, links ein Kühlschrank. In einer Pfanne brät ein Omelett. Auf der Ablage rechts neben dem Herd sitzt ein dunkelgelbes Wesen. Rechts zeigt ein türkisfarbener Pfeil aus dem Bildschirm hinaus."
      class="responsive-img" tabindex="0" />
    <svg class="room-overlay" viewBox="0 0 1600 900" fill="none" xmlns="http://www.w3.org/2000/svg">


      <!-- Pfeil -->
      <a id="pfeil-link" aria-label="Küche verlassen" tabindex="0" role="button"
        style="visibility:visible;pointer-events:all;">
        <g aria-hidden="true">
          <path style="fill:aqua;stroke:#000;stroke-linecap:round;stroke-linejoin:round;stroke-width:3px;"
d="M1509.06,490.19s-82.37,91.48-101.69,114.99c0-21.5-1.28-40.27,0-61.78-32.98-1.46-62.87,0-62.87,0v-105.88s29.34-3.28,62.87,0c-.36-20.05-.73-42.28,0-62.51l101.69,114.99v.18h0Z"/>
        </g>
        <path style="fill:transparent;pointer-events:all;"
d="M1509.06,490.19s-82.37,91.48-101.69,114.99c0-21.5-1.28-40.27,0-61.78-32.98-1.46-62.87,0-62.87,0v-105.88s29.34-3.28,62.87,0c-.36-20.05-.73-42.28,0-62.51l101.69,114.99v.18h0Z"/>
      </a>

    </svg>
  </div>





  <!-- ════════════════════════════════════════════════════════════
       ICONS
  ════════════════════════════════════════════════════════════ -->
  <script>
    window.LEVEL_CONFIG = {
      hilfeUrl: '11_Kueche_3H.html',
      menuUrl: 'levels.html'
    };
  </script>
  <script src="icons.js"></script>

<script>
(function() {
  var btn_11_Kueche_4_html = document.getElementById("pfeil-link");
  if (btn_11_Kueche_4_html) {
    btn_11_Kueche_4_html.addEventListener("click", function() { window.location.href = "11_Kueche_4.html"; });
  }
  document.addEventListener("keydown", function(e) {
    if (e.key !== "Enter" && e.key !== " ") return;
    if (btn_11_Kueche_4_html && document.activeElement === btn_11_Kueche_4_html) {
      e.preventDefault(); window.location.href = "11_Kueche_4.html"; return;
    }
  });
})();
</script>
</body>

</html>
