  <style>
    @font-face {
      font-family: 'Lexend';
      src: url('fonts/Lexend-Regular.ttf') format('truetype');
    }

    *,
    *::before,
    *::after {
      box-sizing: border-box;
      margin: 0;
      padding: 0;
    }

    body {
      font-family: 'Lex', sans-serif;
      background: #ffffff;
      min-height: 100vh;
    }

    .room-wrapper {
      position: relative;
      width: 100%;
      max-width: 1600px;
      margin: 0 auto;
    }

    /* Dialog SVG */
    #dialog-svg {
      position: fixed;
      inset: 0;
      width: 100vw;
      height: 100vh;
      pointer-events: none;
    }

    .d-feld {
      fill: #fff;
      stroke: #1d1e1c;
      stroke-width: 3px;
      stroke-linecap: round;
      stroke-linejoin: round;
    }

    .d-zu-shape {
      fill: #fff;
      stroke: #000;
      stroke-width: 3px;
      stroke-miterlimit: 10;
      pointer-events: all;
    }

    .d-zu-btn {
      cursor: pointer;
      pointer-events: all;
    }

    .d-zu-btn:focus {
      outline: none;
    }

    .d-zu-btn:focus-visible .d-zu-shape {
      stroke: #000;
      filter: drop-shadow(0 0 6px #000);
    }

    .d-zu-btn:hover .d-zu-shape {
      fill: rgba(65, 65, 65, 0.12);
    }
  </style>
</head>
