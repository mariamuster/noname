<script>
(function() {
  var btn_7_Lift_3_html = document.querySelector('[aria-label="Zu den Knöpfen"][role="button"]');
  if (btn_7_Lift_3_html) {
    btn_7_Lift_3_html.addEventListener("click", function() { window.location.href = "7_Lift_3.html"; });
  }
  document.addEventListener("keydown", function(e) {
    if (e.key !== "Enter" && e.key !== " ") return;
    if (btn_7_Lift_3_html && document.activeElement === btn_7_Lift_3_html) {
      e.preventDefault(); window.location.href = "7_Lift_3.html"; return;
    }
  });
})();
