<!DOCTYPE html>
<html lang="de">

<head>
  <meta charset="UTF-8">
  <title>Küche 3</title>
  <link rel="stylesheet" href="button.css">
  <link rel="stylesheet" href="image.css">
  <link rel="stylesheet" href="dialog.css">
  <style>
    @font-face {
      font-family: 'Lex';
      src: url('fonts/Lexend_Regular.ttf') format('truetype');
    }

    body {
      font-family: 'Lex', sans-serif;
    }
             a:hover>path,
a:hover>rect {
  fill: rgba(65, 65, 65, 0.7) !important;
}

a:focus { outline: none; }
a:focus-visible>path,
a:focus-visible>rect {
  stroke: black;
  fill: rgba(65, 65, 65, 0.2);      
  stroke-width: 3px;
  outline-offset: 4px;
  filter: drop-shadow(0 0 6px rgb(0, 0, 0)) drop-shadow(0 0 6px rgb(0, 0, 0));
}

    a.d-zu-btn>path {
      pointer-events: all;
    }

    a.d-weiter-btn>path {
      fill: transparent;
      pointer-events: all;
    }

    a.d-weiter-btn:hover>path,
    a.d-weiter-btn:focus-visible>path {
      fill: rgba(65, 65, 65, 0.15) !important;
    }

    #dialog-overlay {
      display: none;
      position: fixed;
      inset: 0;
      z-index: 100;
    }

    #dialog-overlay.open {
      display: block;
    }

    #dialog-svg {
      position: fixed;
      inset: 0;
      width: 100vw;
      height: 100vh;
    }

    .d-weiter-btn,
    .d-zu-btn {
      cursor: pointer;
    }
  </style>
</head>

<body>
  <div class="room-wrapper">
    <img src="img/5_Küche_2.svg" alt="Grundriss eines Raums mit Türen zu den Bereichen Vor, Da, Hallo und Zurück."
      class="responsive-img" tabindex="0" />
    <svg class="room-overlay" viewBox="0 0 1600 900" fill="none" xmlns="http://www.w3.org/2000/svg">
      <!-- Wesen -->
      <a href="#" id="wesen-link" aria-label="Wesen" aria-haspopup="dialog" role="button">
        <path
          d="M1009.1,413.4c24.2,22.4,3.4,62-28.4,56.2-20.2,23-2.1,62.3-16.5,57.3-4.6-5.8-1.6-19.5-1.9-26.9-1.9-11.2,2.7-20.5,8.9-29.7-6.1,4.2-15.9,7-22.9,3.8-11.5,13.8-7.4,32.5-7.9,49.1,0,4.2-6.5,6.3-7.8,1.7-2-11.1-.7-22.9-1-34.2,0-7.2,5.3-12.8,7.9-19.2-13.5-5.7-20.9-22.5-17.5-36.6-23.1-22.3,3.4-61.3,32.9-53.1,19.2-21.9,62,4.2,52,30.8,0,0,1.6.7,2.1,1h0l.1-.2Z" />
        <text class="room-label" x="920" y="360">Danke</text>
      </a>

      <!-- Tür -->
      <a href="5_Küche_4.html" aria-label="Weiter" role="button">
        <path id="STROKE_b53cb0b5-3318-44d8-a481-cecd8dc350b51" data-name="STROKE b53cb0b5-3318-44d8-a481-cecd8dc350b51"
          class="cls-1"
          d="M1459,950.7c22.6,28.1,75.5,86,75.5,86-1.9-125.4,4.3-245.9,5.2-371.2,2-170-3.2-335.8,3.7-505.7l-147.8,52.4c-1.3,117.3-6,232.8-2.7,350.1-2.3,105.1-6.7,204-3,309.1,0,0,35.7,39.7,69.2,79.3h-.1Z" />
        <text class="room-label" x="19%" y="45%"></text>
      </a>
    </svg>
  <!-- Pfeil overlay — shown after dialog is closed -->
    <svg id="pfeil-overlay" viewBox="0 0 1600 900" preserveAspectRatio="xMidYMid meet"
      style="position:absolute;inset:0;width:100%;height:100%;pointer-events:none;display:none;">
      <path style="fill:aqua;stroke:#000;stroke-linecap:round;stroke-linejoin:round;stroke-width:3px;"
        d="M1538.7,449.9s-49.9,55.6-61.8,70c0-13-.7-24.5,0-37.5-20.1-.9-38.2,0-38.2,0v-64.3s17.9-2,38.2,0c-.4-12.1-.4-25.8,0-38l61.8,70h0v-.2Z"/>
    </svg>
  </div>

  <!-- Dialog-Overlay -->
  <div id="dialog-overlay" aria-hidden="true">
    <svg id="dialog-svg" viewBox="0 0 1600 900" preserveAspectRatio="xMidYMid meet" xmlns="http://www.w3.org/2000/svg"
      role="dialog" aria-modal="true" tabindex="-1">
      <defs>
        <style>
          .d-feld {
            fill: #fff;
            stroke: #1d1e1c;
            stroke-width: 3px;
            stroke-linecap: round;
            stroke-linejoin: round;
          }

          .d-btn-shape {
            fill: #fff;
            stroke: #1d1e1c;
            stroke-width: 3px;
            stroke-linecap: round;
            stroke-linejoin: round;
          }

          .d-zu-shape {
            fill: #fff;
            stroke: #000;
            stroke-width: 3px;
            stroke-miterlimit: 10;
          }
        </style>
      </defs>

      <rect width="1600" height="900" fill="rgba(0,0,0,0)" />

      <g id="dlg-1" visibility="hidden" transform="translate(0,-370)">
        <path class="d-feld"
          d="M1450,603.2c-.4-10.5-399,8.8-613.1,3.2-235.4,3.5-686.9-2.1-686.9-2.1,12.6,47.4-2.3,96.7,8.5,144.4,1.8,23.9-7.4,117.9-7.4,117.9,252.4,10.3,506.1-7.2,758.8,5.1,169.1-13.7,531.7-7.9,531.7-7.9,0,0-2.7-170.6,8.5-260.6Z" />

        <a class="d-zu-btn" href="#" id="dlg1-zu" role="button" aria-label="Dialog schliessen">
          <path class="d-zu-shape"
            d="M172.3,544.5c-11.5-9.2-28.2-2.6-38.4,3.9-24.3,11.8-33.3,52.6-11.5,71.1,21.8,17.1,56.3,13.2,70.4-11.8,16.6-26.3,2.6-48.7-20.5-63.2Z" />
          <text font-family="Lex,sans-serif" font-size="40" fill="#000" text-anchor="middle" x="153" y="600">✕</text>
        </a>

        <a class="d-weiter-btn" href="#" id="dlg1-weiter" role="button" aria-label="Weiter">
          <path class="d-btn-shape"
            d="M1192,841.7c70.8-2.1,141.4.4,212.2-3.5l4.7-56.1c-33.8-9.6-74.7,1.1-109.2.6-41.5,0-65-2.3-108.7-.8l1.1,59.8Z" />
          <text font-family="Lex,sans-serif" font-size="25" fill="#000" text-anchor="middle" x="1300"
            y="820">Weiter</text>
        </a>

        <text id="dlg1-line1" font-family="Lex,sans-serif" font-size="40" fill="#000" visibility="hidden" x="0"
          y="720"></text>
      </g>
    </svg>
  </div>

  <script>
    const DIALOGS = [
      {
        group: 'dlg-1',
        weiterId: 'dlg1-weiter',
        lines: ['dlg1-line1'],
        endX: { end: 1300, start: 300 },
        conversation: [
          { text: 'Ist das alles?', align: 'end' },
          { text: 'Ja! Danke!', align: 'start' },
          { text: 'Kann ich dir sonst noch etwas helfen?', align: 'end' },
          { text: 'Nein danke, den Rest schaff ich allein.', align: 'start' },
        ],
      },
    ];

    let convStep = 0;
    let openerLink = null;

    const overlay = document.getElementById('dialog-overlay');
    const dlgSvg = document.getElementById('dialog-svg');

    function renderLines(def) {
      const entry = def.conversation[convStep - 1];
      const lineEl = document.getElementById(def.lines[0]);
      lineEl.textContent = entry.text;
      lineEl.setAttribute('text-anchor', entry.align === 'end' ? 'end' : 'start');
      lineEl.setAttribute('x', entry.align === 'end' ? def.endX.end : def.endX.start);
      lineEl.setAttribute('visibility', 'visible');

      const w = document.getElementById(def.weiterId);
      if (w) w.setAttribute('visibility', convStep >= def.conversation.length ? 'hidden' : 'visible');
    }

    function openDialog(opener) {
      openerLink = opener;
      convStep = 1;
      const def = DIALOGS[0];
      document.getElementById(def.group).setAttribute('visibility', 'visible');
      renderLines(def);
      overlay.classList.add('open');
      overlay.setAttribute('aria-hidden', 'false');
      dlgSvg.focus();
    }

    function closeDialog() {
      overlay.classList.remove('open');
      overlay.setAttribute('aria-hidden', 'true');
      document.getElementById(DIALOGS[0].group).setAttribute('visibility', 'hidden');
      convStep = 0;
      if (openerLink) openerLink.focus();
      document.getElementById('pfeil-overlay').style.display = '';
    }

    function advanceConversation() {
      const def = DIALOGS[0];
      if (convStep < def.conversation.length) {
        convStep++;
        renderLines(def);
      } else {
        closeDialog();
      }
    }

    document.getElementById('wesen-link').addEventListener('click', function (e) {
      e.preventDefault();
      openDialog(this);
    });

    dlgSvg.addEventListener('click', function (e) {
      if (e.target.closest('.d-weiter-btn')) { e.preventDefault(); advanceConversation(); return; }
      if (e.target.closest('.d-zu-btn')) { e.preventDefault(); closeDialog(); return; }
    });

    document.addEventListener('keydown', function (e) {
      if (!overlay.classList.contains('open')) return;
      if (e.key === 'Escape') { closeDialog(); return; }
      if (e.key === 'Tab') {
        const focusable = Array.from(dlgSvg.querySelectorAll('a[role="button"]')).filter(el => {
          let p = el.parentElement;
          while (p && p !== dlgSvg) {
            if (p.getAttribute('visibility') === 'hidden') return false;
            p = p.parentElement;
          }
          return true;
        });
        if (!focusable.length) { e.preventDefault(); return; }
        const first = focusable[0], last = focusable[focusable.length - 1];
        if (e.shiftKey) { if (document.activeElement === first) { e.preventDefault(); last.focus(); } }
        else { if (document.activeElement === last) { e.preventDefault(); first.focus(); } }
      }
    });
  </script>
</body>

</html>
