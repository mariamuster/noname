<!DOCTYPE html>
<html lang="de">

<head>
  <meta charset="UTF-8">
  <title>Hinweise Lift</title>
  <link rel="stylesheet" href="image.css">
  <link rel="stylesheet" href="icons.css">
  <style>
    @font-face {
      font-family: 'Lex';
      src: url('fonts/Lex.ttf') format('truetype');
    }

    body {
      font-family: 'Lex', sans-serif;
    }

    svg {
      border: none;
    }

    a:hover>path,
    a:hover>rect {
      fill: rgba(65, 65, 65, 0.7) !important;
    }

    a:focus-visible {
      outline: none;
    }

    a:focus-visible>path,
    a:focus-visible>rect {
      stroke: #005fcc;
      fill: rgba(0,95,204,0.08);
      stroke-width: 3px;
      filter: drop-shadow(0 0 4px #005fcc) drop-shadow(0 0 8px rgba(0,95,204,0.4));
    }

    #bild-small {
      cursor: pointer;
    }

    #bild-small>path {
      fill: transparent;
      pointer-events: all;
    }

    #bild-small:hover>path {
      fill: rgba(65, 65, 65, 0.7);
    }

    #bild-small:focus {
      outline: none;
    }

    #bild-small:focus-visible>path {
      stroke: black;
      fill: rgba(65, 65, 65, 0.2);
      stroke-width: 3px;
      filter: drop-shadow(0 0 6px rgb(0, 0, 0)) drop-shadow(0 0 6px rgb(0, 0, 0));
    }

    #zu-button {
      cursor: pointer;
    }

    #zu-button:hover .zu-circle {
      fill: rgba(65, 65, 65, 0.7) !important;
    }

    #zu-button:focus {
      outline: none;
    }

    #zu-button:focus-visible .zu-circle {
      stroke: rgb(255, 11, 11);
      fill: rgba(65, 65, 65, 0.7);
      stroke-width: 3px;
      filter: drop-shadow(0 0 6px rgb(0, 0, 0)) drop-shadow(0 0 6px rgb(0, 0, 0));
    }

    .text-box {
      font-family: 'Lex', sans-serif;
      font-size: 2.5rem;
      padding: 0px;
      width: 100%;
      height: 100%;
      overflow-y: auto;
      box-sizing: border-box;
      background: transparent;
      color: #fff;
      word-break: break-word;
    }
  </style>
</head>

<body>
  <div class="room-wrapper">
    <img src="img/12_Lift_1.svg"
      alt="Ein Eingangsbereich. Links eine Tür, in der Mitte eine Lifttür mit Knopf rechts  davon und rechts eine blaue Fläche an der Wand."
      class="responsive-img" tabindex="0" />

    <svg class="room-overlay" viewBox="0 0 1600 900" fill="none" xmlns="http://www.w3.org/2000/svg">

      <g id="bild-small" role="button" tabindex="0" aria-label="Blaues Rechteck">
        <path
          d="M1419,125.7c-16,1.8-31.9,2.2-48.1,2.9-23.1,2.2-45.6,2.2-68.7,3.6-18.3,1.6-36.6,5.5-54.9,5.5-11,.7-34.8.7-34.8.7-.3,12.4-3.1,19.6-3.4,32.5-.7,20.3,1.6,38.9,1.8,59.5,2,45.7,3.4,92.1,1.5,137.7-.3,22.8,0,48.8,1.1,71.7.3,22-2.3,67.1-2.3,67.1,56.8,2.7,114.9,10.1,171.9,10.8,31.6.8,59.6,7.2,91.5,6.2,0,0-2.6-105.7-2.8-157.7.4-87.3,4.9-151.4.8-244.3,0,0-25.9.8-53.7,4v-.2h.1Z" />
      </g>

      <g id="bild-panel" aria-hidden="true">
        <path style="fill:#2323ff; stroke:#000; stroke-linecap:round; stroke-linejoin:round; stroke-width:3px;"
          d="M975.2,130.6c-36.2,2.9-72.2-1.1-108.8,0-52.3,3.5-103.2-2.3-155.5,0-41.4,2.6-82.8,0-124.2,0-24.9,1.1-78.7,0-78.7,0-.7,19.9-7,52-7.7,72.7-1.6,32.7,3.6,62.6,4.1,95.7,4.5,73.5,7.7,148.2,3.4,221.5-.7,36.7,0,78.5,2.5,115.3.7,35.4-5.2,135.3-5.2,135.3,128.5,4.3,260-1.1,389,0,71.5,1.3,134.9,1.6,207,0,0,0-5.9-170-6.3-253.7.9-140.4,11.1-237.4,1.8-386.9,0,0-58.6-5.1-121.5,0h.2l-.1.1Z" />

        <g id="zu-button" role="button" tabindex="0" aria-label="Schließen" transform="translate(120, -20)">

            style="fill:#fff; stroke:#000; stroke-linecap:round; stroke-linejoin:round; stroke-width:3px;" />
          <path d="M396,121.1c-13.8,13.8-26.8,28.7-41.6,41.4"
            style="fill:none; stroke:#000; stroke-linecap:round; stroke-linejoin:round; stroke-width:3px;" />
          <path d="M354.6,121.1c12.5,14.9,27.2,28.1,41.3,41.3"
            style="fill:none; stroke:#000; stroke-linecap:round; stroke-linejoin:round; stroke-width:3px;" />
        </g>
      </g>

      <a id="weiter-link" tabindex="0" aria-label="Zum Lift" role="button" aria-hidden="true">
        <path style="fill:aqua; stroke:#000; stroke-linecap:round; stroke-linejoin:round; stroke-width:3px;"
          d="M1060.4,394.5s14.7,13.2,18.5,16.3c-3.5,0-6.5.2-9.9,0-.2,5.3,0,10.1,0,10.1h-17s-.5-4.7,0-10.1h-10.1l18.5-16.3h0Z" />
        <text class="room-label" x="9%" y="50%">Weiter</text>
      </a>

    </svg>
  </div>

  <script>
    window.LEVEL_CONFIG = {
      hilfeUrl: '12_Lift_1H.html',
      menuUrl: 'levels.html'
    };

    // Navigation für weiter-link (href entfernt um URL-Vorlesen zu vermeiden)
    var weiterLink = document.getElementById('weiter-link');
    weiterLink.addEventListener('click', function() { window.location.href = '12_Lift_4.html'; });
    weiterLink.addEventListener('keydown', function(e) {
      if (e.key === 'Enter' || e.key === ' ') { e.preventDefault(); window.location.href = '12_Lift_4.html'; }
    });
  </script>
  <script src="icons.js"></script>

  <script>
    (function () {
      var bildSmall = document.getElementById('bild-small');
      var bildPanel = document.getElementById('bild-panel');
      var zuButton = document.getElementById('zu-button');
      var weiterLink = document.getElementById('weiter-link');

      bildPanel.style.display = 'none';
      weiterLink.style.display = 'none';
      weiterLink.setAttribute('tabindex', '-1');
      weiterLink.setAttribute('aria-hidden', 'true');

      // Hint text as body-level HTML so it scales with browser zoom
      var hinweisEl = document.createElement('p');
      var hinweisText = 'Eine Reihe von Zeichen, die sich in der Höhe und Form unterscheiden. Manche sind eckig, manche rund. Der Einzige, der aus zwei Teilen, die nicht verbunden sind ist, ist zweimal zu sehen. Einer ist nach oben geöffnet, einer nach unten, einer nach links und nach rechts und einer nach oben und nach unten.';
      hinweisEl.setAttribute('aria-live', 'assertive');
      hinweisEl.setAttribute('aria-atomic', 'true');
      hinweisEl.setAttribute('tabindex', '0');
      hinweisEl.style.cssText = ['display:none', 'position:fixed', 'margin:0', "font-family:'Lex',sans-serif", 'font-size:2rem', 'color:#ffffff', 'line-height:1.2', 'z-index:100', 'overflow-y:auto', 'box-sizing:border-box', 'padding:4px 8px', 'word-break:break-word'].join(';');
      (function(){
        var s=document.querySelector('.room-overlay')||document.querySelector('.room-svg')||document.querySelector('svg');
        s?s.parentNode.insertBefore(hinweisEl,s):document.body.appendChild(hinweisEl);
      })();
      var tabTrapFn = null;

      function positionHinweis() {
        var svg = document.querySelector('.room-overlay');
        if (!svg) return;
        var r = svg.getBoundingClientRect();
        var sx = r.width  / 1600;
        var sy = r.height / 900;
        hinweisEl.style.left      = (r.left + 540 * sx) + 'px';
        hinweisEl.style.top       = (r.top  + 160 * sy) + 'px';
        hinweisEl.style.width     = (535 * sx) + 'px';
        hinweisEl.style.height = (560 * sy) + 'px';
      }

      window.addEventListener('resize', function () {
        if (hinweisEl.style.display !== 'none') positionHinweis();
      });
      window.addEventListener('scroll', function () {
        if (hinweisEl.style.display !== 'none') positionHinweis();
      });

      function openBild() {
        bildSmall.style.display = 'none';
        bildPanel.style.display = '';
        bildPanel.setAttribute('aria-hidden', 'false');
        positionHinweis();
        hinweisEl.style.display = 'block';
        setTimeout(function() {
          hinweisEl.textContent = hinweisText;
          hinweisEl.focus();
          if (tabTrapFn) document.removeEventListener('keydown', tabTrapFn);
          tabTrapFn = function(e) {
            if (e.key !== 'Tab') return;
            e.preventDefault();
            if (document.activeElement === zuButton) { hinweisEl.focus(); }
            else { zuButton.focus(); }
          };
          document.addEventListener('keydown', tabTrapFn);
        }, 50);
      }

      function closeBild() {
        if (tabTrapFn) { document.removeEventListener('keydown', tabTrapFn); tabTrapFn = null; }
        bildPanel.style.display = 'none';
        bildPanel.setAttribute('aria-hidden', 'true');
        hinweisEl.style.display = 'none';
        hinweisEl.textContent = '';
        bildSmall.style.display = '';
        weiterLink.style.display = '';
        weiterLink.setAttribute('tabindex', '0');
        weiterLink.setAttribute('aria-hidden', 'false');
        weiterLink.focus();
      }

      bildSmall.addEventListener('click', openBild);
      bildSmall.addEventListener('keydown', function (e) {
        if (e.key === 'Enter' || e.key === ' ') { e.preventDefault(); openBild(); }
      });
      zuButton.addEventListener('click', closeBild);
      zuButton.addEventListener('keydown', function (e) {
        if (e.key === 'Enter' || e.key === ' ') { e.preventDefault(); closeBild(); }
      });
    }());
  </script>

</body>

</html>
