      pointer-events: none;

    a.buch-btn:hover>path,
    a.buch-btn:focus>path {

      fill: rgba(60, 60, 60) !important;
            filter: drop-shadow(0 0 10px rgba(255, 255, 255, 1));

    a.buch-btn.active:hover>path,
    a.buch-btn.active:focus>path {
      fill: unset !important;
    }

    #stapel-btn {
      pointer-events: none;
    }

    #stapel-btn>path {
      fill: transparent;
      pointer-events: none;
    }

    #stapel-btn.active {

    }

    }

    #stapel-btn.active:hover>path,

    }

</head>

  <script>
    function aktiviere(el) {
      var colorName = (el.dataset.id || el.id).replace(/\d+$/, '');

      el.classList.add('active');
      el.classList.remove('focused');
      el.blur();

      if (colorName === 'Grün') {
        document.getElementById('Buch_Grün').style.display = '';
      } else if (colorName === 'Pink') {
        document.getElementById('Buch_Pink').style.display = '';
      }

      var gruenAktiv = document.querySelector('a.buch-btn[data-id="Grün"].active') !== null;
      var pinkAktiv = document.querySelector('a.buch-btn[data-id="Pink"].active') !== null;
      if (gruenAktiv && pinkAktiv) {
        var stapel = document.getElementById('stapel-btn');
        stapel.classList.add('active');
        setTimeout(function () { stapel.focus(); }, 100);
      }

      var live = document.getElementById('sr-announce');
      live.textContent = '';
      setTimeout(function () { live.textContent = colorName; }, 50);
    }

    document.getElementById('stapel-btn').addEventListener('click', function (e) {
      e.preventDefault();
      window.location.href = '3_Bibi_3.html';
    });

    document.querySelectorAll('a.buch-btn').forEach(function (path) {

      path.addEventListener('click', function () {
        if (!this.classList.contains('active')) aktiviere(this);
      });

      path.addEventListener('keydown', function (e) {
        if ((e.key === 'Enter' || e.key === ' ') && !this.classList.contains('active')) {
          e.preventDefault();
          aktiviere(this);
        }
      });

    });

    window.addEventListener('beforeunload', function () {
      var active = [...document.querySelectorAll('a.buch-btn.active')].map(el => el.dataset.id);
      sessionStorage.setItem('bibi2_active', JSON.stringify(active));
    });

    (function restoreState() {
      var saved = JSON.parse(sessionStorage.getItem('bibi2_active') || '[]');
      saved.forEach(function (id) {
        var el = document.querySelector('a.buch-btn[data-id="' + id + '"]');
        if (el) aktiviere(el);
      });
    })();
  </script>
