<!DOCTYPE html>
<html lang="de">

<head>
  <meta charset="UTF-8">
  <title>Hinweise Keller</title>
  <link rel="stylesheet" href="image.css">
  <link rel="stylesheet" href="icons.css">
  <style>
    @font-face {
      font-family: 'Lex';
      src: url('fonts/Lex.ttf') format('truetype');
    }

    body {
      font-family: 'Lex', sans-serif;
    }

    svg {
      border: none;
    }

    a:hover>path,
    a:hover>rect {
      fill: rgba(65, 65, 65, 0.7) !important;
    }

    a:focus {
      outline: none;
    }

    a:focus-visible>path,
    a:focus-visible>rect {
      stroke: black;
      fill: rgba(65, 65, 65, 0.2);
      stroke-width: 3px;
      outline-offset: 4px;
      filter: drop-shadow(0 0 6px rgb(0, 0, 0)) drop-shadow(0 0 6px rgb(0, 0, 0));
    }

    #bild-small {
      cursor: pointer;
    }

    #bild-small>path {
      fill: transparent;
      pointer-events: all;
    }

    #bild-small:hover>path {
      fill: rgba(65, 65, 65, 0.7);
    }

    #bild-small:focus {
      outline: none;
    }

    #bild-small:focus-visible>path {
      stroke: black;
      fill: rgba(65, 65, 65, 0.2);
      stroke-width: 3px;
      filter: drop-shadow(0 0 6px rgb(0, 0, 0)) drop-shadow(0 0 6px rgb(0, 0, 0));
    }

    #zu-button {
      cursor: pointer;
    }

    #zu-button:hover .zu-circle {
      fill: rgba(65, 65, 65, 0.7) !important;
    }

    #zu-button:focus {
      outline: none;
    }

    #zu-button:focus-visible .zu-circle {
      stroke: rgb(0, 0, 0);
      fill: rgba(65, 65, 65, 0.7);
      stroke-width: 3px;
      filter: drop-shadow(0 0 6px rgb(0, 0, 0)) drop-shadow(0 0 6px rgb(0, 0, 0));
    }

    .text-box {
      font-family: 'Lex', sans-serif;
      font-size: 4.5rem;
      padding: 0px;
      width: 100%;
      height: 100%;
      overflow-y: auto;
      box-sizing: border-box;
      background: transparent;
      color: #fff;
      word-break: break-word;
    }
  </style>
</head>

<body>
  <div class="room-wrapper">
    <img src="img/9_Keller_7.svg"
      alt="Ein Eingangsbereich mit 2 hängenden, leuchtenden Lampen. Darunter eine Garderobe. Rechts unten eine Sitzbank, darüber ein blaues Rechteck. 
Ein pinker Teppich führt links aus dem Bild heraus. Links in der Mitte zeigt ein türkisfarbener Pfeil aus dem Bildschirm hinaus."
      class="responsive-img" tabindex="0" />

    <svg class="room-overlay" viewBox="0 0 1600 900" fill="none" xmlns="http://www.w3.org/2000/svg">

      <g id="bild-small" role="button" tabindex="0" aria-label="Blaues Rechteck">
        <path
          d="M1079.8,363.1c-.4,57.2-1.7,118.5,1.8,175.3,103,1.9,210.2-3.4,313.2,0,2-42.4,5-269.6,3-319.6-104.6,5.4-318,0-318,0v17.6s-3,85.8,0,126.6h0Z" />
      </g>

      <g id="bild-panel" aria-hidden="true">
        <path style="fill:#2323ff; stroke:#000; stroke-linecap:round; stroke-linejoin:round; stroke-width:3px;"
          d="M459,416.2c-.9,122.9-3.7,254.7,3.9,376.7,221.4,4.1,451.7-7.3,673.1,0,4.3-91.1,10.7-579.4,6.4-686.8-224.8,11.6-683.4,0-683.4,0v37.8s-6.4,184.4,0,272.1v.2Z" />

        <g id="zu-button" role="button" tabindex="0" aria-label="Schließen" transform="translate(70, -30)">
          <path class="zu-circle"
            d="M403.9,116.1c-9.4-8.2-22.5-12.2-34.9-10.5-3.6.8-7.3,2.3-11,3.3-3.2,1.1-6.5,1.8-9,4.2-14.4,16.2-16,43.7,2.2,57.8,9.9,8.4,31.1,10.1,42.4,3.7,5.1-3.4,10.6-7.2,14-12.4,7.6-14.2,7.7-33.8-3.3-46.3l-.4.2h0Z"
            style="fill:#fff; stroke:#000; stroke-linecap:round; stroke-linejoin:round; stroke-width:3px;" />
          <path d="M396,121.1c-13.8,13.8-26.8,28.7-41.6,41.4"
            style="fill:none; stroke:#000; stroke-linecap:round; stroke-linejoin:round; stroke-width:3px;" />
          <path d="M354.6,121.1c12.5,14.9,27.2,28.1,41.3,41.3"
            style="fill:none; stroke:#000; stroke-linecap:round; stroke-linejoin:round; stroke-width:3px;" />
        </g>
      </g>

      <a id="weiter-link" tabindex="0" aria-label="Weiter" role="button" aria-hidden="true">
        <path style="fill:aqua; stroke:#000; stroke-linecap:round; stroke-linejoin:round; stroke-width:3px;"
          d="M26.9,449.9s77.2-85.9,95.6-108.1c-.2,20.1,1.3,37.8,0,58.2,30.9,1.3,59,0,59,0v99.5s-27.7,3-59,0c.4,18.8.6,39.8,0,58.8l-95.6-108.1h0v-.2h0Z" />
        <text class="room-label" x="9%" y="50%">Weiter</text>
      </a>

    </svg>
  </div>

  <script>
    window.LEVEL_CONFIG = {
      hilfeUrl: '9_Keller_7H.html',
      menuUrl: 'levels.html'
    };

    // Navigation für weiter-link (href entfernt um URL-Vorlesen zu vermeiden)
    var weiterLink = document.getElementById('weiter-link');
    weiterLink.addEventListener('click', function() { window.location.href = '9_Keller_8.html'; });
    weiterLink.addEventListener('keydown', function(e) {
      if (e.key === 'Enter' || e.key === ' ') { e.preventDefault(); window.location.href = '9_Keller_8.html'; }
    });
  </script>
  <script src="icons.js"></script>

  <script>
    (function () {
      var bildSmall = document.getElementById('bild-small');
      var bildPanel = document.getElementById('bild-panel');
      var zuButton = document.getElementById('zu-button');
      var weiterLink = document.getElementById('weiter-link');

      bildPanel.style.display = 'none';
      weiterLink.style.display = 'none';
      weiterLink.setAttribute('tabindex', '-1');
      weiterLink.setAttribute('aria-hidden', 'true');

      // Hint text as body-level HTML so it scales with browser zoom
      var hinweisEl = document.createElement('p');
      var hinweisText = 'Eine quadratische Fläche, mit einem Wort in der Mitte.';
      hinweisEl.setAttribute('aria-live', 'assertive');
      hinweisEl.setAttribute('aria-atomic', 'true');
      hinweisEl.setAttribute('tabindex', '0');
      hinweisEl.style.cssText = ['display:none', 'position:fixed', 'margin:0', "font-family:'Lex',sans-serif", 'font-size:4.5rem', 'color:#ffffff', 'line-height:1.2', 'z-index:100', 'overflow-y:auto', 'box-sizing:border-box', 'padding:4px 8px', 'word-break:break-word'].join(';');
      (function(){
        var s=document.querySelector('.room-overlay')||document.querySelector('.room-svg')||document.querySelector('svg');
        s?s.parentNode.insertBefore(hinweisEl,s):document.body.appendChild(hinweisEl);
      })();
      var tabTrapFn = null;

      function positionHinweis() {
        var svg = document.querySelector('.room-overlay');
        if (!svg) return;
        var r = svg.getBoundingClientRect();
        var sx = r.width  / 1600;
        var sy = r.height / 900;
        hinweisEl.style.left      = (r.left + 520 * sx) + 'px';
        hinweisEl.style.top       = (r.top  + 160 * sy) + 'px';
        hinweisEl.style.width     = (550 * sx) + 'px';
        hinweisEl.style.height = (600 * sy) + 'px';
      }

      window.addEventListener('resize', function () {
        if (hinweisEl.style.display !== 'none') positionHinweis();
      });
      window.addEventListener('scroll', function () {
        if (hinweisEl.style.display !== 'none') positionHinweis();
      });

      function openBild() {
        bildSmall.style.display = 'none';
        bildPanel.style.display = '';
        bildPanel.setAttribute('aria-hidden', 'false');
        positionHinweis();
        hinweisEl.style.display = 'block';
        setTimeout(function() {
          hinweisEl.textContent = hinweisText;
          hinweisEl.focus();
          if (tabTrapFn) document.removeEventListener('keydown', tabTrapFn);
          tabTrapFn = function(e) {
            if (e.key !== 'Tab') return;
            e.preventDefault();
            if (document.activeElement === zuButton) { hinweisEl.focus(); }
            else { zuButton.focus(); }
          };
          document.addEventListener('keydown', tabTrapFn);
        }, 50);
      }

      function closeBild() {
        if (tabTrapFn) { document.removeEventListener('keydown', tabTrapFn); tabTrapFn = null; }
        bildPanel.style.display = 'none';
        bildPanel.setAttribute('aria-hidden', 'true');
        hinweisEl.style.display = 'none';
        hinweisEl.textContent = '';
        bildSmall.style.display = '';
        weiterLink.style.display = '';
        weiterLink.setAttribute('tabindex', '0');
        weiterLink.setAttribute('aria-hidden', 'false');
        weiterLink.focus();
      }

      bildSmall.addEventListener('click', openBild);
      bildSmall.addEventListener('keydown', function (e) {
        if (e.key === 'Enter' || e.key === ' ') { e.preventDefault(); openBild(); }
      });
      zuButton.addEventListener('click', closeBild);
      zuButton.addEventListener('keydown', function (e) {
        if (e.key === 'Enter' || e.key === ' ') { e.preventDefault(); closeBild(); }
      });
    }());
  </script>

</body>

</html>
