<!DOCTYPE html>
<html lang="de">

<head>
  <meta charset="UTF-8">
  <title>Küche 3</title>
  <link rel="stylesheet" href="image.css">
  <link rel="stylesheet" href="icons.css">
  <style>
    @font-face {
      font-family: 'Lex';
      src: url('fonts/Lexend_Regular.ttf') format('truetype');
    }

    body {
      font-family: 'Lex', sans-serif;
    }

    a:hover>path,
    a:hover>rect {
      fill: rgba(65, 65, 65, 0.7) !important;
    }

    a:focus {
      outline: none;
    }

    a:focus-visible>path,
    a:focus-visible>rect {
      stroke: black;
      fill: rgba(65, 65, 65, 0.2);
      stroke-width: 3px;
      outline-offset: 4px;
      filter: drop-shadow(0 0 6px rgb(0, 0, 0)) drop-shadow(0 0 6px rgb(0, 0, 0));
    }

    a.d-zu-btn>path {
      pointer-events: all;
    }

    a.d-weiter-btn>path {
      fill: transparent;
      pointer-events: all;
    }

    a.d-weiter-btn:hover>path,
    a.d-weiter-btn:focus-visible>path {
      fill: rgba(65, 65, 65, 0.15) !important;
    }



    .d-feld {
      fill: #fff;
      stroke: #1d1e1c;
      stroke-width: 3px;
      stroke-linecap: round;
      stroke-linejoin: round;
    }

    .d-btn-shape {
      fill: #fff;
      stroke: #1d1e1c;
      stroke-width: 3px;
      stroke-linecap: round;
      stroke-linejoin: round;
    }

    .d-zu-shape {
      fill: #fff;
      stroke: #000;
      stroke-width: 3px;
      stroke-miterlimit: 10;
    }

    .d-weiter-btn,
    .d-zu-btn {
      cursor: pointer;
    }

    /* Pfeil-Link */
    #pfeil-link {
      cursor: pointer;
    }

    #pfeil-link>path {
      pointer-events: all;
    }

    #pfeil-link:focus {
      outline: none;
    }
      .room-wrapper {
      position: relative;
    }
  </style>
</head>

<body>

    <img src="img/5_Kueche_2.svg"

      class="responsive-img" tabindex="0" />
    <svg class="room-overlay" id="room-svg" viewBox="0 0 1600 900" fill="none" xmlns="http://www.w3.org/2000/svg">

        <path

        <text class="room-label" x="920" y="360">Danke</text>

      <a id="pfeil-link" href="5_Kueche_2W.html" aria-label="Gelbes Wesen" role="button"
        style="visibility:hidden;pointer-events:none;">
        <path style="fill: #fff706;stroke:#000;stroke-linecap:round;stroke-linejoin:round;stroke-width:3px;"
          d="M1410.13,544.03c-11.53-44.17,20.14-82.93,72.8-85.35,51.25-2.36,91.57,48.55,72.72,94.02-6.96,20.28-31.96,31.55-29.91,54.69v16.59c.61,14.34-2.25,28.47-2.25,42.81s2.05,17.21-1.64,24.99c-1.64,3.28-4.92,3.28-6.56,0-3.28-6.96-2.05-15.57-2.25-23.56v-26.83s-3.89-.61-4.71-.61h-3.89s1.02,25.81,0,38.92c0,5.74,0,16.59-6.35,14.95-8.4-3.89-2.25-45.07-3.69-55.31-2.05-.61-6.35,0-8.4,0,1.23,7.58-1.02,17-1.23,24.58,0,8.4,1.64,17,0,25.2-1.23,6.96-6.96,7.99-8.4.61-3.07-15.36,0-33.59-1.02-49.16-1.02-.61-5.74-.2-6.96,0-1.64,15.36-.61,31.55-1.23,46.91-1.02,7.58-8.6,7.99-10.04,0-1.23-15.98.29-32.62-1.02-48.55-.99-11.91-6.37-33.44-13.5-41.78-22.03-25.74-26.24-29.31-32.46-53.13Z" />
        <path style="fill: none; stroke:#000;stroke-linecap:round;stroke-linejoin:round;stroke-width:3px;"
          d="M1497.27,570.32c-6.35,5.74-10.65,4.92-18.23-1.64" />
        <path style="fill: #000000;stroke:#ffffff;stroke-linecap:round;stroke-linejoin:round;stroke-width:3px;"
          d="M1459.36,527.15c-3.28-4.92-13.52-9.27-21.51-7.01-13.31,4.71-19.67,21.97-9.01,32.21,8.4,8.6,25.2,8.6,31.14-2.66,3.89-6.56,2.66-18.03-.61-22.53h0Z" />
        <path style="fill: #000000;stroke:#ffffff;stroke-linecap:round;stroke-linejoin:round;stroke-width:3px;"
          d="M1508.94,550.25c6.35,7.37,19.26,6.96,26.63,1.64,6.96-6.96,11.88-18.85,4.3-27.65-18.03-20.48-47.52,3.89-30.93,25.81v.2Z" />
      </a>

      <!-- Dialog overlay merged into room SVG -->
      <g id="dialog-overlay-group" display="none" role="dialog" aria-modal="true">
        <rect width="1600" height="900" fill="rgba(0,0,0,0)" />

        <g id="dlg-1" transform="translate(0,-370)">
          <path class="d-feld"
            d="M1450,603.2c-.4-10.5-399,8.8-613.1,3.2-235.4,3.5-686.9-2.1-686.9-2.1,12.6,47.4-2.3,96.7,8.5,144.4,1.8,23.9-7.4,117.9-7.4,117.9,252.4,10.3,506.1-7.2,758.8,5.1,169.1-13.7,531.7-7.9,531.7-7.9,0,0-2.7-170.6,8.5-260.6Z" />

                    <a class="d-zu-btn" href="#" id="dlg1-zu" role="button" aria-label="Dialog schliessen">
            <path class="d-zu-shape"
              d="M172.3,544.5c-11.5-9.2-28.2-2.6-38.4,3.9-24.3,11.8-33.3,52.6-11.5,71.1,21.8,17.1,56.3,13.2,70.4-11.8,16.6-26.3,2.6-48.7-20.5-63.2Z" />
            <text font-family="Lex,sans-serif" font-size="40" fill="#000" text-anchor="middle" x="153" y="600">✕</text>
          </a>

          <a class="d-weiter-btn" href="#" id="dlg1-weiter" role="button" aria-label="Weiter">
            <path class="d-btn-shape"
              d="M1192,841.7c70.8-2.1,141.4.4,212.2-3.5l4.7-56.1c-33.8-9.6-74.7,1.1-109.2.6-41.5,0-65-2.3-108.7-.8l1.1,59.8Z" />
            <text font-family="Lex,sans-serif" font-size="25" fill="#000" text-anchor="middle" x="1300"
              y="820">Weiter</text>
          </a>
        </g>
      </g>

    </svg>
  </div>

  <script>
    const DIALOGS = [
      {
        group: 'dlg-1',
        weiterId: 'dlg1-weiter',
        lines: ['dlg1-line1'],
        endX: { end: 1300, start: 300 },
        conversation: [
          { text: 'Ist das alles?', align: 'end' },
          { text: 'Ja! Danke!', align: 'start' },
          { text: 'Wie war das mit Büro 146?', align: 'end' },
          { text: 'Ich weiss es nicht,', align: 'start' },
          { text: 'aber frag mal im Badezimmer.', align: 'start' },

        ],
      },
    ];

    let convStep = 0;
    let openerLink = null;

    const overlayGroup = document.getElementById('dialog-overlay-group');
    const roomSvg = document.getElementById('room-svg');
    // Dialog text: created in <body> directly so position:fixed is always
    // relative to the viewport, unaffected by any parent CSS filter/transform.
    var dlgTextEl = (function () {
      var el = document.getElementById('dlg1-text-html');
      if (!el) {
        el = document.createElement('p');
        el.id = 'dlg1-text-html';
        el.setAttribute('aria-live', 'polite');
        el.style.cssText = [
          'display:none', 'position:fixed', 'margin:0',
          "font-family:'Lex',sans-serif", 'font-size:1.8rem',
          'color:#000', 'line-height:1.3', 'overflow-y:auto',
          'z-index:10000', 'box-sizing:border-box', 'padding:4px 10px'
        ].join(';');
        document.body.appendChild(el);
      }
      return el;
    })();

    function positionDialogText() {
      var svg = document.getElementById('room-svg');
      if (!svg || !dlgTextEl) return;
      var r = svg.getBoundingClientRect();
      var sx = r.width  / 1600;
      var sy = r.height / 900;
      // SVG viewport coords (after group translate 0,-370):
      //   bubble top y=233, text area x=240-1150, y=255-405
      dlgTextEl.style.left      = (r.left + 240 * sx) + 'px';
      dlgTextEl.style.top       = (r.top  + 255 * sy) + 'px';
      dlgTextEl.style.width     = (910  * sx) + 'px';
      dlgTextEl.style.maxHeight = Math.max(40, 160 * sy) + 'px';
    }
    window.addEventListener('resize', function () {
      if (isDialogOpen()) positionDialogText();
    });
    window.addEventListener('scroll', function () {
      if (isDialogOpen()) positionDialogText();
    });



    function isDialogOpen() {
      return overlayGroup.getAttribute('display') !== 'none';
    }

    function renderLines(def) {
      const entry = def.conversation[convStep - 1];
      dlgTextEl.textContent = entry.text;
      dlgTextEl.style.textAlign = entry.align === 'end' ? 'right' : 'left';
      dlgTextEl.style.display = 'block';
      const w = document.getElementById(def.weiterId);
      if (w) w.setAttribute('visibility', convStep >= def.conversation.length ? 'hidden' : 'visible');
    }

    function openDialog(opener) {
      openerLink = opener;
      convStep = 1;
      const def = DIALOGS[0];
      document.getElementById(def.group).setAttribute('visibility', 'visible');
      renderLines(def);
      positionDialogText();
      overlayGroup.setAttribute('display', 'inline');
      overlayGroup.setAttribute('aria-hidden', 'false');
    }

    function closeDialog() {
      overlayGroup.setAttribute('display', 'none');
      overlayGroup.setAttribute('aria-hidden', 'true');
      document.getElementById(DIALOGS[0].group).setAttribute('visibility', 'hidden');
      dlgTextEl.style.display = 'none';
      dlgTextEl.textContent = '';
      convStep = 0;
      if (openerLink) openerLink.focus();
      const pfeil = document.getElementById('pfeil-link');
      pfeil.style.visibility = 'visible';
      pfeil.style.pointerEvents = 'auto';
    }

    function advanceConversation() {
      const def = DIALOGS[0];
      if (convStep < def.conversation.length) {
        convStep++;
        renderLines(def);
      } else {
        closeDialog();
      }
    }

    document.getElementById('wesen-link').addEventListener('click', function (e) {
      e.preventDefault();
      openDialog(this);
    });

    roomSvg.addEventListener('click', function (e) {
      if (!isDialogOpen()) return;
      if (e.target.closest('.d-weiter-btn')) { e.preventDefault(); advanceConversation(); return; }
      if (e.target.closest('.d-zu-btn')) { e.preventDefault(); closeDialog(); return; }
    });

    document.addEventListener('keydown', function (e) {
      if (!isDialogOpen()) return;
      if (e.key === 'Escape') { closeDialog(); return; }
      if (e.key === 'Tab') {
        const focusable = Array.from(overlayGroup.querySelectorAll('a[role="button"]')).filter(el => {
          let p = el.parentElement;
          while (p && p !== overlayGroup) {
            if (p.getAttribute('visibility') === 'hidden') return false;
            p = p.parentElement;
          }
          return true;
        });
        if (!focusable.length) { e.preventDefault(); return; }
        const first = focusable[0], last = focusable[focusable.length - 1];
        if (e.shiftKey) { if (document.activeElement === first) { e.preventDefault(); last.focus(); } }
        else { if (document.activeElement === last) { e.preventDefault(); first.focus(); } }
      }
    });

    document.getElementById('pfeil-link').addEventListener('keydown', function (e) {
      if (e.key === 'Enter' || e.key === ' ') {
        e.preventDefault();
        window.location.href = '5_Kueche_4.html';
      }
    });
  </script>
