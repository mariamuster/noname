<!doctype html>
<html lang="de">

<head>
  <meta charset="UTF-8" />
  <title>Hilfe Keller</title>
  <link rel="stylesheet" href="image.css">
  <link rel="stylesheet" href="icons.css">
  <style>
    html,
    body {
      overflow: hidden;
      height: 100%;
    }

    body {
      background-color: rgb(0, 200, 0);
      font-family: 'Lexend', sans-serif;
    }

    .instructions {
      overflow-y: auto !important;
      overflow-x: hidden !important;
      overflow-wrap: break-word !important;
      white-space: normal !important;
      bottom: 13% !important;
      pointer-events: auto !important;
    }

    svg {
      border: 0cm solid rgba(0, 0, 0, 0.6);
    }


    a>path,
    a>rect {
      fill: transparent;
      pointer-events: all;
    }

    a:hover>path,
    a:hover>rect {
      fill: rgba(65, 65, 65, 0.7) !important;
    }

    a:focus-visible {
      outline: none;
    }

    a:focus-visible>path,
    a:focus-visible>rect {
      stroke: #005fcc;
      fill: rgba(0, 95, 204, 0.08);
      stroke-width: 3px;
      filter: drop-shadow(0 0 4px #005fcc) drop-shadow(0 0 8px rgba(0, 95, 204, 0.4));
    }
  </style>
</head>

<body>
  <div class="room-wrapper">
    <img src="img/Hilfe.svg" alt="Hilfe" class="responsive-img" tabindex="0" />

    <ul class="instructions" tabindex="0">
      <li>Klick auf den <b>türkisfarbenen Pfeil</b> in der Mitte.</li>
    </ul>


    <svg class="room-overlay" viewBox="0 0 1600 900" preserveAspectRatio="xMidYMid meet" fill="none"
      xmlns="http://www.w3.org/2000/svg">
      <a tabindex="0" aria-label="Schliessen" role="button">

  </div>

  <script>
    (function () {
      var btn = document.querySelector('[aria-label="Schliessen"]');
      if (btn) {
        btn.addEventListener('click', function () { window.location.href = '2_Keller_8.html'; });
        btn.addEventListener('keydown', function (e) {
          if (e.key === 'Enter' || e.key === ' ') { e.preventDefault(); window.location.href = '2_Keller_8.html'; }
        });
      }
    })();
