<!DOCTYPE html>
<html lang="de">

<head>
  <meta charset="UTF-8">
  <title>Wohnzimmer</title>
  <link rel="stylesheet" href="image.css">
  <link rel="stylesheet" href="icons.css">
  <style>
    @font-face {
      font-family: 'Lex';
      src: url('fonts/Lexend_Regular.ttf') format('truetype');
    }

    *,
    *::before,
    *::after {
      box-sizing: border-box;
      margin: 0;
      padding: 0;
    }

    html {
      overflow-x: hidden;
    }

    body {
      font-family: 'Lex', sans-serif;
      background: rgb(0, 50, 0);
      height: auto;
      min-height: 100vh;
      overflow: hidden;
      overflow-y: auto;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: flex-start;
    }

    /* ── CONTROLS BAR ── */
    #controls {
      width: 100%;
      display: flex;
      gap: 25px;
      align-items: center;
      justify-content: center;
      flex-wrap: wrap;
      padding: 20px 24px;
      background: rgba(0, 0, 0, 0.8);
      position: sticky;
      top: 0;
      z-index: 10;
    }

    .ctrl-group {
      display: flex;
      flex-direction: column;
      gap: 8px;
    }

    .ctrl-label {
      font-size: 16px;
      font-weight: 500;
      letter-spacing: 0.14em;
      text-transform: uppercase;
      color: rgba(255, 255, 255, 0.9);
    }

    .ctrl-inline {
      display: flex;
      gap: 17px;
      align-items: center;
    }

    .sliders {
      display: flex;
      flex-direction: column;
      gap: 10px;
    }

    .slider-row {
      display: flex;
      align-items: center;
      gap: 7px;
    }

    .channel-tag {
      font-size: 16px;
      font-weight: 500;
      width: 17px;
      color: rgba(255, 255, 255, 0.9);
    }

    input[type=range] {
      overflow: visible;
      appearance: none;
      -webkit-appearance: none;
      height: 10px;
      width: min(150px, 30vw);
      border-radius: 0px;
      background: rgba(255, 255, 255, 0.5);
      outline: none;
    }

    input[type=range]:disabled {
      opacity: 0.45;
      cursor: not-allowed;
      pointer-events: none;
    }

    input[type=range]::-webkit-slider-thumb {
      appearance: none;
      -webkit-appearance: none;
      width: 24px;
      height: 24px;
      border-radius: 50%;
      background: #fff;
      border: 3px solid rgba(0, 0, 0, 0.1);
    }

    input[type=range]::-moz-range-thumb {
      width: 24px;
      height: 24px;
      border-radius: 50%;
      background: #fff;
      border: 1px solid rgba(0, 0, 0, 0.5);
    }

    .val-num {
      font-size: 16px;
      font-variant-numeric: tabular-nums;
      width: 26px;
      text-align: right;
      color: rgba(255, 255, 255, 0.9);
    }

    .color-preview {
      width: 44px;
      height: 44px;
      border-radius: 5px;
      border: 1.5px solid rgba(255, 255, 255, 0.9);
      flex-shrink: 0;
      align-self: center;
    }

    /* ── CONTRAST Panel ── */
    #contrast-panel {
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 3px;
      padding: 0 18px;
      border-left: 3px solid rgba(255, 255, 255, 0.9);
      border-right: 3px solid rgba(255, 255, 255, 0.9);
    }

    #contrast-ratio {
      font-size: 40px;
      font-weight: 500;
      letter-spacing: -0.02em;
      color: rgba(255, 255, 255, 1);
      line-height: 1;
    }

    #contrast-ratio.pass {
      color: #00ffcc;
    }

    #contrast-label {
      font-size: 16px;
      font-weight: 500;
      letter-spacing: 0.1em;
      text-transform: uppercase;
      color: rgba(255, 255, 255, 0.9);
    }

    /* ── CONTRAST BAR ── */
    #contrast-bar-wrap {
      width: 210px;
      margin-top: 6px;
    }

    #contrast-bar-track {
      position: relative;
      width: 100%;
      height: 20px;
      background: rgba(255, 255, 255, 0.18);
      border-radius: 10px;
    }

    #contrast-bar-fill {
      height: 100%;
      border-radius: 10px;
      width: 0%;
      background: #e63232;
    }

    /* ── ROOM ── */
    #room-wrapper {
      width: 100%;
      max-width: 1600px;
      position: relative;
    }

    /* ── OVERLAY SVG ── */
    .wohn-overlay {
      position: absolute;
      inset: 0;
      width: 100%;
      height: 100%;
      pointer-events: none;
    }

    /* Pfeil hover */
    #pfeil-link>path {
      pointer-events: all;
      transition: filter 0.2s, opacity 0.2s;
    }

    #pfeil-link:hover>path,
    #pfeil-link:focus-visible>path {
      filter: drop-shadow(0 0 10px rgba(0, 0, 0, 0.9));
      opacity: 0.5;
    }

    #pfeil-link:focus {
      outline: none;
    }



    a:hover>path,
    a:hover>rect {
      fill: rgba(65, 65, 65, 0.7) !important;
    }

    a:focus-visible {
      outline: none;
    }

    a:focus-visible>path,
    a:focus-visible>rect {
      stroke: #005fcc;
      fill: rgba(0,95,204,0.08);
      stroke-width: 3px;
      filter: drop-shadow(0 0 4px #005fcc) drop-shadow(0 0 8px rgba(0,95,204,0.4));
    }

    #bild-small {
      cursor: pointer;
    }

    #bild-small>path {
      fill: transparent;
      pointer-events: all;
    }

    #bild-small:hover>path {
      fill: rgba(65, 65, 65, 0.7);
    }

    #bild-small:focus {
      outline: none;
    }

    #bild-small:focus-visible>path {
      stroke: #005fcc;
      fill: rgba(0,95,204,0.08);
      stroke-width: 3px;
      filter: drop-shadow(0 0 4px #005fcc) drop-shadow(0 0 8px rgba(0,95,204,0.4));
    }

    #zu-button {
      cursor: pointer;
    }

    #zu-button:hover .zu-hit-area {
      fill: rgba(65, 65, 65, 0.7) !important;
    }

    #zu-button:focus {
      outline: none;
    }

    #zu-button:focus-visible .zu-hit-area {
      stroke: #005fcc;
      fill: rgba(0,95,204,0.08);
      stroke-width: 3px;
      filter: drop-shadow(0 0 4px #005fcc) drop-shadow(0 0 8px rgba(0,95,204,0.4));
    }

    .text-box {
      font-family: 'Lex', sans-serif;
      font-size: 1.6875rem;
      padding: 0px;
      width: 100%;
      height: 100%;
      overflow-y: auto;
      box-sizing: border-box;
      background: transparent;
      color: #fff;
      word-break: break-word;
    }
  </style>
</head>

<body>

  <div id="controls" aria-hidden="true">

    <div class="ctrl-group">

      <div class="ctrl-inline">

          <div class="slider-row">
            <span class="channel-tag">R</span>
            <input type="range" id="bg-r" min="0" max="255" value="0" disabled>
            <span class="val-num" id="bg-r-val">0</span>
          </div>
          <div class="slider-row">
            <span class="channel-tag">G</span>

          </div>
          <div class="slider-row">
            <span class="channel-tag">B</span>

            <span class="val-num" id="bg-b-val">00</span>

    <!-- Kontrast -->
    <div id="contrast-panel">
      <div id="contrast-ratio" class="pass">—</div>
      <div id="contrast-label">Kontrastverhältnis</div>
      <div id="contrast-bar-wrap">
        <div id="contrast-bar-track">
          <div id="contrast-bar-fill"></div>
        </div>
      </div>
    </div>

    <!-- Linienfarbe (eingefroren) -->
    <div class="ctrl-group">
      <div class="ctrl-label">Linienfarbe</div>
      <div class="ctrl-inline">
        <div class="color-preview" id="stroke-preview" style="background:rgb(0,255,0)"></div>
        <div class="sliders">
          <div class="slider-row">
            <span class="channel-tag">R</span>
            <input type="range" id="st-r" min="0" max="255" value="0" disabled>
            <span class="val-num" id="st-r-val">0</span>
          </div>
          <div class="slider-row">
            <span class="channel-tag">G</span>
            <input type="range" id="st-g" min="0" max="255" value="255" disabled>
            <span class="val-num" id="st-g-val">255</span>
          </div>
          <div class="slider-row">
            <span class="channel-tag">B</span>
            <input type="range" id="st-b" min="0" max="255" value="0" disabled>
            <span class="val-num" id="st-b-val">0</span>
          </div>
        </div>
      </div>
    </div>
  </div>

  <div class="room-wrapper">
    <img src="img/10_Wohnzimmer.svg" alt="Das Wohnzimmer. Der Hintergrund ist dukelgrün, die Linien hellgrün. Die Leiste zeigt die Werte der beiden Farben an. Das Kontrastverhältnis ist 10.51 ZU 1. Ein Sofa in der Mitte, auf dem ein Wesen schläft. Rechts und links davon je ein Sessel. Zwei Lampen und rechts in der Ecke eine Zimmerpflanze. Über dem Sofa hängt ein Bild."
      class="responsive-img" tabindex="0" />

    <svg class="room-overlay" viewBox="0 0 1600 900" fill="none" xmlns="http://www.w3.org/2000/svg">

      <g id="bild-small" role="button" tabindex="0" aria-label="Rechteck anzeigen">
        <path
          d="M811.7,175.1c-42.5-.1-88-.5-130.2.6-1.4,32,2.5,65.3,0,97.3,31.5.6,200.2,1.5,237.3.9-4-32.5,0-98.8,0-98.8h-13.1s-63.7-.9-94,0Z" />
      </g>

      <g id="bild-panel" aria-hidden="true">
        <path
          style="fill:#2323ff; stroke:rgb(0, 255, 0); stroke-linecap:round; stroke-linejoin:round; stroke-width:3px;"
          d="M843.8,267.9c-157.4-.4-325.8-1.9-482,2.3-5.2,118.5,9.3,241.8,0,360.2,116.6,2.3,741.1,5.6,878.5,3.3-14.8-120.3,0-365.7,0-365.7h-48.5s-235.8-3.3-348,0h0v-.1Z" />

        <g id="zu-button" role="button" tabindex="0" aria-label="Schließen" transform="translate(-40, 120)">
          <g aria-hidden="true">
            <path class="zu-circle"
              d="M403.9,116.1c-9.4-8.2-22.5-12.2-34.9-10.5-3.6.8-7.3,2.3-11,3.3-3.2,1.1-6.5,1.8-9,4.2-14.4,16.2-16,43.7,2.2,57.8,9.9,8.4,31.1,10.1,42.4,3.7,5.1-3.4,10.6-7.2,14-12.4,7.6-14.2,7.7-33.8-3.3-46.3l-.4.2h0Z"
              style="fill:#fff; stroke:#000; stroke-linecap:round; stroke-linejoin:round; stroke-width:3px;" />
            <path d="M396,121.1c-13.8,13.8-26.8,28.7-41.6,41.4"
              style="fill:none; stroke:#000; stroke-linecap:round; stroke-linejoin:round; stroke-width:3px;" />
            <path d="M354.6,121.1c12.5,14.9,27.2,28.1,41.3,41.3"

          </g>
          <path class="zu-hit-area" style="fill:transparent;pointer-events:all;"
            d="M403.9,116.1c-9.4-8.2-22.5-12.2-34.9-10.5-3.6.8-7.3,2.3-11,3.3-3.2,1.1-6.5,1.8-9,4.2-14.4,16.2-16,43.7,2.2,57.8,9.9,8.4,31.1,10.1,42.4,3.7,5.1-3.4,10.6-7.2,14-12.4,7.6-14.2,7.7-33.8-3.3-46.3l-.4.2h0Z" />
        </g>
      </g>

      <a id="weiter-link" tabindex="0" aria-label="Weiter nach links" role="button" aria-hidden="true">
        <g aria-hidden="true">
          <path style="fill:aqua;stroke:#000;stroke-linecap:round;stroke-linejoin:round;stroke-width:3px;"
            d="M61.9,372.5s56.5-66.3,69.9-83.4c.2,15.1,1.6,28.5,1.1,43.8,23.5.5,44.5-1.1,44.5-1.1l2,74.9s-20.7,2.8-44.5,1c.7,14.2,1.1,30,1.1,44.3l-74.1-79.7h0v.2Z" />
        </g>
        <path style="fill:transparent;pointer-events:all;"
          d="M61.9,372.5s56.5-66.3,69.9-83.4c.2,15.1,1.6,28.5,1.1,43.8,23.5.5,44.5-1.1,44.5-1.1l2,74.9s-20.7,2.8-44.5,1c.7,14.2,1.1,30,1.1,44.3l-74.1-79.7h0v.2Z" />
        <text class="room-label" x="9%" y="50%">Weiter</text>

    </svg>
  </div>

  <script>
    // Kontrastwert berechnen und anzeigen
    function toLinear(c) {
      const v = c / 255;
      return v <= 0.04045 ? v / 12.92 : Math.pow((v + 0.055) / 1.055, 2.4);
    }
    function luminance(r, g, b) {
      return 0.2126 * toLinear(r) + 0.7152 * toLinear(g) + 0.0722 * toLinear(b);
    }
    function contrast(l1, l2) {
      const hi = Math.max(l1, l2), lo = Math.min(l1, l2);
      return (hi + 0.05) / (lo + 0.05);
    }

    const lBg = luminance(0, 50, 0);
    const lSt = luminance(0, 255, 0);
    const cr = contrast(lBg, lSt);

    document.getElementById('contrast-ratio').textContent = cr.toFixed(2) + ':1';
    document.getElementById('contrast-ratio').classList.toggle('pass', cr >= 7.0);

    const passAA  = cr >= 4.5;
    const passAAA = cr >= 7.0;
    const fillPct = Math.min(100, Math.max(0, (cr - 1) / 6 * 100));
    const barFill = document.getElementById('contrast-bar-fill');
    barFill.style.width      = fillPct + '%';
    barFill.style.background = passAAA ? '#44cc44' : passAA ? '#ff8800' : '#e63232';

    // Navigation für weiter-link (href entfernt um URL-Vorlesen zu vermeiden)
    var weiterLink = document.getElementById('weiter-link');
    weiterLink.addEventListener('click', function() { window.location.href = '11_Kueche_3.html'; });
    weiterLink.addEventListener('keydown', function(e) {
      if (e.key === 'Enter' || e.key === ' ') { e.preventDefault(); window.location.href = '11_Kueche_3.html'; }
    });
  </script>

       ICONS

  <style>
    :root {
      --wcag-farbe: rgb(35, 35, 255);
    }
  </style>
  <script>
    window.LEVEL_CONFIG = {
      hilfeUrl: '10_Wohnzimmer_H.html',
      menuUrl: 'levels.html',
    };
  </script>
  <script src="icons.js"></script>

  <script>
    (function () {
      var bildSmall = document.getElementById('bild-small');
      var bildPanel = document.getElementById('bild-panel');
      var zuButton = document.getElementById('zu-button');
      var weiterLink = document.getElementById('weiter-link');

      bildPanel.style.display = 'none';
      weiterLink.style.display = 'none';
      weiterLink.setAttribute('tabindex', '-1');
      weiterLink.setAttribute('aria-hidden', 'true');

      // Hint text as body-level HTML so it scales with browser zoom
      var hinweisEl = document.createElement('p');
      var hinweisText = 'Ein Wort mit 7 Buchstaben. Der erste sind zwei senkrechte Striche, welche durch einen waagrechten verbunden sind. Der zweite ist ein senkrechter Strich, mit einem Punkt oberhalb. Der dritte ist ein senkrechter Strich, mit einem Bogen nach unten. Der vierte ist ein zick-zack mit Anfang und Ende oben und einer Spitze in der Mitte. Der fünfte ist ein fast geschlossener Kreis, mit einem horizontalen Strich im oberen Bereich, der es schließt. Der sechste Buchstabe ist der gleiche wie der zweite Buchstabe. Der siebte ist eine Abfolge von oben nach unten mit zwei Kurven.';
      hinweisEl.setAttribute('aria-live', 'assertive');
      hinweisEl.setAttribute('aria-atomic', 'true');
      hinweisEl.setAttribute('tabindex', '0');
      hinweisEl.style.cssText = ['display:none', 'position:fixed', 'margin:0', "font-family:'Lex',sans-serif", 'font-size:1.4rem', 'color:#ffffff', 'line-height:1.2', 'z-index:100', 'overflow-y:auto', 'box-sizing:border-box', 'padding:4px 8px', 'word-break:break-word'].join(';');
      (function(){
        var s=document.querySelector('.room-overlay')||document.querySelector('.room-svg')||document.querySelector('svg');
        s?s.parentNode.insertBefore(hinweisEl,s):document.body.appendChild(hinweisEl);
      })();
      var tabTrapFn = null;

      function positionHinweis() {
        var svg = document.querySelector('.room-overlay');
        if (!svg) return;
        var r = svg.getBoundingClientRect();
        var sx = r.width  / 1600;
        var sy = r.height / 900;
        hinweisEl.style.left      = (r.left + 390 * sx) + 'px';
        hinweisEl.style.top       = (r.top  + 280 * sy) + 'px';
        hinweisEl.style.width     = (820 * sx) + 'px';
        hinweisEl.style.height = (340 * sy) + 'px';
      }

      window.addEventListener('resize', function () {
        if (hinweisEl.style.display !== 'none') positionHinweis();
      });
      window.addEventListener('scroll', function () {
        if (hinweisEl.style.display !== 'none') positionHinweis();
      });

      function openBild() {
        bildSmall.style.display = 'none';
        bildPanel.style.display = '';
        bildPanel.setAttribute('aria-hidden', 'false');
        positionHinweis();
        hinweisEl.style.display = 'block';
        setTimeout(function() {
          hinweisEl.textContent = hinweisText;
          hinweisEl.focus();
          if (tabTrapFn) document.removeEventListener('keydown', tabTrapFn);
          tabTrapFn = function(e) {
            if (e.key !== 'Tab') return;
            e.preventDefault();
            if (document.activeElement === zuButton) { hinweisEl.focus(); }
            else { zuButton.focus(); }
          };
          document.addEventListener('keydown', tabTrapFn);
        }, 50);
      }

      function closeBild() {
        if (tabTrapFn) { document.removeEventListener('keydown', tabTrapFn); tabTrapFn = null; }
        bildPanel.style.display = 'none';
        bildPanel.setAttribute('aria-hidden', 'true');
        hinweisEl.style.display = 'none';
        hinweisEl.textContent = '';
        bildSmall.style.display = '';
        weiterLink.style.display = '';
        weiterLink.setAttribute('tabindex', '0');
        weiterLink.setAttribute('aria-hidden', 'false');
        weiterLink.focus();
      }

      bildSmall.addEventListener('click', openBild);
      bildSmall.addEventListener('keydown', function (e) {
        if (e.key === 'Enter' || e.key === ' ') { e.preventDefault(); openBild(); }
      });
      zuButton.addEventListener('click', closeBild);
      zuButton.addEventListener('keydown', function (e) {
        if (e.key === 'Enter' || e.key === ' ') { e.preventDefault(); closeBild(); }
      });
    }());
  </script>


</body>
