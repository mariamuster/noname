    <style>
      @font-face {
        font-family: "Lex";
        src: url("fonts/Lex.ttf") format("truetype");
      }
      body {
        font-family: "Lex", sans-serif;
      }

      svg {
        border: 0cm solid rgba(0, 0, 0, 0.454);
      }

      /* Figuren */
      a.figur-link > path {
        fill: transparent;
        pointer-events: all;
      }
      a.figur-link:hover > path {
        fill: rgba(65, 65, 65, 0.7) !important;
      }
      a.figur-link:focus-visible > path {
        fill: rgba(65, 65, 65, 0.4) !important;
      }
      a>path,
      a>rect {
        fill: transparent;
        pointer-events: all;
      }

      a:hover>path,
      a:hover>rect {
        fill: rgba(65, 65, 65, 0.7) !important;
      }

      a:focus {
        outline: none;
      }
      a:focus-visible>path,
      a:focus-visible>rect {
        stroke: black;
        fill: transparent;
        stroke-width: 3px;
        filter: drop-shadow(0 0 6px white) drop-shadow(0 0 3px white);
      }

      /* Pfeil */
      .pfeil-shape {
        fill: aqua !important;
        pointer-events: all;
      }
      #pfeil-btn:hover > path {
        fill: rgb(0, 180, 180) !important;
      }
      #pfeil-btn:not(:focus-visible) > path {
        filter: none !important;
        stroke: #000;
      }

      /* Zu-buttons */
      .d-zu-btn:hover path {
        fill: rgba(180, 180, 180, 0.8) !important;
      }

      /* Weiter-Button */
      a.d-weiter-btn > path {
        fill: #fff;
        pointer-events: inherit;
      }
      a.d-weiter-btn:hover > path {
        fill: rgba(180, 180, 180, 0.9) !important;
      }
      a.d-weiter-btn:focus-visible > path {
        stroke: black !important;
        stroke-width: 8px !important;
        paint-order: stroke fill;
        filter: drop-shadow(0 0 6px white) drop-shadow(0 0 3px white) !important;
      }

      /* Feld + Zu */
      a.d-feld-btn > path {
        pointer-events: all;
      }
      a.d-zu-btn > path {
        fill: #fff;
        pointer-events: all;
      }
      a.d-zu-btn:focus-visible > path {
        stroke: black !important;
        stroke-width: 8px !important;
        paint-order: stroke fill;
        filter: drop-shadow(0 0 6px white) drop-shadow(0 0 3px white) !important;
      }

      /* Tür */
      a.tuer-link > path {
        fill: transparent;
        pointer-events: all;
      }
      a.tuer-link:hover > path {
        fill: rgba(65, 65, 65, 0.7) !important;
      }

      #dialog-overlay {
        display: none;
        position: fixed;
        inset: 0;
        z-index: 100;
      }
      #dialog-overlay.open {
        display: block;
      }

      #dialog-svg {
        position: fixed;
        inset: 0;
        width: 100vw;
        height: 100vh;
      }

      .d-weiter-btn,
      .d-feld-btn,
      .d-zu-btn {
        cursor: pointer;
      }
    </style>

    <script>
      // ── Dialogdefinitionen

      const DIALOGS = [
        {
          group: "dlg-1",
          closeOnFeld: true,
          closeOnZu: false,
          weiterId: "dlg1-weiter",
          lines: ["dlg1-line1"],
          endX: { end: 1300, start: 300 },

          // Gespräch
          conversation: [
            { text: "Kannst du mir helfen?", align: "end" },
            { text: "Keine Zeit", align: "start" },
          ],
        },
        {
          group: "dlg-2",
          closeOnFeld: false,
          closeOnZu: true,
          weiterId: "dlg2-weiter",
          lines: ["dlg2-line1"],
          endX: { end: 1300, start: 300 },
          conversation: [
            { text: "Entschuldigung?", align: "end" },
            { text: "Ja?", align: "start" },
            { text: "Kannst du mir helfen?", align: "end" },
            { text: "Ich denke nicht.", align: "start" },
          ],
        },
        {
          group: "dlg-3",
          closeOnFeld: false,
          closeOnZu: true,
          weiterId: "dlg3-weiter",
          lines: ["dlg3-line1"],
          endX: { end: 1300, start: 300 },
          conversation: [
            { text: "Entschuldigung?", align: "end" },
            { text: "Ja?", align: "start" },
            { text: "Weisst du den Code?", align: "end" },
            { text: "Ja! 1234.", align: "start" },
          ],
        },
      ];

      // Track which dialogs are completed (by index)
      const completed = new Set();
      let activeIdx = 0;
      let convStep = 0;
      let openerLink = null;

      const overlay = document.getElementById("dialog-overlay");
      const dlgSvg = document.getElementById("dialog-svg");

      function renderLines(def) {
        const entry = def.conversation[convStep - 1];
        const lineEl = document.getElementById(def.lines[0]);
        lineEl.textContent = entry.text;
        lineEl.setAttribute("text-anchor", entry.align === "end" ? "end" : "start");
        lineEl.setAttribute("x", entry.align === "end" ? def.endX.end : def.endX.start);
        lineEl.setAttribute("visibility", "visible");

        const w = document.getElementById(def.weiterId);
        if (w) {
          const isLast = convStep >= def.conversation.length;
          w.style.display = isLast ? "none" : "inline";
        }
      }

      function showDialog(idx) {
        DIALOGS.forEach((d) => {
          document.getElementById(d.group).setAttribute("visibility", "hidden");
          const w = document.getElementById(d.weiterId);
          if (w) w.style.display = "none";
          // Clear all text lines
          d.lines.forEach((lineId) => {
            const el = document.getElementById(lineId);
            if (el) {
              el.textContent = "";
              el.setAttribute("visibility", "hidden");
            }
          });
        });
        activeIdx = idx;
        convStep = 1;
        const def = DIALOGS[idx];
        document.getElementById(def.group).setAttribute("visibility", "visible");
        renderLines(def);
      }

      function openDialog(opener) {
        const idx = parseInt(opener.getAttribute("data-dialog-index"), 10);
        // Dialog 3 (index 2) only available after dialogs 0 and 1 are done
        if (idx === 2 && (!completed.has(0) || !completed.has(1))) return;
        // Already completed dialogs can't be reopened
        if (completed.has(idx)) return;
        openerLink = opener;
        showDialog(idx);
        overlay.classList.add("open");
        overlay.setAttribute("aria-hidden", "false");
        dlgSvg.focus();
      }

      function closeDialog() {
        overlay.classList.remove("open");
        overlay.setAttribute("aria-hidden", "true");
        // If conversation was fully read, mark as completed on close
        const def = DIALOGS[activeIdx];
        if (def && convStep >= def.conversation.length && !completed.has(activeIdx)) {
          completed.add(activeIdx);
          if (openerLink) {
            openerLink.style.pointerEvents = "none";
            openerLink.setAttribute("tabindex", "-1");
            openerLink.setAttribute("aria-disabled", "true");
          }
        }
        if (completed.size >= 3) {
          const pfeil = document.getElementById("pfeil-btn");
          pfeil.style.display = "inline";
          pfeil.focus();
        } else if (openerLink) {
          openerLink.focus();
        }
      }

      function advanceConversation() {
        const def = DIALOGS[activeIdx];
        if (convStep < def.conversation.length) {
          convStep++;
          renderLines(def);
        } else {
          completed.add(activeIdx);
          if (openerLink) {
            openerLink.style.pointerEvents = "none";
            openerLink.setAttribute("tabindex", "-1");
            openerLink.setAttribute("aria-disabled", "true");
          }
          closeDialog();
        }
      }

      // ── Event-Listener ─────────────────────────────────────────────

      document.getElementById("tuer-link").addEventListener("click", function (e) {
        e.preventDefault();
        window.location.href = completed.size >= 2 ? "1_Haus_4.html" : "1_Haus_2.html";
      });

      document.querySelectorAll(".figur-link").forEach((link) => {
        link.addEventListener("click", function (e) {
          e.preventDefault();
          openDialog(this);
        });
      });

      dlgSvg.addEventListener("click", function (e) {
        if (e.target.closest(".d-weiter-btn")) {
          e.preventDefault();
          advanceConversation();
          return;
        }
        if (e.target.closest(".d-zu-btn")) {
          e.preventDefault();
          closeDialog();
          return;
        }
        if (e.target.closest(".d-feld-btn")) {
          e.preventDefault();
          closeDialog();
          return;
        }
      });

      document.addEventListener("keydown", function (e) {
        if (!overlay.classList.contains("open")) return;
        if (e.key === "Escape") {
          closeDialog();
          return;
        }

        if (e.key === "Tab") {
          e.preventDefault();
          const focusable = Array.from(
            dlgSvg.querySelectorAll('a[role="button"]'),
          ).filter((el) => {
            if (el.getAttribute("visibility") === "hidden") return false;
            if (el.getAttribute("tabindex") === "-1") return false;
            let p = el.parentElement;
            while (p && p !== dlgSvg) {
              if (p.getAttribute("visibility") === "hidden") return false;
              p = p.parentElement;
            }
            return true;
          });
          if (!focusable.length) return;
          const idx = focusable.indexOf(document.activeElement);
          if (e.shiftKey) {
            const prev = idx <= 0 ? focusable[focusable.length - 1] : focusable[idx - 1];
            prev.focus();
          } else {
            const next = idx === -1 || idx >= focusable.length - 1 ? focusable[0] : focusable[idx + 1];
            next.focus();
          }
        }
      });
    </script>
  </body>
