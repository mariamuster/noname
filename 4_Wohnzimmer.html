<!DOCTYPE html>
<html lang="en">

<head>
  <meta charset="UTF-8">
  <title>Wohnzimmer</title>
  <style>
    @font-face {
      font-family: 'Lex';
      src: url('fonts/Lexend_Regular.ttf') format('truetype');
    }

    *,
    *::before,
    *::after {
      box-sizing: border-box;
      margin: 0;
      padding: 0;
    }

    body {
      font-family: 'Lex', sans-serif;
      background: rgb(255, 255, 255);
      min-height: 100vh;
      display: flex;
      flex-direction: column;
      align-items: center;
      transition: background 0.25s;
    }

    /* ── CONTROLS BAR ── */
    #controls {
      width: 100%;
      display: flex;
      gap: 25px;
      align-items: center;
      justify-content: center;
      flex-wrap: wrap;
      padding: 12px 24px;
      background: rgba(0, 0, 0, 0.8);
      position: sticky;
      top: 0;
      z-index: 10;
    }

    .ctrl-group {
      display: flex;
      flex-direction: column;
      gap: 8px;
    }

    .ctrl-label {
      font-size: 16px;
      font-weight: 500;
      letter-spacing: 0.14em;
      text-transform: uppercase;
      color: rgba(255, 255, 255, 0.9);
    }

    .ctrl-inline {
      display: flex;
      gap: 17px;
      align-items: center;
    }

    .sliders {
      display: flex;
      flex-direction: column;
      gap: 10px;
    }

    .slider-row {
      display: flex;
      align-items: center;
      gap: 7px;
    }

    .channel-tag {
      font-size: 16px;
      font-weight: 500;
      width: 17px;
      color: rgba(255, 255, 255, 0.9);
    }

    input[type=range] {
      overflow: visible;
      appearance: none;
      -webkit-appearance: none;
      height: 10px;
      width: 150px;
      border-radius: 0x;
      background: rgba(255, 255, 255, 0.5);
      cursor: pointer;
      outline: none;
    }
    input[type=range]:focus-visible {
      outline: 3px solid aqua;
      outline-offset: 4px;
    }

    input[type=range]::-webkit-slider-thumb {
      appearance: none;
      -webkit-appearance: none;
      width: 24px;
      height: 24px;
      border-radius: 50%;
      background: #fff;
      border: 3px solid rgba(0, 0, 0, 0.1);
      cursor: pointer;
    }

    input[type=range]::-moz-range-thumb {
      width: 24px;
      height: 24px;
      border-radius: 50%;
      background: #fff;
      border: 1px solid rgba(0, 0, 0, 0.5);
      cursor: pointer;
    }

    .val-num {
      font-size: 16px;
      font-variant-numeric: tabular-nums;
      width: 26px;
      text-align: right;
      color: rgba(255, 255, 255, 0.9);
    }

    .color-preview {
      width: 44px;
      height: 44px;
      border-radius: 5px;
      border: 1.5px solid rgba(255, 255, 255, 0.9);
      flex-shrink: 0;
      align-self: center;
      transition: background 0.25s;
    }

    /* ── CONTRAST Panel ── */
    #contrast-panel {
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 3px;
      padding: 0 18px;
      border-left: 3px solid rgba(255, 255, 255, 0.9);
      border-right: 3px solid rgba(255, 255, 255, 0.9);
    }

    #contrast-ratio {
      font-size: 40px;
      font-weight: 500;
      letter-spacing: -0.02em;
      color: rgba(255, 255, 255);
      line-height: 1;
      transition: color 0.3s, text-shadow 0.3s;
    }

    #contrast-ratio.pass {
      color: #00ffcc;
    }

    #contrast-label {
      font-size: 16px;
      font-weight: 500;
      letter-spacing: 0.1em;
      text-transform: uppercase;
      color: rgba(255, 255, 255, 0.9);
    }

    #wcag-badges {
      display: flex;
      gap: 10px;
      margin-top: 3px;
    }

    .badge {
      font-size: 16px;
      font-weight: 600;
      letter-spacing: 0.04em;
      padding: 5px 7px;
      border-radius: 3px;
      border: 1px solid rgba(255, 255, 255, 0.9);
      color: rgba(255, 255, 255, 0.9);
      transition: all 0.25s;
    }

    .badge.active {
      background: #00ffcc;
      border-color: #00ffcc;
      color: #000;
    }

    #room-wrapper {
      width: 100%;
      max-width: 1600px;
      position: relative;
    }

    #room-svg {
      width: 100%;
      height: auto;
      display: block;
    }

    /* Creature */
    #Creature {
      fill: rgb(255, 255, 255);
      stroke: rgb(255, 255, 255);
      stroke-linecap: round;
      stroke-linejoin: round;
      stroke-width: 3px;
    }

    /* Gesicht */
    #room-svg .st0 {
      stroke: #000;
      fill: none;
      stroke-linecap: round;
      stroke-linejoin: round;
      stroke-width: 3px;
    }

    #room-svg .st1 {
      stroke: #fff;
      fill: #000;
      stroke-linecap: round;
      stroke-linejoin: round;
      stroke-width: 3px;
    }

    /* Outline */
    #room-svg .dyn {
      fill: none;
      stroke: rgb(255, 0, 255);
      stroke-linecap: round;
      stroke-linejoin: round;
      stroke-width: 3px;
    }

    /* Door path */
    #Door {
      stroke: rgb(255, 255, 255);
      stroke-linecap: round;
      stroke-linejoin: round;
      stroke-width: 3px;
      fill: none;
      transition: stroke 0.35s, fill 0.35s, stroke-width 0.35s;
    }

    #Door.highlighted {
      stroke-width: 4px;
      animation: doorPulse 1.8s ease-in-out infinite;
    }

    @keyframes doorPulse {

      0%,
      100% {
        filter: drop-shadow(0 0 6px var(--hl-color-glow));
      }

      50% {
        filter: drop-shadow(0 0 18px var(--hl-color-glow));
      }
    }

    /* Door Click */
    #door-link {
      display: none;
    }

    #door-link.active {
      display: inline;
      cursor: pointer;
    }

    #door-link path {
      fill: transparent;
      stroke: none;
      pointer-events: all;
    }

    #door-link:hover~#Door,
    #door-link:focus~#Door {
      stroke-width: 6px;
    }
    #door-link:focus { outline: none; }

    a.nav-btn>path,
    a.nav-btn>rect {
      fill: transparent;
      pointer-events: all;
      cursor: pointer;
    }

    a.nav-btn:hover>path,
    a.nav-btn:focus>path,
    a.nav-btn:hover>rect,
    a.nav-btn:focus>rect {
      fill: rgba(255, 255, 255, 0.09) !important;
    }

    /* ── CREATURE HIGHLIGHT ── */
    #Creature.highlighted {
      animation: creaturePulse 1.8s ease-in-out infinite;
      stroke-width: 4px;
    }

    @keyframes creaturePulse {
      0%, 100% { filter: drop-shadow(0 0 6px var(--hl-color-glow)); }
      50%       { filter: drop-shadow(0 0 18px var(--hl-color-glow)); }
    }

    /* Creature click area */
    #creature-link {
      display: none;
    }
    #creature-link.active {
      display: inline;
      cursor: pointer;
    }
    #creature-link > path {
      fill: transparent;
      stroke: none;
      pointer-events: all;
    }
    #creature-link:hover > path,
    #creature-link:focus-visible > path {
      fill: rgba(255, 255, 255, 0.9);
    }
    #creature-link:focus { outline: none; }

    /* ── DIALOG ── */
    #dialog-overlay {
      display: none;
      position: fixed;
      inset: 0;
      z-index: 100;
    }
    #dialog-overlay.open {
      display: block;
    }
    #dialog-svg {
      position: fixed;
      inset: 0;
      width: 100vw;
      height: 100vh;
    }
    .d-weiter-btn,
    .d-zu-btn {
      cursor: pointer;
    }
    a.d-zu-btn > path {
      pointer-events: all;
    }
    a.d-weiter-btn > path {
      fill: transparent;
      pointer-events: all;
    }
    a.d-weiter-btn:hover > path,
    a.d-weiter-btn:focus-visible > path {
      fill: rgba(65, 65, 65, 0.7) !important;
    }

    /* Pfeil hover */
    #pfeil-link > path {
      transition: filter 0.2s, opacity 0.2s;
    }
    #pfeil-link:hover > path,
    #pfeil-link:focus-visible > path {
      filter: drop-shadow(0 0 10px rgba(0, 0, 0, 0.9));
      opacity: 0.5;
    }
    #pfeil-link:focus { outline: none; }
  </style>
</head>

  <script>
    function toLinear(c) {
      const v = c / 255;
      return v <= 0.04045 ? v / 12.92 : Math.pow((v + 0.055) / 1.055, 2.4);
    }
    function luminance(r, g, b) {
      return 0.2126 * toLinear(r) + 0.7152 * toLinear(g) + 0.0722 * toLinear(b);
    }
    function contrast(l1, l2) {
      const hi = Math.max(l1, l2), lo = Math.min(l1, l2);
      return (hi + 0.05) / (lo + 0.05);
    }

    const els = id => document.getElementById(id);
    const bgR = els('bg-r'), bgG = els('bg-g'), bgB = els('bg-b');
    const stR = els('st-r'), stG = els('st-g'), stB = els('st-b');
    const bgPrev = els('bg-preview');
    const stPrev = els('stroke-preview');
    const crEl = els('contrast-ratio');
    const badgeAA = els('badge-aa');
    const badgeAAA = els('badge-aaa');
    const doorEl = els('Door');
    const creature = els('Creature');
    const creatureLink = els('creature-link');
    const dynPaths = document.querySelectorAll('.dyn');

    function update() {
      const br = +bgR.value, bg_ = +bgG.value, bb = +bgB.value;
      const sr = +stR.value, sg = +stG.value, sb = +stB.value;

      els('bg-r-val').textContent = br;
      els('bg-g-val').textContent = bg_;
      els('bg-b-val').textContent = bb;
      els('st-r-val').textContent = sr;
      els('st-g-val').textContent = sg;
      els('st-b-val').textContent = sb;

      const bgStr = `rgb(${br},${bg_},${bb})`;
      const stStr = `rgb(${sr},${sg},${sb})`;

      document.body.style.background = bgStr;
      bgPrev.style.background = bgStr;
      stPrev.style.background = stStr;
      dynPaths.forEach(p => p.style.stroke = stStr);

      // SVG-B Bild: fill = Hintergrundfarbe, stroke = Linienfarbe
      const svgbRect = els('svgb-rect');
      if (svgbRect) { svgbRect.style.fill = bgStr; svgbRect.style.stroke = stStr; }

      // Door — statisch, nie aktiv
      doorEl.style.stroke = stStr;
      doorEl.style.strokeWidth = '3px';
      doorEl.style.fill = 'none';
      doorEl.style.filter = 'none';

      const lBg = luminance(br, bg_, bb);
      const lSt = luminance(sr, sg, sb);
      const cr = contrast(lBg, lSt);
      crEl.textContent = cr.toFixed(2) + ':1';

      const passAA = cr >= 4.5;
      const passAAA = cr >= 7.0;
      badgeAA.classList.toggle('active', passAA);
      badgeAAA.classList.toggle('active', passAAA);
      crEl.classList.toggle('pass', passAAA);

      if (passAAA) {
        const hr = 255 - br, hg = 255 - bg_, hb = 255 - bb;
        const hlStr = `rgb(${hr},${hg},${hb})`;
        document.documentElement.style.setProperty('--hl-color-glow', `rgba(${hr},${hg},${hb},0.7)`);

        // Wesen leuchtet auf
        creature.classList.add('highlighted');
        creature.style.fill = hlStr;
        creature.style.stroke = hlStr;
        creature.style.strokeWidth = '4px';
        creatureLink.classList.add('active');
        creatureLink.setAttribute('tabindex', '0');
      } else {
        creature.classList.remove('highlighted');
        creature.style.fill = bgStr;
        creature.style.stroke = stStr;
        creature.style.strokeWidth = '3px';
        creatureLink.classList.remove('active');
        creatureLink.setAttribute('tabindex', '-1');
      }
    }

    [bgR, bgG, bgB, stR, stG, stB].forEach(el => el.addEventListener('input', update));

    // Keyboard slider control: single press = ±1, held = accelerates to ±5
    const REPEAT_DELAY    = 350;  // ms before repeat kicks in
    const REPEAT_INTERVAL = 40;   // ms between repeat steps
    const STEP_SLOW = 1;
    const STEP_FAST = 5;

    document.querySelectorAll('input[type=range]').forEach(slider => {
      let repeatTimer    = null;
      let repeatInterval = null;
      let activeDir      = 0;

      function applyStep(step) {
        slider.value = Math.min(255, Math.max(0, +slider.value + step));
        slider.dispatchEvent(new Event('input'));
      }

      function stopRepeat() {
        clearTimeout(repeatTimer);
        clearInterval(repeatInterval);
        repeatTimer    = null;
        repeatInterval = null;
        activeDir      = 0;
      }

      slider.addEventListener('keydown', function(e) {
        if (e.key !== 'ArrowLeft' && e.key !== 'ArrowRight' &&
            e.key !== 'ArrowUp'   && e.key !== 'ArrowDown') return;

        // Prevent the browser from also moving the slider natively
        e.preventDefault();

        const dir = (e.key === 'ArrowRight' || e.key === 'ArrowUp') ? 1 : -1;

        // If already repeating in the same direction, do nothing (interval handles it)
        if (activeDir === dir) return;

        stopRepeat();
        activeDir = dir;

        // Immediate single step
        applyStep(dir * STEP_SLOW);

        // After delay, start fast repeat
        repeatTimer = setTimeout(() => {
          repeatInterval = setInterval(() => applyStep(dir * STEP_FAST), REPEAT_INTERVAL);
        }, REPEAT_DELAY);
      });

      slider.addEventListener('keyup', stopRepeat);
      slider.addEventListener('blur',  stopRepeat);
    });

    // ── Dialog ────────────────────────────────────────────────────────────────
    const DIALOGS = [
      {
        group: 'dlg-1',
        weiterId: 'dlg1-weiter',
        lines: ['dlg1-line1'],
        endX: { end: 1300, start: 300 },
        conversation: [
          { text: 'Weisst du wo Büro 146 ist?', align: 'end' },
          { text: 'Nein.', align: 'start' },
          { text: 'Ok, danke.', align: 'end' },
        ],
      },
    ];

    let convStep = 0;
    let openerLink = null;
    const overlay = document.getElementById('dialog-overlay');
    const dlgSvg  = document.getElementById('dialog-svg');

    function renderLines(def) {
      const entry  = def.conversation[convStep - 1];
      const lineEl = document.getElementById(def.lines[0]);
      lineEl.textContent = entry.text;
      lineEl.setAttribute('text-anchor', entry.align === 'end' ? 'end' : 'start');
      lineEl.setAttribute('x', entry.align === 'end' ? def.endX.end : def.endX.start);
      lineEl.setAttribute('visibility', 'visible');
      const w = document.getElementById(def.weiterId);
      if (w) w.setAttribute('visibility', convStep >= def.conversation.length ? 'hidden' : 'visible');
    }

    function openDialog(opener) {
      openerLink = opener;
      convStep   = 1;
      const def  = DIALOGS[0];
      document.getElementById(def.group).setAttribute('visibility', 'visible');
      renderLines(def);
      overlay.classList.add('open');
      overlay.setAttribute('aria-hidden', 'false');
      dlgSvg.focus();
    }

    function closeDialog() {
      overlay.classList.remove('open');
      overlay.setAttribute('aria-hidden', 'true');
      document.getElementById(DIALOGS[0].group).setAttribute('visibility', 'hidden');
      convStep = 0;
      if (openerLink) openerLink.focus();
      // Pfeil einblenden
      const pfeil = document.getElementById('pfeil-link');
      pfeil.style.visibility = 'visible';
      pfeil.style.pointerEvents = 'auto';
    }

    function advanceConversation() {
      const def = DIALOGS[0];
      if (convStep < def.conversation.length) {
        convStep++;
        renderLines(def);
      } else {
        closeDialog();
      }
    }

    creatureLink.addEventListener('click', function (e) {
      e.preventDefault();
      openDialog(this);
    });

    dlgSvg.addEventListener('click', function (e) {
      if (e.target.closest('.d-weiter-btn')) { e.preventDefault(); advanceConversation(); return; }
      if (e.target.closest('.d-zu-btn'))     { e.preventDefault(); closeDialog();          return; }
    });

    document.addEventListener('keydown', function (e) {
      if (!overlay.classList.contains('open')) return;
      if (e.key === 'Escape') { closeDialog(); return; }
      if (e.key === 'Tab') {
        const focusable = Array.from(dlgSvg.querySelectorAll('a[role="button"]')).filter(el => {
          let p = el.parentElement;
          while (p && p !== dlgSvg) {
            if (p.getAttribute('visibility') === 'hidden') return false;
            p = p.parentElement;
          }
          return true;
        });
        if (!focusable.length) { e.preventDefault(); return; }
        const first = focusable[0], last = focusable[focusable.length - 1];
        if (e.shiftKey) { if (document.activeElement === first) { e.preventDefault(); last.focus(); } }
        else            { if (document.activeElement === last)  { e.preventDefault(); first.focus(); } }
      }
    });

    // Initialisierung
