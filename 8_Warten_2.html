<!DOCTYPE html>
<html lang="de">

<head>
  <meta charset="UTF-8">
  <title>Bibi 4</title>
  <link rel="stylesheet" href="image.css">
  <link rel="stylesheet" href="icons.css">
  <style>
    @font-face {
      font-family: 'Lex';
      src: url('fonts/Lexend_Regular.ttf') format('truetype');
    }

    body {
      font-family: 'Lex', sans-serif;
    }

    svg {
      border: none;
    }

    /* Allgemeine hover/focus-Stile */
    a:hover>path,
    a:hover>rect {
      fill: rgba(65, 65, 65, 0.7) !important;
    }

    a:focus {
      outline: none;
    }

    a:focus-visible>path,
    a:focus-visible>rect {
      stroke: black;
      fill: rgba(65, 65, 65, 0.2);
      stroke-width: 3px;
      outline-offset: 4px;
      filter: drop-shadow(0 0 6px rgb(0, 0, 0)) drop-shadow(0 0 6px rgb(0, 0, 0));
    }

    /* Wesen-Hitbereich: transparent, aber anklickbar */
    #wesen-link>path {
      fill: transparent;
      pointer-events: all;
    }

    #wesen-link:hover>path,
    #wesen-link:focus-visible>path {
      fill: rgba(65, 65, 65, 0.7) !important;
    }

    /* Dialog */
    #dialog-overlay {
      display: none;
      position: fixed;
      inset: 0;
      z-index: 100;
    }

    #dialog-overlay.open {
      display: block;
    }

    #dialog-svg {
      position: fixed;
      inset: 0;
      width: 100vw;
      height: 100vh;
    }

    .d-weiter-btn,
    .d-zu-btn {
      cursor: pointer;
    }

    a.d-zu-btn>path {
      pointer-events: all;
    }

    a.d-weiter-btn>path {
      fill: transparent;
      pointer-events: all;
    }

    a.d-weiter-btn:hover>path,
    a.d-weiter-btn:focus-visible>path {
      fill: rgba(65, 65, 65, 0.7) !important;
    }
  </style>
</head>

<body>
  <div class="room-wrapper">
    <img src="img/8_Warten_3.svg" alt="Grundriss eines Raums mit einem Wesen und einem Pfeil." class="responsive-img"
      tabindex="0" />

    <svg class="room-overlay" viewBox="0 0 1600 900" fill="none" xmlns="http://www.w3.org/2000/svg">

      <!-- Wesen — öffnet Dialog -->
      <a href="#" id="wesen-link" aria-label="Wesen ansprechen" aria-haspopup="dialog" role="button">
        <!-- Wesen-Körper -->

        <path class="cls-1"
          d="M860.6,475.7c9,.6,30.8-1.1,38.1.6.6,7.8,1.4,28.84,1.7,37.54l22.1.16c.3-18.2.8-20.89,0-38.79,10.9-1.7,48.1-8.4,48.7-23.8.6-12.6.8-26.3.8-38.9.8-19-.3-38.3-1.4-57.4-.6-15.4-3.6-22.1-14.6-26.3-13.2-2.2-27.1-.8-40.3,0-16.8,0-33.9-.3-50.4,1.4-21.3,0-42.9.4-64.1-1.1s-21.1,17.5-19.6,34.4c1.1,12.3,0,25.2-.8,37.5-.3,20.4-.6,42,3.9,61.8,2.2,7.8,42.5,9,47.6,11.5-.6,7-.6,16.5-.6,24.1,0,12.9-1.24,12.94-1.24,12.94l25.34.79s1.1-26.62,1.4-36.42h3.4,0Z" />
      </a>

      <!-- Pfeil — erscheint nach Dialog, führt zu Bibi 5 -->
      <a href="9_Haus_1.html" id="pfeil-link" aria-label="Weiter" role="button"
        style="visibility:hidden;pointer-events:none;">
        <path style="fill:aqua;stroke:#000;stroke-linecap:round;stroke-linejoin:round;stroke-width:3px;"
          d="M54.5,586.9s50-55.6,61.8-70c-.2,13.1.8,24.5,0,37.6,20.1.9,38.2,0,38.2,0v64.4s-17.9,2-38.2,0c.3,12.2.4,25.8,0,38l-61.8-70h0Z" />
      </a>

    </svg>
  </div>

  <!-- Dialog-Overlay -->
  <div id="dialog-overlay" aria-hidden="true">
    <svg id="dialog-svg" viewBox="0 0 1600 900" preserveAspectRatio="xMidYMid meet" xmlns="http://www.w3.org/2000/svg"
      role="dialog" aria-modal="true" tabindex="-1">
      <defs>
        <style>
          .d-feld {
            fill: #fff;
            stroke: #1d1e1c;
            stroke-width: 3px;
            stroke-linecap: round;
            stroke-linejoin: round;
          }

          .d-zu-shape {
            fill: #fff;
            stroke: #000;
            stroke-width: 3px;
            stroke-miterlimit: 10;
          }

          .d-btn-shape {
            fill: #fff;
            stroke: #1d1e1c;
            stroke-width: 3px;
            stroke-linecap: round;
            stroke-linejoin: round;
          }
        </style>
      </defs>

      <rect width="1600" height="900" fill="rgba(0,0,0,0)" />

      <g id="dlg-1" visibility="hidden" transform="translate(0,-370)">
        <!-- Dialogblase -->
        <path class="d-feld"
          d="M1450,603.2c-.4-10.5-399,8.8-613.1,3.2-235.4,3.5-686.9-2.1-686.9-2.1,12.6,47.4-2.3,96.7,8.5,144.4,1.8,23.9-7.4,117.9-7.4,117.9,252.4,10.3,506.1-7.2,758.8,5.1,169.1-13.7,531.7-7.9,531.7-7.9,0,0-2.7-170.6,8.5-260.6Z" />

        <!-- Schliessen-Button -->
        <a class="d-zu-btn" href="#" id="dlg1-zu" role="button" aria-label="Dialog schliessen">
          <path class="d-zu-shape"
            d="M172.3,544.5c-11.5-9.2-28.2-2.6-38.4,3.9-24.3,11.8-33.3,52.6-11.5,71.1,21.8,17.1,56.3,13.2,70.4-11.8,16.6-26.3,2.6-48.7-20.5-63.2Z" />
          <text font-family="Lex,sans-serif" font-size="40" fill="#000" text-anchor="middle" x="153" y="600">✕</text>
        </a>

        <!-- Weiter-Button -->
        <a class="d-weiter-btn" href="#" id="dlg1-weiter" role="button" aria-label="Weiter" visibility="hidden">
          <path class="d-btn-shape"
            d="M1192,841.7c70.8-2.1,141.4.4,212.2-3.5l4.7-56.1c-33.8-9.6-74.7,1.1-109.2.6-41.5,0-65-2.3-108.7-.8l1.1,59.8Z" />
          <text font-family="Lex,sans-serif" font-size="25" fill="#000" text-anchor="middle" x="1300"
            y="820">Weiter</text>
        </a>

        <!-- Dialogtext -->
        <text id="dlg1-line1" font-family="Lex,sans-serif" font-size="40" fill="#000" visibility="hidden" x="300"
          y="720"></text>
      </g>
    </svg>
  </div>

  <script>
    const DIALOGS = [
      {
        group: 'dlg-1',
        weiterId: 'dlg1-weiter',
        lines: ['dlg1-line1'],
        endX: { end: 1300, start: 300 },
        conversation: [
          { text: 'Bin ich hier richtig beim Büro 146?', align: 'end' },
          { text: 'Ja, aber haben sie die blauen Hinweise nicht gesehen?', align: 'start' },
          { text: 'Welche Hinweise?', align: 'end' },
          { text: 'Tut mir leid, sie brauchen die Hinweise.', align: 'start' },
        ],
      },
    ];

    let convStep = 0;
    let openerLink = null;

    const overlay = document.getElementById('dialog-overlay');
    const dlgSvg = document.getElementById('dialog-svg');

    function renderLines(def) {
      const entry = def.conversation[convStep - 1];
      const lineEl = document.getElementById(def.lines[0]);
      lineEl.textContent = entry.text;
      lineEl.setAttribute('text-anchor', entry.align === 'end' ? 'end' : 'start');
      lineEl.setAttribute('x', entry.align === 'end' ? def.endX.end : def.endX.start);
      lineEl.setAttribute('visibility', 'visible');

      const w = document.getElementById(def.weiterId);
      if (w) w.setAttribute('visibility', convStep >= def.conversation.length ? 'hidden' : 'visible');
    }

    function openDialog(opener) {
      openerLink = opener;
      convStep = 1;
      const def = DIALOGS[0];
      document.getElementById(def.group).setAttribute('visibility', 'visible');
      renderLines(def);
      overlay.classList.add('open');
      overlay.setAttribute('aria-hidden', 'false');
      dlgSvg.focus();
    }

    function closeDialog() {
      overlay.classList.remove('open');
      overlay.setAttribute('aria-hidden', 'true');
      document.getElementById(DIALOGS[0].group).setAttribute('visibility', 'hidden');
      convStep = 0;
      if (openerLink) openerLink.focus();
      // Pfeil einblenden
      const pfeil = document.getElementById('pfeil-link');
      pfeil.style.visibility = 'visible';
      pfeil.style.pointerEvents = 'auto';
    }

    function advanceConversation() {
      const def = DIALOGS[0];
      if (convStep < def.conversation.length) {
        convStep++;
        renderLines(def);
      } else {
        closeDialog();
      }
    }

    document.getElementById('wesen-link').addEventListener('click', function (e) {
      e.preventDefault();
      openDialog(this);
    });

    dlgSvg.addEventListener('click', function (e) {
      if (e.target.closest('.d-weiter-btn')) { e.preventDefault(); advanceConversation(); return; }
      if (e.target.closest('.d-zu-btn')) { e.preventDefault(); closeDialog(); return; }
    });

    document.addEventListener('keydown', function (e) {
      if (!overlay.classList.contains('open')) return;
      if (e.key === 'Escape') { closeDialog(); return; }
      if (e.key === 'Tab') {
        const focusable = Array.from(dlgSvg.querySelectorAll('a[role="button"]')).filter(el => {
          let p = el.parentElement;
          while (p && p !== dlgSvg) {
            if (p.getAttribute('visibility') === 'hidden') return false;
            p = p.parentElement;
          }
          return true;
        });
        if (!focusable.length) { e.preventDefault(); return; }
        const first = focusable[0], last = focusable[focusable.length - 1];
        if (e.shiftKey) { if (document.activeElement === first) { e.preventDefault(); last.focus(); } }
        else { if (document.activeElement === last) { e.preventDefault(); first.focus(); } }
      }
    });
  </script>
