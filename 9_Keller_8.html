<style>
  svg {
    border: none;
  }

  a:hover>path,
  a:hover>rect {
    fill: rgba(65, 65, 65, 0.7) !important;
  }

  a:focus-visible {
    outline: none;
  }

  a:focus-visible>path,
    a:focus-visible>rect {
      stroke: #005fcc;
      fill: rgba(0,95,204,0.08);
      stroke-width: 3px;
      filter: drop-shadow(0 0 4px #005fcc) drop-shadow(0 0 8px rgba(0,95,204,0.4));
    }

  .panel-overlay {
    display: none;
    position: absolute;
    top: 0;
    left: 0;
    width: 100%;
    height: 100%;
    z-index: 10;
  }

  .panel-overlay.aktiv {
    display: block;
  }

  .panel-overlay svg {
    width: 100%;
    height: 100%;
  }

  #pfeil-link {
    display: none;
  }

  #pfeil-link.sichtbar {
    display: inline;
  }

  .text-box {
      font-family: 'Lex', sans-serif;
      font-size: 4.5rem;
      padding: 0px;
      width: 100%;
      height: 100%;
      overflow-y: auto;
      box-sizing: border-box;
      background: transparent;
      color: #fff;
      word-break: break-word;
    }
</style>

<body>

            <path style="fill: none;" stroke="#000" stroke-width="3" stroke-linecap="round" stroke-linejoin="round"
              d="M396,121.1c-13.8,13.8-26.8,28.7-41.6,41.4" />

              d="M354.6,121.1c12.5,14.9,27.2,28.1,41.3,41.3" />

          <path style="fill:transparent;pointer-events:all;"
            d="M403.9,116.1c-9.4-8.2-22.5-12.2-34.9-10.5-3.6.8-7.3,2.3-11,3.3-3.2,1.1-6.5,1.8-9,4.2-14.4,16.2-16,43.7,2.2,57.8,9.9,8.4,31.1,10.1,42.4,3.7,5.1-3.4,10.6-7.2,14-12.4,7.6-14.2,7.7-33.8-3.3-46.3l-.4.2h0Z" />

    <!-- Panel 2-->

          d="M816.3,135.7s230.1,6.7,408.5,0c3.6,80.4,5.9,544.7,21.2,625.4-102.7,4.7-181.7-5.1-290.9,0-99.4,4.7-189-7.5-279.3,0-104.7,8.6-321.8-1.7-321.8-1.7,1.3-62.6,23.8-147.9,23.5-213.7.7-131.5-16.3-410.3-16.3-410.3l455.1.2h0Z" />
        <a id="zu2" tabindex="0" aria-label="Schliessen" role="button">
          <g aria-hidden="true">
            <path style="fill: white;" stroke="#000" stroke-width="3" stroke-linecap="round" stroke-linejoin="round"
              d="M403.9,116.1c-9.4-8.2-22.5-12.2-34.9-10.5-3.6.8-7.3,2.3-11,3.3-3.2,1.1-6.5,1.8-9,4.2-14.4,16.2-16,43.7,2.2,57.8,9.9,8.4,31.1,10.1,42.4,3.7,5.1-3.4,10.6-7.2,14-12.4,7.6-14.2,7.7-33.8-3.3-46.3l-.4.2h0Z" />
            <path style="fill: none;" stroke="#000" stroke-width="3" stroke-linecap="round" stroke-linejoin="round"
              d="M396,121.1c-13.8,13.8-26.8,28.7-41.6,41.4" />
            <path style="fill: none;" stroke="#000" stroke-width="3" stroke-linecap="round" stroke-linejoin="round"
              d="M354.6,121.1c12.5,14.9,27.2,28.1,41.3,41.3" />
          </g>

  </div>

    <script>
    var gesehen = { panel1: false, panel2: false };

    // Hint text as body-level HTML so it scales with browser zoom
    var hinweisEl1 = document.createElement('p');
    var hinweisText1 = 'Ein Bild im Hochformat auf dem ein Hinweis steht.';
    hinweisEl1.setAttribute('aria-live', 'assertive');
    hinweisEl1.setAttribute('aria-atomic', 'true');
    hinweisEl1.setAttribute('tabindex', '0');
    hinweisEl1.style.cssText = ['display:none', 'position:fixed', 'margin:0', "font-family:'Lex',sans-serif", 'font-size:4.5rem', 'color:#ffffff', 'line-height:1.2', 'z-index:100', 'overflow-y:auto', 'box-sizing:border-box', 'padding:4px 8px', 'word-break:break-word'].join(';');
    (function(){
      var s=document.querySelector('.room-overlay')||document.querySelector('svg');
      s?s.parentNode.insertBefore(hinweisEl1,s):document.body.appendChild(hinweisEl1);
    })();

    var hinweisEl2 = document.createElement('p');
    var hinweisText2 = 'Ein Bild im Querformat auf dem ein Hinweis steht.';
    hinweisEl2.setAttribute('aria-live', 'assertive');
    hinweisEl2.setAttribute('aria-atomic', 'true');
    hinweisEl2.setAttribute('tabindex', '0');
    hinweisEl2.style.cssText = ['display:none', 'position:fixed', 'margin:0', "font-family:'Lex',sans-serif", 'font-size:4.5rem', 'color:#ffffff', 'line-height:1.2', 'z-index:100', 'overflow-y:auto', 'box-sizing:border-box', 'padding:4px 8px', 'word-break:break-word'].join(';');
    (function(){
      var s=document.querySelector('.room-overlay')||document.querySelector('svg');
      s?s.parentNode.insertBefore(hinweisEl2,s):document.body.appendChild(hinweisEl2);
    })();
    var tabTrapFn = null;

    function positionEl(el, foX, foY, foW, foH) {
      var svg = document.querySelector('.room-overlay');
      if (!svg) return;
      var r = svg.getBoundingClientRect();
      var sx = r.width  / 1600;
      var sy = r.height / 900;
      el.style.left      = (r.left + foX * sx) + 'px';
      el.style.top       = (r.top  + foY * sy) + 'px';
      el.style.width     = (foW * sx) + 'px';
      el.style.height = (foH * sy) + 'px';
    }

    window.addEventListener('resize', function () {
      if (hinweisEl1.style.display !== 'none') positionEl(hinweisEl1, 550, 200, 550, 560);
      if (hinweisEl2.style.display !== 'none') positionEl(hinweisEl2, 420, 200, 700, 560);
    });
    window.addEventListener('scroll', function () {
      if (hinweisEl1.style.display !== 'none') positionEl(hinweisEl1, 550, 200, 550, 560);
      if (hinweisEl2.style.display !== 'none') positionEl(hinweisEl2, 420, 200, 700, 560);
    });

    function oeffnePanel(panelId, zuId) {
      document.getElementById(panelId).classList.add('aktiv');
      hinweisEl1.style.display = 'none';
      hinweisEl2.style.display = 'none';
      var hinweisElToShow;
      if (panelId === 'panel1') {
        positionEl(hinweisEl1, 550, 200, 550, 560);
        hinweisEl1.style.display = 'block';
        hinweisElToShow = hinweisEl1;
      } else {
        positionEl(hinweisEl2, 420, 200, 700, 560);
        hinweisEl2.style.display = 'block';
        hinweisElToShow = hinweisEl2;
      }
      var textToShow = (panelId === 'panel1') ? hinweisText1 : hinweisText2;
      var activeZuId = zuId;
      document.getElementById('bild1-btn').setAttribute('tabindex','-1');
      document.getElementById('bild2-btn').setAttribute('tabindex','-1');
      setTimeout(function() {
        if (hinweisElToShow) {
          hinweisElToShow.textContent = textToShow;
          hinweisElToShow.focus();
          if (tabTrapFn) document.removeEventListener('keydown', tabTrapFn);
          var activeZu = document.getElementById(activeZuId);
          tabTrapFn = function(e) {
            if (e.key !== 'Tab') return;
            e.preventDefault();
            if (document.activeElement === activeZu) { hinweisElToShow.focus(); }
            else { activeZu.focus(); }
          };
          document.addEventListener('keydown', tabTrapFn);
        }
      }, 50);
    }

    function schliessePanel(panelId) {
      if (tabTrapFn) { document.removeEventListener('keydown', tabTrapFn); tabTrapFn = null; }
      document.getElementById('bild1-btn').setAttribute('tabindex','0');
      document.getElementById('bild2-btn').setAttribute('tabindex','0');
      document.getElementById(panelId).classList.remove('aktiv');
      hinweisEl1.style.display = 'none';
      hinweisEl1.textContent = '';
      hinweisEl2.style.display = 'none';
      hinweisEl2.textContent = '';
      gesehen[panelId] = true;
      if (gesehen.panel1 && gesehen.panel2) {
        document.getElementById('pfeil-link').classList.add('sichtbar');
      }
    }

    // Bild 1
    var bild1Btn = document.getElementById('bild1-btn');
    bild1Btn.addEventListener('click', function () { oeffnePanel('panel1', 'zu1'); });
    bild1Btn.addEventListener('keydown', function (e) {
      if (e.key === 'Enter' || e.key === ' ') { e.preventDefault(); oeffnePanel('panel1', 'zu1'); }
    });

    // Bild 2
    var bild2Btn = document.getElementById('bild2-btn');
    bild2Btn.addEventListener('click', function () { oeffnePanel('panel2', 'zu2'); });
    bild2Btn.addEventListener('keydown', function (e) {
      if (e.key === 'Enter' || e.key === ' ') { e.preventDefault(); oeffnePanel('panel2', 'zu2'); }
    });

    // Zu 1
    var zu1 = document.getElementById('zu1');
    zu1.addEventListener('click', function () { schliessePanel('panel1'); });
    zu1.addEventListener('keydown', function (e) {
      if (e.key === 'Enter' || e.key === ' ') { e.preventDefault(); schliessePanel('panel1'); }
    });

    // Zu 2
    var zu2 = document.getElementById('zu2');
    zu2.addEventListener('click', function () { schliessePanel('panel2'); });
    zu2.addEventListener('keydown', function (e) {
      if (e.key === 'Enter' || e.key === ' ') { e.preventDefault(); schliessePanel('panel2'); }
    });

    // Navigation für pfeil-link
    var pfeilLink = document.getElementById('pfeil-link');
    if (pfeilLink) {
      pfeilLink.addEventListener('click', function() { window.location.href = '10_Bibi_4.html'; });
      pfeilLink.addEventListener('keydown', function(e) {
        if (e.key === 'Enter' || e.key === ' ') { e.preventDefault(); window.location.href = '10_Bibi_4.html'; }
      });
    }
  </script>
