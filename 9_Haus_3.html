<!DOCTYPE html>
<html lang="de">

<head>
  <meta charset="UTF-8">
  <title>Hinweise Haus</title>
  <link rel="stylesheet" href="image.css">
  <link rel="stylesheet" href="icons.css">
  <style>
    @font-face {
      font-family: 'Lex';
      src: url('fonts/Lex.ttf') format('truetype');
    }

    body {
      font-family: 'Lex', sans-serif;
      background: #ffffff;
      margin: 0;
      padding: 0;
    }

    .sr-only {
      position: absolute;
      width: 1px;
      height: 1px;
      padding: 0;
      margin: -1px;
      overflow: hidden;
      clip: rect(0,0,0,0);
      white-space: nowrap;
      border: 0;
    }



    .room-svg {
      display: block;
      width: 100%;
      height: auto;
    }

    #bild-small {
      cursor: pointer;
    }

    #bild-small path {
      transition: filter 0.15s ease, opacity 0.15s ease;
    }

    #bild-small:hover path {
      fill: rgba(64, 64, 64, 0.7);

    }

    #bild-small:focus {
      outline: none;
    }

    #bild-small:focus path {
      filter: drop-shadow(0 0 8px rgb(0, 0, 0)) drop-shadow(0 0 8px rgb(0, 0, 0));
      stroke-width: 5px;
    }

    #zu-button {
      cursor: pointer;
    }

    #zu-button .zu-circle {
      transition: fill 0.15s ease;
    }

    #zu-button:hover .zu-circle {
      fill: rgba(64, 64, 64, 0.7) !important;
    }

    #zu-button:focus {
      outline: none;
    }

    #zu-button:focus .zu-circle {
      filter: drop-shadow(0 0 6px rgb(0, 0, 0)) drop-shadow(0 0 6px rgb(0, 0, 0));
    }

    #weiter-link .pfeil-shape {
      transition: filter 0.15s ease;
    }

    #weiter-link:hover .pfeil-shape {
      fill: rgba(64, 64, 64, 0.7);
    }

    #weiter-link:focus {
      outline: none;
    }

    #weiter-link:focus .pfeil-shape {
      filter: drop-shadow(0 0 8px rgb(0, 0, 0)) drop-shadow(0 0 8px rgb(0, 0, 0));
    }
  </style>
</head>

<body>

  <!-- ════════════════════════════════════════════════════════════
       ICONS
  ════════════════════════════════════════════════════════════ -->
  <script>
    window.LEVEL_CONFIG = {
      hilfeUrl: '9_Haus_3H.html',
      menuUrl: 'levels.html'
    };

    // Navigation für weiter-link (href entfernt um URL-Vorlesen zu vermeiden)
    var weiterLink = document.getElementById('weiter-link');
    weiterLink.addEventListener('click', function() { window.location.href = '9_Keller_1.html'; });
    weiterLink.addEventListener('keydown', function(e) {
      if (e.key === 'Enter' || e.key === ' ') { e.preventDefault(); window.location.href = '9_Keller_1.html'; }
    });
  </script>
  <script src="icons.js"></script>

  <!-- ════════════════════════════════════════════════════════════
       INTERACTION
  ════════════════════════════════════════════════════════════ -->
  <script>
    (function () {
      var bildSmall = document.getElementById('bild-small');
      var bildPanel = document.getElementById('bild-panel');
      var zuButton = document.getElementById('zu-button');
      var weiterLink = document.getElementById('weiter-link');

      bildPanel.style.display = 'none';
      weiterLink.style.display = 'none';
      weiterLink.setAttribute('tabindex', '-1');
      weiterLink.setAttribute('aria-hidden', 'true');

      // "Hinweis" label as HTML element in <body> so it scales with browser zoom
      var hinweisEl = document.createElement('p');
      var hinweisText = 'Hinweis';
      hinweisEl.setAttribute('aria-live', 'assertive');
      hinweisEl.setAttribute('aria-atomic', 'true');
      hinweisEl.setAttribute('tabindex', '0');
      hinweisEl.style.cssText = [
        'display:none', 'position:fixed', 'margin:0',
        "font-family:'Lex',sans-serif", 'font-size:3.5rem',
        'color:#ffffff', 'line-height:1.2', 'text-align:center',
        'z-index:100', 'overflow-y:auto', 'box-sizing:border-box',
        'padding:4px 8px', 'word-break:break-word'
      ].join(';');
      (function(){
        var s=document.querySelector('.room-overlay')||document.querySelector('.room-svg')||document.querySelector('svg');
        s?s.parentNode.insertBefore(hinweisEl,s):document.body.appendChild(hinweisEl);
      })();
      var tabTrapFn = null;

      function positionHinweis() {
        var svg = document.getElementById('main-svg');
        if (!svg) return;
        var r = svg.getBoundingClientRect();
        var sx = r.width  / 1600;
        var sy = r.height / 900;
        // Full panel width: SVG x 563–1038, text area around y=420–490
        hinweisEl.style.width     = (475 * sx) + 'px';
        hinweisEl.style.left      = (r.left + 563 * sx) + 'px';
        hinweisEl.style.top       = (r.top  + 220 * sy) + 'px';
        hinweisEl.style.maxHeight = Math.max(90, 120 * sy) + 'px';
      }

      window.addEventListener('resize', function () {
        if (hinweisEl.style.display !== 'none') positionHinweis();
      });
      window.addEventListener('scroll', function () {
        if (hinweisEl.style.display !== 'none') positionHinweis();
      });

      function openBild() {
        bildSmall.style.display = 'none';
        bildPanel.style.display = '';
        bildPanel.setAttribute('aria-hidden', 'false');
        positionHinweis();
        hinweisEl.style.display = 'block';
        setTimeout(function() {
          hinweisEl.textContent = hinweisText;
          hinweisEl.focus();
          if (tabTrapFn) document.removeEventListener('keydown', tabTrapFn);
          tabTrapFn = function(e) {
            if (e.key !== 'Tab') return;
            e.preventDefault();
            if (document.activeElement === zuButton) { hinweisEl.focus(); }
            else { zuButton.focus(); }
          };
          document.addEventListener('keydown', tabTrapFn);
        }, 50);
      }

      function closeBild() {
        if (tabTrapFn) { document.removeEventListener('keydown', tabTrapFn); tabTrapFn = null; }
        bildPanel.style.display = 'none';
        bildPanel.setAttribute('aria-hidden', 'true');
        hinweisEl.style.display = 'none';
        hinweisEl.textContent = '';
        bildSmall.style.display = '';
        weiterLink.style.display = '';
        weiterLink.setAttribute('tabindex', '0');
        weiterLink.setAttribute('aria-hidden', 'false');
      }

      bildSmall.addEventListener('click', openBild);
      bildSmall.addEventListener('keydown', function (e) {
        if (e.key === 'Enter' || e.key === ' ') {
          e.preventDefault();
          openBild();
        }
      });

      zuButton.addEventListener('click', closeBild);
      zuButton.addEventListener('keydown', function (e) {
        if (e.key === 'Enter' || e.key === ' ') {
          e.preventDefault();
          closeBild();
        }
      });

    }());
  </script>

</body>

</html>
