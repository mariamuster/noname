  <style>
    *,
    *::before,
    *::after {
      box-sizing: border-box;
    }

    html,
    body {
      margin: 0;
      padding: 0;
      width: 100vw;
      height: 100vh;
      overflow: hidden;
      background: transparent;
      cursor: none;
    }

    .room-wrapper {
      position: relative;
      width: 100vw;
      height: 100vh;
    }

    #main-svg {
      position: absolute;
      top: 0;
      left: 0;
      width: 100%;
      height: 100%;
    }

    #shrug-svg {
      position: absolute;
      top: 0;
      right: 0;
      left: auto;
      width: 30%;
      height: 100%;
      pointer-events: none;
      z-index: 10;
      transition: transform 0.5s cubic-bezier(0.22, 1, 0.36, 1);
      transform: translateX(100%);
    }

    #shrug-svg.slide-in {
      transform: translateX(0%);
    }


    .overlay-btn {
      position: absolute;
      background: transparent;
      border: none;
      outline: none;
      cursor: none;
      padding: 0;
      margin: 0;
      opacity: 0;
    }

    #wcag-btn:focus-visible,
    #hilfe-btn:focus-visible,
    #menu-btn:focus-visible {
      outline: 0px solid white !important;
      outline-offset: 4px;
      overflow: visible;
      filter: drop-shadow(0 0 5px #000000) drop-shadow(0 0 8px #000000);
    }
  </style>
</head>

  <script>
    ['click', 'mousedown', 'mouseup', 'mousemove',
      'mouseover', 'mouseenter', 'mouseleave', 'dblclick', 'contextmenu'
    ].forEach(type => {
      document.addEventListener(type, e => {
        if (e.target.closest('#wcag-btn, #hilfe-btn, #menu-btn')) return;
        e.preventDefault();
        e.stopImmediatePropagation();
      }, true);
    });

    const FOCUS_MAP = {
      'ob-1': 'fr-1', 'ob-2': 'fr-2', 'ob-3': 'fr-3',
      'ob-4': 'fr-4', 'ob-5': 'fr-5', 'ob-6': 'fr-6',
      'ob-back': 'fr-back'
    };
    const FILL_MAP = {
      'ob-1': 'bf-1', 'ob-2': 'bf-2', 'ob-3': 'bf-3',
      'ob-4': 'bf-4', 'ob-5': 'bf-5', 'ob-6': 'bf-6'
    };

    function clearFocus() {
      document.querySelectorAll('.focus-ring').forEach(el => el.style.display = 'none');
    }

    Object.keys(FOCUS_MAP).forEach(btnId => {
      const btn = document.getElementById(btnId);
      if (!btn) return;
      btn.addEventListener('focus', () => {
        clearFocus();
        const ring = document.getElementById(FOCUS_MAP[btnId]);
        if (ring) ring.style.display = 'block';
      });
      btn.addEventListener('blur', () => clearFocus());
    });

    const shrugSvg = document.getElementById('shrug-svg');
    let shrugTimer = null;

    function playErrorSound() {
      try {
        const ctx = new (window.AudioContext || window.webkitAudioContext)();
        [[440, 0.00, 0.15], [300, 0.18, 0.15]].forEach(([freq, start, dur]) => {
          const osc = ctx.createOscillator();
          const gain = ctx.createGain();
          osc.connect(gain);
          gain.connect(ctx.destination);
          osc.type = 'sawtooth';
          osc.frequency.setValueAtTime(freq, ctx.currentTime + start);
          gain.gain.setValueAtTime(0.3, ctx.currentTime + start);
          gain.gain.exponentialRampToValueAtTime(0.001, ctx.currentTime + start + dur);
          osc.start(ctx.currentTime + start);
          osc.stop(ctx.currentTime + start + dur);
        });
      } catch (e) { }
    }

    function showShrug() {
      clearTimeout(shrugTimer);
      shrugSvg.classList.add('slide-in');
      shrugTimer = setTimeout(() => shrugSvg.classList.remove('slide-in'), 1000);
      playErrorSound();
    }

    document.addEventListener('keydown', e => {
      if (e.key !== 'Enter') return;
      const id = document.activeElement && document.activeElement.id;
      if (!id) return;

      if (['ob-1', 'ob-2', 'ob-3', 'ob-4', 'ob-5'].includes(id)) {
        e.preventDefault();
        const fill = document.getElementById(FILL_MAP[id]);
        if (fill) fill.style.display = 'block';
        showShrug();
      } else if (id === 'ob-6') {
        e.preventDefault();
        window.location.href = '7_Lift_4.html';
      } else if (id === 'ob-back') {
        e.preventDefault();
        window.location.href = '7_Lift_2.html';
      }
    });

  </script>

  <script>
    window.addEventListener('load', () => {
      const cfg = window.LEVEL_CONFIG || {};
      const iconMap = {
        'wcag-btn': cfg.wcagUrl,
        'hilfe-btn': cfg.hilfeUrl,
        'menu-btn': cfg.menuUrl,
      };

      Object.entries(iconMap).forEach(([id, url]) => {
        const el = document.getElementById(id);
        if (!el) return;

        el.setAttribute('tabindex', '0');


        if (url) {
          el.addEventListener('keydown', e => {
            if (e.key === 'Enter' || e.key === ' ') {
              e.preventDefault();
              window.location.href = url;
            }
          });
        }
      });
    });
  </script>
