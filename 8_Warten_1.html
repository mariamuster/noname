  <style>
    * {
      box-sizing: border-box;
      margin: 0;
      padding: 0;
    }

    body {
      background: #ffffff;
      width: 100vw;
      height: 100vh;
      overflow: hidden;
      display: flex;
      align-items: center;
      justify-content: center;
    }

    .room-wrapper {
      position: relative;
      width: 100vw;
      height: 56.25vw;
      max-height: 100vh;
      max-width: 177.78vh;
    }

    .layer {
      position: absolute;
      inset: 0;
      width: 100%;
      height: 100%;
    }

    /* room background svg */
    #room-bg {
      z-index: 1;
    }

    /* wesen overlay */
    #wesen-overlay {
      z-index: 3;
      pointer-events: none;
    }

    /* bubble svgs injected by JS */
    .bubble-svg {
      z-index: 10;
      pointer-events: none;
      /* individual hit paths handle this */
      animation: popIn 0.38s cubic-bezier(0.34, 1.56, 0.64, 1) both;
    }

    @keyframes popIn {
      0% {
        transform: scale(0.1);
        opacity: 0;
      }

      100% {
        transform: scale(1);
        opacity: 1;
      }
    }

    /* wesen link */
    #wesen-link {
      visibility: hidden;
      pointer-events: none;
      cursor: pointer;
    }

    #wesen-link.active {
      visibility: visible;
      pointer-events: all;
    }

    #wesen-link>path {
      fill: transparent;
      pointer-events: none;
    }

    #wesen-link.active>path {
      pointer-events: all;
    }

    #wesen-link.active:hover>path,
    #wesen-link.active:focus>path {
      fill: rgba(65, 65, 65, 0.7) !important;
    }

    #wesen-link:focus {
      outline: none;
    }

    #wesen-link.active:focus-visible>path {
      stroke: black;
      fill: rgba(65, 65, 65, 0.2);
      stroke-width: 3px;
      filter: drop-shadow(0 0 6px rgb(0, 0, 0)) drop-shadow(0 0 6px rgb(0, 0, 0));
    }
  </style>
</head>

      svg.style.zIndex = 10 + spawned.size;
      svg.setAttribute('tabindex', '0');
      svg.setAttribute('role', 'button');
      svg.setAttribute('aria-label', `Sprechblase ${idx + 1}: „${word}" – schließen mit Enter`);

      const defs = el('defs', {});
      const clip = el('clipPath', { id: clipId });
      clip.appendChild(el('path', { d: b.p }));
      defs.appendChild(clip);
      svg.appendChild(defs);

      svg.appendChild(el('path', {
        d: b.p, fill: 'white', stroke: '#111',
        'stroke-width': '4', 'stroke-linecap': 'round', 'stroke-linejoin': 'round'
      }));

      const txt = el('text', {
        x: b.tx, y: b.ty,
        'text-anchor': 'middle', 'dominant-baseline': 'middle',
        'font-family': "'Lexend', sans-serif",
        'font-size': b.fs,
        'font-weight': isRuhe ? '700' : '400',
        fill: '#111',
        'clip-path': `url(#${clipId})`
      });
      txt.textContent = word;
      svg.appendChild(txt);



      // ✕ close button
      const xg = el('g', { style: 'cursor:pointer; pointer-events:all' });
      xg.appendChild(el('circle', {
        cx: b.xbx, cy: b.xby, r: b.xr,
        fill: 'white', stroke: '#111', 'stroke-width': '2.5'
      }));
      const xl = el('text', {
        x: b.xbx, y: b.xby,
        'text-anchor': 'middle', 'dominant-baseline': 'middle',
        'font-family': "'Lexend', sans-serif",
        'font-size': Math.round(b.xr * 1.1),
        'font-weight': '700', fill: '#333', 'pointer-events': 'none'
      });
      xl.textContent = '\u2715';
      xg.appendChild(xl);



      svg.appendChild(xg);

      const hitPath = el('path', {
        d: b.p, fill: 'rgba(0,0,0,0.001)', stroke: 'none',
        style: 'cursor:pointer; pointer-events:all'
      });
      hitPath.addEventListener('click', dismiss);
      svg.appendChild(hitPath);

      wrapper.appendChild(svg);

      function dismiss() {
        if (closed.has(idx)) return;
        console.log(`DISMISS Bub_${idx + 1} | closedCount before: ${closedCount} | spawned: ${[...spawned].map(i => i + 1)} | closed: ${[...closed].map(i => i + 1)}`);
        closed.add(idx);
        svg.style.transition = 'transform 0.18s ease, opacity 0.18s ease';
        svg.style.transform = 'scale(0)';
        svg.style.opacity = '0';
        setTimeout(() => svg.remove(), 200);
        if (!isRuhe) {
          closedCount++;
          const toSpawn = getNextTwo();
          console.log(`  -> will spawn: ${toSpawn.map(i => i + 1)}`);
          toSpawn.forEach(ni => spawnBubble(ni));
          if (closedCount >= TOTAL) setTimeout(() => { spawned.delete(15); spawnBubble(15); }, 500);
        } else {
          activateDoor();
        }
      }

      xg.addEventListener('click', e => { e.stopPropagation(); dismiss(); });
      svg.addEventListener('keydown', e => {
        if (e.key === 'Enter' || e.key === ' ') { e.preventDefault(); dismiss(); }
      });

      // Focus style matching a:focus-visible
      const bubblePath = svg.querySelector('path');
      const xCircle = xg.querySelector('circle');
      svg.addEventListener('focus', () => {
        bubblePath.setAttribute('stroke', 'black');
        bubblePath.setAttribute('stroke-width', '4');
        bubblePath.style.fill = 'rgba(65,65,65,0.2)';
        bubblePath.style.filter = 'drop-shadow(0 0 6px rgb(0,0,0)) drop-shadow(0 0 6px rgb(0,0,0))';
        xCircle.setAttribute('stroke', 'black');
        xCircle.setAttribute('stroke-width', '4');
        xCircle.style.filter = 'drop-shadow(0 0 6px rgb(0,0,0))';
      });
      svg.addEventListener('blur', () => {
        bubblePath.setAttribute('stroke', '#111');
        bubblePath.setAttribute('stroke-width', '4');
        bubblePath.style.fill = 'white';
        bubblePath.style.filter = '';
        xCircle.setAttribute('stroke', '#111');
        xCircle.setAttribute('stroke-width', '2.5');
        xCircle.style.filter = '';
      });
    }

    function activateDoor() {
      // Swap room background
      document.getElementById('room-bg-2').style.opacity = '1';
      // Activate wesen link
      const wl = document.getElementById('wesen-link');
      wl.classList.add('active');
      wl.setAttribute('tabindex', '0');
    }

    window.addEventListener('load', () => setTimeout(() => spawnBubble(0), 500));
  </script>
