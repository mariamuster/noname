<!DOCTYPE html>
<html lang="de">

<head>
  <meta charset="UTF-8">
  <title>Wohnzimmer</title>
  <link rel="stylesheet" href="image.css">
  <link rel="stylesheet" href="icons.css">
  <style>

    @font-face {
      font-family: 'Lex';
      src: url('fonts/Lexend_Regular.ttf') format('truetype');
    }

    *, *::before, *::after {
      box-sizing: border-box;
      margin: 0;
      padding: 0;
    }

    body {
      font-family: 'Lex', sans-serif;
      background: rgb(0, 0, 200);
      height: auto;
      min-height: 100vh;
      overflow: visible;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: flex-start;
    }

    /* ── CONTROLS BAR ── */
    #controls {
      width: 100%;
      display: flex;
      gap: 25px;
      align-items: center;
      justify-content: center;
      flex-wrap: wrap;
      padding: 20px 24px;
      background: rgba(0, 0, 0, 0.8);
      position: sticky;
      top: 0;
      z-index: 10;
    }

    .ctrl-group {
      display: flex;
      flex-direction: column;
      gap: 8px;
    }

    .ctrl-label {
      font-size: 16px;
      font-weight: 500;
      letter-spacing: 0.14em;
      text-transform: uppercase;
      color: rgba(255, 255, 255, 0.9);
    }

    .ctrl-inline {
      display: flex;
      gap: 17px;
      align-items: center;
    }

    .sliders {
      display: flex;
      flex-direction: column;
      gap: 10px;
    }

    .slider-row {
      display: flex;
      align-items: center;
      gap: 7px;
    }

    .channel-tag {
      font-size: 16px;
      font-weight: 500;
      width: 17px;
      color: rgba(255, 255, 255, 0.9);
    }

    input[type=range] {
      overflow: visible;
      appearance: none;
      -webkit-appearance: none;
      height: 10px;
      width: 150px;
      border-radius: 0px;
      background: rgba(255, 255, 255, 0.5);
      outline: none;
    }

    input[type=range]:disabled {
      opacity: 0.45;
      cursor: not-allowed;
      pointer-events: none;
    }

    input[type=range]::-webkit-slider-thumb {
      appearance: none;
      -webkit-appearance: none;
      width: 24px;
      height: 24px;
      border-radius: 50%;
      background: #fff;
      border: 3px solid rgba(0, 0, 0, 0.1);
    }

    input[type=range]::-moz-range-thumb {
      width: 24px;
      height: 24px;
      border-radius: 50%;
      background: #fff;
      border: 1px solid rgba(0, 0, 0, 0.5);
    }

    .val-num {
      font-size: 16px;
      font-variant-numeric: tabular-nums;
      width: 26px;
      text-align: right;
      color: rgba(255, 255, 255, 0.9);
    }

    .color-preview {
      width: 44px;
      height: 44px;
      border-radius: 5px;
      border: 1.5px solid rgba(255, 255, 255, 0.9);
      flex-shrink: 0;
      align-self: center;
    }

    /* ── CONTRAST Panel ── */
    #contrast-panel {
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 3px;
      padding: 0 18px;
      border-left: 3px solid rgba(255, 255, 255, 0.9);
      border-right: 3px solid rgba(255, 255, 255, 0.9);
    }

    #contrast-ratio {
      font-size: 40px;
      font-weight: 500;
      letter-spacing: -0.02em;
      color: rgba(255, 255, 255, 1);
      line-height: 1;
    }

    #contrast-ratio.pass { color: #00ffcc; }

    #contrast-label {
      font-size: 16px;
      font-weight: 500;
      letter-spacing: 0.1em;
      text-transform: uppercase;
      color: rgba(255, 255, 255, 0.9);
    }

    #wcag-badges {
      display: flex;
      gap: 10px;
      margin-top: 3px;
    }

    .badge {
      font-size: 16px;
      font-weight: 600;
      letter-spacing: 0.04em;
      padding: 5px 7px;
      border-radius: 3px;
      border: 1px solid rgba(255, 255, 255, 0.9);
      color: rgba(255, 255, 255, 0.9);
    }

    .badge.active {
      background: #00ffcc;
      border-color: #00ffcc;
      color: #000;
    }

    /* ── ROOM ── */
    #room-wrapper {
      width: 100%;
      max-width: 1600px;
      position: relative;
    }

    /* ── OVERLAY SVG ── */
    .wohn-overlay {
      position: absolute;
      inset: 0;
      width: 100%;
      height: 100%;
      pointer-events: none;
    }

    /* Pfeil hover */
    #pfeil-link > path {
      pointer-events: all;
      transition: filter 0.2s, opacity 0.2s;
    }
    #pfeil-link:hover > path,
    #pfeil-link:focus-visible > path {
      filter: drop-shadow(0 0 10px rgba(0, 0, 0, 0.9));
      opacity: 0.5;
    }
    #pfeil-link:focus { outline: none; }

    /* Bild hover */
    #bild-link > path {
      fill: transparent;
      pointer-events: fill;
      transition: fill 0.2s;
    }
    #bild-link:hover > path,
    #bild-link:focus-visible > path {
      fill: rgba(255, 255, 255, 0.2);
    }
    #bild-link:focus { outline: none; }

  </style>
</head>

<body>

  <div id="controls">
    <!-- Hintergrundfarbe (eingefroren) -->
    <div class="ctrl-group">
      <div class="ctrl-label">Hintergrundfarbe</div>
      <div class="ctrl-inline">
        <div class="sliders">
          <div class="slider-row">
            <span class="channel-tag">R</span>
            <input type="range" id="bg-r" min="0" max="255" value="0" disabled>
            <span class="val-num" id="bg-r-val">0</span>
          </div>
          <div class="slider-row">
            <span class="channel-tag">G</span>
            <input type="range" id="bg-g" min="0" max="255" value="0" disabled>
            <span class="val-num" id="bg-g-val">0</span>
          </div>
          <div class="slider-row">
            <span class="channel-tag">B</span>
            <input type="range" id="bg-b" min="0" max="255" value="200" disabled>
            <span class="val-num" id="bg-b-val">200</span>
          </div>
        </div>
        <div class="color-preview" id="bg-preview" style="background:rgb(0,0,200)"></div>
      </div>
    </div>

    <!-- Kontrast -->
    <div id="contrast-panel">
      <div id="contrast-ratio" class="pass">—</div>
      <div id="contrast-label">Kontrastverhältnis</div>
      <div id="wcag-badges">
        <span class="badge" id="badge-aa">AA 4.5</span>
        <span class="badge" id="badge-aaa">AAA 7</span>
      </div>
    </div>

    <!-- Linienfarbe (eingefroren) -->
    <div class="ctrl-group">
      <div class="ctrl-label">Linienfarbe</div>
      <div class="ctrl-inline">
        <div class="color-preview" id="stroke-preview" style="background:rgb(0,255,0)"></div>
        <div class="sliders">
          <div class="slider-row">
            <span class="channel-tag">R</span>
            <input type="range" id="st-r" min="0" max="255" value="0" disabled>
            <span class="val-num" id="st-r-val">0</span>
          </div>
          <div class="slider-row">
            <span class="channel-tag">G</span>
            <input type="range" id="st-g" min="0" max="255" value="255" disabled>
            <span class="val-num" id="st-g-val">255</span>
          </div>
          <div class="slider-row">
            <span class="channel-tag">B</span>
            <input type="range" id="st-b" min="0" max="255" value="0" disabled>
            <span class="val-num" id="st-b-val">0</span>
          </div>
        </div>
      </div>
    </div>
  </div>

  <div id="room-wrapper" class="room-wrapper">
    <!-- Hintergrundbild -->
    <img src="img/4_Wohnzimmer.svg" class="responsive-img" alt="Wohnzimmer" />

    <!-- Overlay für klickbare Elemente -->
    <svg class="wohn-overlay" viewBox="0 0 1600 900" preserveAspectRatio="xMidYMid meet"
      xmlns="http://www.w3.org/2000/svg">

      <!-- Bild an der Wand → ???.html -->
      <a id="bild-link" href="???.html" aria-label="Bild an der Wand" role="button">
        <path
          d="M811.7,175.1c-42.5-.1-88-.5-130.2.6-1.4,32,2.5,65.3,0,97.3,31.5.6,200.2,1.5,237.3.9-4-32.5,0-98.8,0-98.8h-13.1s-63.7-.9-94,0Z" />
      </a>

      <!-- Pfeil → 11_Kueche_3.html -->
      <a id="pfeil-link" href="11_Kueche_3.html" aria-label="Weiter" role="button">
        <path
          style="fill:aqua;stroke:#000;stroke-linecap:round;stroke-linejoin:round;stroke-width:3px;"
          d="M61.9,372.5s56.5-66.3,69.9-83.4c.2,15.1,1.6,28.5,1.1,43.8,23.5.5,44.5-1.1,44.5-1.1l2,74.9s-20.7,2.8-44.5,1c.7,14.2,1.1,30,1.1,44.3l-74.1-79.7h0v.2Z" />
      </a>

    </svg>
  </div>

  <script>
    // Kontrastwert berechnen und anzeigen
    function toLinear(c) {
      const v = c / 255;
      return v <= 0.04045 ? v / 12.92 : Math.pow((v + 0.055) / 1.055, 2.4);
    }
    function luminance(r, g, b) {
      return 0.2126 * toLinear(r) + 0.7152 * toLinear(g) + 0.0722 * toLinear(b);
    }
    function contrast(l1, l2) {
      const hi = Math.max(l1, l2), lo = Math.min(l1, l2);
      return (hi + 0.05) / (lo + 0.05);
    }

    const lBg = luminance(0, 0, 200);
    const lSt = luminance(0, 255, 0);
    const cr = contrast(lBg, lSt);

    document.getElementById('contrast-ratio').textContent = cr.toFixed(2) + ':1';
    document.getElementById('contrast-ratio').classList.toggle('pass', cr >= 7.0);
    document.getElementById('badge-aa').classList.toggle('active', cr >= 4.5);
    document.getElementById('badge-aaa').classList.toggle('active', cr >= 7.0);
  </script>

  <!-- ════════════════════════════════════════════════════════════
       LEVEL-KONFIGURATION FÜR ICONS
  ════════════════════════════════════════════════════════════ -->
  <style>
    :root { --wcag-farbe: rgb(35, 35, 255); }
  </style>
  <script>
    window.LEVEL_CONFIG = {
      hilfeUrl: '10_Wohnzimmer_H.html',
      menuUrl:  'leves.html',
    };
  </script>
  <script src="icons.js"></script>

</body>

</html>
