<!DOCTYPE html>
<html lang="de">

<head>
  <meta charset="UTF-8">
  <title>Hinweise Wartezimmer</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Lexend:wght@400;700&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="image.css">
  <link rel="stylesheet" href="icons.css">
  <style>
    * {
      box-sizing: border-box;
      margin: 0;
      padding: 0;
    }

    body {
      background: #ffffff;
      width: 100vw;
      height: 100vh;
      overflow: hidden;
      display: flex;
      align-items: center;
      justify-content: center;
    }

    .room-wrapper {
      position: relative;
      width: 100vw;
      height: 56.25vw;
      max-height: 100vh;
      max-width: 177.78vh;
    }

    .layer {
      position: absolute;
      inset: 0;
      width: 100%;
      height: 100%;
    }

    /* room background svg */
    #room-bg {
      z-index: 1;
    }

    /* wesen overlay */
    #wesen-overlay {
      z-index: 3;
      pointer-events: none;
    }

    /* bubble svgs injected by JS */
    .bubble-svg {
      z-index: 10;
      pointer-events: none;
      /* individual hit paths handle this */
      animation: popIn 0.38s cubic-bezier(0.34, 1.56, 0.64, 1) both;
    }

    @keyframes popIn {
      0% {
        transform: scale(0.1);
        opacity: 0;
      }

      100% {
        transform: scale(1);
        opacity: 1;
      }
    }

    /* wesen link */
    #wesen-link {
      visibility: visible;
      pointer-events: all;
      cursor: pointer;
    }


    #wesen-link>path {
      fill: transparent;
      pointer-events: all;
    }

    #wesen-link:hover>path,
    #wesen-link:focus>path {
      fill: rgba(65, 65, 65, 0.7) !important;
    }

    #wesen-link:focus {
      outline: none;
    }

    #wesen-link:focus-visible>path {
      stroke: black;
      fill: rgba(65, 65, 65, 0.2);
      stroke-width: 3px;
      filter: drop-shadow(0 0 6px rgb(0, 0, 0)) drop-shadow(0 0 6px rgb(0, 0, 0));
    }
  </style>
</head>

<body>
  <div class="room-wrapper" id="wrapper">



    <img id="room-bg-2" class="layer" src="img/8_Warten_2.2.svg" alt="Wartezimmer 2">

    <svg class="layer" id="wesen-overlay" viewBox="0 0 1600 900" xmlns="http://www.w3.org/2000/svg">
      <a id="wesen-link" href="12_Warten_2.html" role="button" aria-label="Wesen – weiter zu Warten 2" tabindex="-1">
        <path
          d="M706.7,601c.1-18.5,1.7-53.3,1.1-72.4-2.1-39.2-.3-126.8-.3-126.8,0,0-2.5.5-8.2,0-10.4-2.3-18.6-.5-29.6-.8-10.8.8-52.3.8-52.3.8,0,0,2,56.1.4,80.4-.1,22,.3,42.3.7,64.6,0,20-2.1,34.2,0,53.3l88.2.9Z" />
      </a>
    </svg>


    </svg>

  </div>
