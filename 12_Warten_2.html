<!DOCTYPE html>

<head>

  <style>
    @font-face {
      font-family: 'Lex';
      src: url('fonts/Lexend_Regular.ttf') format('truetype');
    }

    body {
      font-family: 'Lex', sans-serif;
    }

    svg {
      border: none;
    }

    a:hover>path,
    a:hover>rect {
      fill: rgba(65, 65, 65, 0.7) !important;
    }

    a:focus-visible {
      outline: none;
    }

    a:focus-visible>path,
    a:focus-visible>rect {
      stroke: #005fcc;
      fill: rgba(0,95,204,0.08);
      stroke-width: 3px;
      filter: drop-shadow(0 0 4px #005fcc) drop-shadow(0 0 8px rgba(0,95,204,0.4));
    }

    #wesen-link>path {
      fill: transparent;
      pointer-events: all;
    }

    #wesen-link:hover>path,
    #wesen-link:focus-visible>path {
      fill: rgba(65, 65, 65, 0.7) !important;
    }

    /* Dialog */
    #dialog-overlay {
      display: none;
      position: fixed;
      inset: 0;
      z-index: 100;
    }

    #dialog-overlay.open {
      display: block;
    }

    #dialog-svg {
      position: fixed;
      inset: 0;
      width: 100vw;
      height: 100vh;
    }

    .d-weiter-btn,
    .d-zu-btn {
      cursor: pointer;
    }

    a.d-zu-btn>path {
      pointer-events: all;
    }

    a.d-weiter-btn>path {
      fill: transparent;
      pointer-events: all;
    }

    a.d-weiter-btn:hover>path,
    a.d-weiter-btn:focus-visible>path {
      fill: rgba(65, 65, 65, 0.7) !important;
    }
  </style>
</head>

<script>
(function() {
  var btn_13_Ende_html = document.getElementById("pfeil-link");
  if (btn_13_Ende_html) {
    btn_13_Ende_html.addEventListener("click", function() { window.location.href = "13_Ende.html"; });

  document.addEventListener("keydown", function(e) {
