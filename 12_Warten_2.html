<!DOCTYPE html>
<html lang="de">

<head>
  <meta charset="UTF-8">
  <title>Hinweise Wartezimmer</title>
  <link rel="stylesheet" href="image.css">
  <link rel="stylesheet" href="icons.css">
  <style>
    @font-face {
      font-family: 'Lex';
      src: url('fonts/Lexend_Regular.ttf') format('truetype');
    }

    body {
      font-family: 'Lex', sans-serif;
    }

    svg {
      border: none;
    }

    a:hover>path,
    a:hover>rect {
      fill: rgba(65, 65, 65, 0.7) !important;
    }

    a:focus-visible {
      outline: none;
    }

    a:focus-visible>path,
    a:focus-visible>rect {
      stroke: black;
      fill: rgba(65, 65, 65, 0.2);
      stroke-width: 3px;
      outline-offset: 4px;
      filter: drop-shadow(0 0 6px rgb(0, 0, 0)) drop-shadow(0 0 6px rgb(0, 0, 0));
    }

    #wesen-link>path {
      fill: transparent;
      pointer-events: all;
    }

    #wesen-link:hover>path,
    #wesen-link:focus-visible>path {
      fill: rgba(65, 65, 65, 0.7) !important;
    }

    /* Dialog */
    #dialog-overlay {
      display: none;
      position: fixed;
      inset: 0;
      z-index: 100;
    }

    #dialog-overlay.open {
      display: block;
    }

    #dialog-svg {
      position: fixed;
      inset: 0;
      width: 100vw;
      height: 100vh;
    }

    .d-weiter-btn,
    .d-zu-btn {
      cursor: pointer;
    }

    a.d-zu-btn>path {
      pointer-events: all;
    }

    a.d-weiter-btn>path {
      fill: transparent;
      pointer-events: all;
    }

    a.d-weiter-btn:hover>path,
    a.d-weiter-btn:focus-visible>path {
      fill: rgba(65, 65, 65, 0.7) !important;
    }
  </style>
</head>

<body>
  <div class="room-wrapper">
    <img src="img/8_Warten_3.2.svg"
      alt="Niemand steht am Empfang. Auf dem Tisch eine Lampe und ein Computer. Daneben eine Tür auf der „Büro 146, geschlossen“ steht. Die Uhr zeigt 17 Uhr 2."
      class="responsive-img" tabindex="0" />

    <svg class="room-overlay" viewBox="0 0 1600 900" fill="none" xmlns="http://www.w3.org/2000/svg">


      <!-- Pfeil —  -->
      <a id="pfeil-link" aria-label="Weiter" tabindex="0" role="button"
        style="visibility:visible;pointer-events:all;">
        <path style="fill:aqua;stroke:#000;stroke-linecap:round;stroke-linejoin:round;stroke-width:3px;"
          d="M54.5,586.9s50-55.6,61.8-70c-.2,13.1.8,24.5,0,37.6,20.1.9,38.2,0,38.2,0v64.4s-17.9,2-38.2,0c.3,12.2.4,25.8,0,38l-61.8-70h0Z" />
      </a>

    </svg>
  </div>




  <!-- ════════════════════════════════════════════════════════════
       ICONS
  ════════════════════════════════════════════════════════════ -->

  <script>
    window.LEVEL_CONFIG = {
      hilfeUrl: '12_Warten_2H.html',
      menuUrl: 'levels.html',

    };
  </script>
  <script src="icons.js"></script>

<script>
(function() {
  var btn_13_Ende_html = document.getElementById("pfeil-link");
  if (btn_13_Ende_html) {
    btn_13_Ende_html.addEventListener("click", function() { window.location.href = "13_Ende.html"; });
  }
  document.addEventListener("keydown", function(e) {
    if (e.key !== "Enter" && e.key !== " ") return;
    if (btn_13_Ende_html && document.activeElement === btn_13_Ende_html) {
      e.preventDefault(); window.location.href = "13_Ende.html"; return;
    }
  });
})();
</script>
</body>

</html>
