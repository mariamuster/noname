  /* Panel-Overlays */

    left: 0;
    width: 100%;
    height: 100%;

  .panel-overlay.aktiv {
    display: block;

  .panel-overlay svg {
    width: 100%;
    height: 100%;
  }

  /* Pfeil zunächst versteckt */

    display: none;
  }

  #pfeil-link.sichtbar {

  .text-box {
    font-family: 'Lex', sans-serif;
    font-size: 60px;
    padding: 0px;
    width: fit-content;
    background: transparent;
    color: #fff;

</style>

  <script>
    var gesehen = { panel1: false, panel2: false };

    function oeffnePanel(panelId, zuId) {
      document.getElementById(panelId).classList.add('aktiv');
    }

    function schliessePanel(panelId) {
      document.getElementById(panelId).classList.remove('aktiv');
      gesehen[panelId] = true;
      if (gesehen.panel1 && gesehen.panel2) {
        document.getElementById('pfeil-link').classList.add('sichtbar');
      }
    }

    // Bild 1
    var bild1Btn = document.getElementById('bild1-btn');
    bild1Btn.addEventListener('click', function () { oeffnePanel('panel1', 'zu1'); });
    bild1Btn.addEventListener('keydown', function (e) {
      if (e.key === 'Enter' || e.key === ' ') { e.preventDefault(); oeffnePanel('panel1', 'zu1'); }
    });

    // Bild 2
    var bild2Btn = document.getElementById('bild2-btn');
    bild2Btn.addEventListener('click', function () { oeffnePanel('panel2', 'zu2'); });
    bild2Btn.addEventListener('keydown', function (e) {
      if (e.key === 'Enter' || e.key === ' ') { e.preventDefault(); oeffnePanel('panel2', 'zu2'); }
    });

    // Zu 1
    var zu1 = document.getElementById('zu1');
    zu1.addEventListener('click', function () { schliessePanel('panel1'); });
    zu1.addEventListener('keydown', function (e) {
      if (e.key === 'Enter' || e.key === ' ') { e.preventDefault(); schliessePanel('panel1'); }
    });

    // Zu 2
    var zu2 = document.getElementById('zu2');
    zu2.addEventListener('click', function () { schliessePanel('panel2'); });
    zu2.addEventListener('keydown', function (e) {
      if (e.key === 'Enter' || e.key === ' ') { e.preventDefault(); schliessePanel('panel2'); }
    });
  </script>
