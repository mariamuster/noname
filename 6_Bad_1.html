  <style>
    @font-face {
      font-family: 'Lex';
      src: url('fonts/Lexend_Regular.ttf') format('truetype');
    }

    body {
      font-family: 'Lex', sans-serif;
    }

    svg {
      border: 0cm solid rgba(0, 0, 0, 0.454);
    }

    a:hover>path,
    a:hover>rect {
      fill: rgba(65, 65, 65, 0.7) !important;
    }

    a:focus {
      outline: none;
    }

    a:focus-visible>path,
    a:focus-visible>rect {
      stroke: black;
      fill: rgba(65, 65, 65, 0.2);
      stroke-width: 3px;
      outline-offset: 4px;
      filter: drop-shadow(0 0 6px rgb(0, 0, 0)) drop-shadow(0 0 6px rgb(0, 0, 0));
    }

    a.d-zu-btn>path {
      pointer-events: all;
    }

    a.d-weiter-btn>path {
      fill: transparent;
      pointer-events: all;
    }

    a.d-weiter-btn:hover>path,
    a.d-weiter-btn:focus>path {
      fill: rgba(65, 65, 65, 0.7) !important;
    }

    /* Wesen animation*/
    #wesen-w1 {
      opacity: 1;
    }

    #wesen-w2 {
      opacity: 0;
    }

    #wesen-w1.animating,
    #wesen-w2.animating {
      animation-duration: 1s;
      animation-timing-function: step-end;
      animation-iteration-count: infinite;
    }

    #wesen-w1.animating {
      animation-name: blink-w1;
    }

    #wesen-w2.animating {
      animation-name: blink-w2;
    }

    @keyframes blink-w1 {
      0% {
        opacity: 1;
      }

      50% {
        opacity: 0;
      }

      100% {
        opacity: 1;
      }
    }

    @keyframes blink-w2 {
      0% {
        opacity: 0;
      }

      50% {
        opacity: 1;
      }

      100% {
        opacity: 0;
      }
    }

    /* Wesen clickable overlay */
    #wesen-link {
      cursor: pointer;
    }

    #wesen-link>path {
      fill: transparent;
      pointer-events: all;
    }

    /* Sync hover-path visibility with the blink animation */
    #wesen-link>.hover-w1 {
      animation-name: blink-w1;
      animation-duration: 1s;
      animation-timing-function: step-end;
      animation-iteration-count: infinite;
    }

    #wesen-link>.hover-w2 {
      animation-name: blink-w2;
      animation-duration: 1s;
      animation-timing-function: step-end;
      animation-iteration-count: infinite;
    }

    #wesen-link:hover>.hover-w1,
    #wesen-link:focus>.hover-w1,
    #wesen-link:hover>.hover-w2,
    #wesen-link:focus>.hover-w2 {
      fill: rgba(65, 65, 65, 0.7) !important;
    }

    #wesen-link.disabled {
      pointer-events: none;
      cursor: default;
    }

    #wesen-link.disabled>.hover-w1,
    #wesen-link.disabled>.hover-w2 {
      fill: transparent !important;
      animation: none;
    }

    /* Wanne button */
    #wanne-btn {
      display: none;
      cursor: pointer;
    }

    #wanne-btn.visible {
      display: block;
    }

    #wanne-btn>path {
      fill: transparent;
      pointer-events: all;
      stroke: #000;
      stroke-linecap: round;
      stroke-linejoin: round;
      stroke-width: 3px;
    }

    #wanne-btn:hover>path,
    #wanne-btn:focus>path {
      fill: rgba(65, 65, 65, 0.7) !important;
    }

    /* Dialog overlay */
    #dialog-overlay {
      display: none;
      position: fixed;
      inset: 0;
      z-index: 100;
    }

    #dialog-overlay.open {
      display: block;
    }

    #dialog-svg {
      position: fixed;
      inset: 0;
      width: 100vw;
      height: 100vh;
    }

    .d-weiter-btn,
    .d-zu-btn {
      cursor: pointer;
    }
  </style>
</head>

  <script>
    // ── DIALOGS ───────────────────────────────────────────────
    const DIALOGS = [
      {
        group: 'dlg-1',
        weiterId: 'dlg1-weiter',
        lines: ['dlg1-line1'],
        endX: { end: 1300, start: 300 },
        conversation: [
          { text: 'Ich suche Büro 146, kannst du mir helfen? ', align: 'end' },
          { text: 'Hilfst du mir erst die Badewanne zu putzen?', align: 'start' },
          { text: 'Ok.', align: 'end' },
        ],
      },
    ];

    let convStep = 0;
    let openerLink = null;
    let dialogEverClosed = false;

    const overlay = document.getElementById('dialog-overlay');
    const dlgSvg = document.getElementById('dialog-svg');
    const w1 = document.getElementById('wesen-w1');
    const w2 = document.getElementById('wesen-w2');
    const wanneBtn = document.getElementById('wanne-btn');

    /* ── animation helpers ────────────────────── */
    function stopAnimation() {
      w1.classList.remove('animating');
      w2.classList.remove('animating');
      // freeze W1 visible, W2 hidden
      w1.style.opacity = '1';
      w2.style.opacity = '0';
      // freeze hover paths too: show W1 shape only
      const hLink = document.getElementById('wesen-link');
      hLink.querySelectorAll('.hover-w1').forEach(p => { p.style.animationPlayState = 'paused'; p.style.opacity = '1'; });
      hLink.querySelectorAll('.hover-w2').forEach(p => { p.style.animationPlayState = 'paused'; p.style.opacity = '0'; });
    }

    function startAnimation() {
      w1.classList.add('animating');
      w2.classList.add('animating');
      w1.style.opacity = '';
      w2.style.opacity = '';
      // resume hover path animations
      const hLink = document.getElementById('wesen-link');
      hLink.querySelectorAll('.hover-w1, .hover-w2').forEach(p => { p.style.animationPlayState = ''; p.style.opacity = ''; });
    }

    /* ── dialog helpers ────────────────────────── */
    function renderLines(def) {
      const entry = def.conversation[convStep - 1];
      const lineEl = document.getElementById(def.lines[0]);
      lineEl.textContent = entry.text;
      lineEl.setAttribute('text-anchor', entry.align === 'end' ? 'end' : 'start');
      lineEl.setAttribute('x', entry.align === 'end' ? def.endX.end : def.endX.start);
      lineEl.setAttribute('visibility', 'visible');

      const w = document.getElementById(def.weiterId);
      if (w) w.setAttribute('visibility', convStep >= def.conversation.length ? 'hidden' : 'visible');
    }

    function openDialog(opener) {
      openerLink = opener;
      convStep = 1;
      stopAnimation();
      const def = DIALOGS[0];
      document.getElementById(def.group).setAttribute('visibility', 'visible');
      renderLines(def);
      overlay.classList.add('open');
      overlay.setAttribute('aria-hidden', 'false');
      dlgSvg.focus();
    }

    function closeDialog() {
      overlay.classList.remove('open');
      overlay.setAttribute('aria-hidden', 'true');
      document.getElementById(DIALOGS[0].group).setAttribute('visibility', 'hidden');
      convStep = 0;

      if (!dialogEverClosed) {
        dialogEverClosed = true;
        wanneBtn.classList.add('visible');
        document.getElementById('wesen-link').classList.add('disabled');
        document.getElementById('wesen-link').removeAttribute('aria-haspopup');
        document.getElementById('wesen-link').setAttribute('aria-label', 'Wesen (nicht mehr verfügbar)');
      }

      if (openerLink) openerLink.focus();
    }

    function advanceConversation() {
      const def = DIALOGS[0];
      if (convStep < def.conversation.length) {
        convStep++;
        renderLines(def);
      } else {
        closeDialog();
      }
    }

    document.getElementById('wesen-link').addEventListener('click', function (e) {
      e.preventDefault();
      openDialog(this);
    });

    dlgSvg.addEventListener('click', function (e) {
      if (e.target.closest('.d-weiter-btn')) { e.preventDefault(); advanceConversation(); return; }
      if (e.target.closest('.d-zu-btn')) { e.preventDefault(); closeDialog(); return; }
    });

    document.addEventListener('keydown', function (e) {
      if (!overlay.classList.contains('open')) return;
      if (e.key === 'Escape') { closeDialog(); return; }
      if (e.key === 'Tab') {
        const focusable = Array.from(dlgSvg.querySelectorAll('a[role="button"]')).filter(el => {
          let p = el.parentElement;
          while (p && p !== dlgSvg) {
            if (p.getAttribute('visibility') === 'hidden') return false;
            p = p.parentElement;
          }
          return true;
        });
        if (!focusable.length) { e.preventDefault(); return; }
        const first = focusable[0], last = focusable[focusable.length - 1];
        if (e.shiftKey) { if (document.activeElement === first) { e.preventDefault(); last.focus(); } }
        else { if (document.activeElement === last) { e.preventDefault(); first.focus(); } }
      }
    });

    startAnimation();
  </script>
