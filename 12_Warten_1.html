    * {
      box-sizing: border-box;
      margin: 0;

    body {
      background: #ffffff;
      width: 100vw;
      height: 100vh;
      overflow: hidden;
      display: flex;

    .room-wrapper {

    .layer {
      position: absolute;

      z-index: 1;
    }

    /* wesen overlay */
    #wesen-overlay {
      z-index: 3;
      pointer-events: none;
    }

    /* bubble svgs injected by JS */
    .bubble-svg {
      z-index: 10;
      pointer-events: none;
      /* individual hit paths handle this */
      animation: popIn 0.38s cubic-bezier(0.34, 1.56, 0.64, 1) both;
    }

    @keyframes popIn {
      0% {
        transform: scale(0.1);
        opacity: 0;
      }

      100% {
        transform: scale(1);
        opacity: 1;
      }
    }

    /* wesen link */
    #wesen-link {
      visibility: visible;
      pointer-events: all;
      cursor: pointer;
    }


    #wesen-link>path {
      fill: transparent;
      pointer-events: all;
    }

    #wesen-link:hover>path,
    #wesen-link:focus>path {
      fill: rgba(65, 65, 65, 0.7) !important;
    }

    #wesen-link:focus {
      outline: none;
    }

    #wesen-link:focus-visible>path {
      stroke: black;
      fill: rgba(65, 65, 65, 0.2);
      stroke-width: 3px;
      filter: drop-shadow(0 0 6px rgb(0, 0, 0)) drop-shadow(0 0 6px rgb(0, 0, 0));
