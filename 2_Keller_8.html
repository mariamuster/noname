<!DOCTYPE html>
<html lang="en">

<head>
  <meta charset="UTF-8">
  <title>Keller 8</title>
  <link rel="stylesheet" href="image.css">
  <link rel="stylesheet" href="icons.css">
</head>
<style>
  svg {
    border: none;
  }

  a:hover > path,
  a:hover > rect {
    fill: rgba(65, 65, 65, 0.7) !important;
  }

  a:focus {
    outline: none;
  }
  a:focus > path,
  a:focus > rect {
    stroke: black;
    fill: rgba(65, 65, 65, 0.2);
    stroke-width: 3px;
    outline-offset: 4px;
    filter: drop-shadow(0 0 0px rgb(0, 0, 0)) drop-shadow(0 0 6px rgb(0, 0, 0));
  }

  /* Bilder: leicht blau sichtbar als Hinweis */
  .bild-bereich > path {
    fill: rgba(35, 35, 255, 0.12);
    cursor: pointer;
  }

  /* Angeklickter Zustand: grün, auch beim Hover */
  .bild-bereich.angeklickt > path,
  .bild-bereich.angeklickt:hover > path {
    fill: rgba(0, 180, 0, 0.35) !important;
  }

  /* Pfeil zunächst unsichtbar */
  #pfeil-link {
    display: none;
  }
  #pfeil-link.sichtbar {
    display: inline;
  }
</style>

<body>
  <div class="room-wrapper">
    <img src="img/2_Gang_2.svg" alt="Grundriss eines Raums mit Türen zu den Bereichen Vor, Da, Hallo und Zurück."
      class="responsive-img" tabindex="0" />

    <svg class="room-overlay" viewBox="0 0 1600 900" fill="none" xmlns="http://www.w3.org/2000/svg">

      <!-- Bild 1 (rechts) – muss angeklickt werden -->
      <a id="bild1" class="bild-bereich" href="javascript:void(0)" aria-label="Bild 1 anklicken" role="button" tabindex="0">
        <path d="M1114.8,152.4c29.3-22.7,63.1-49.2,91.3-72.7-4.6,54.3,0,125.4.5,180.7.9,94.9,6.7,208.4,4.6,301.8,0,0-44.7-14.8-71.3-24.7-17.6-6.5-37.5-11.8-37.5-13.8.4-65.2.5-55.7,0-97.9-1.3-84.1.4-181.8,0-266.3,0,0,8.8-4.6,12.1-7.2h.3Z"/>
      </a>

      <!-- Bild 2 (links) – muss angeklickt werden -->
      <a id="bild2" class="bild-bereich" href="javascript:void(0)" aria-label="Bild 2 anklicken" role="button" tabindex="0">
        <path d="M337.5,0c49.1,36.2,95.3,78,139.7,119.7,41.7,37.5,92.5,79.8,125.3,124.4,1.1,66.7,1.8,149.6,6.5,216.6-31.5,3.9-62.2,8.2-95.7,12.4-30.5,3.9-55,5.9-82.7,12.1-32.1,7.1-64.4,20.5-95.2,32.1.4-51.9,7.3-122.7,7.2-177.2.2-109.1-5-231.8-4.8-340.3h-.2V0h0Z"/>
      </a>

      <!-- Pfeil: erscheint erst, wenn beide Bilder angeklickt wurden -->
      <a id="pfeil-link" href="3_Bibi_1.html" aria-label="Weiter" role="button">
        <path d="M801,578.6s73.9,66.5,93.1,82.3c-17.3-.2-32.6,1.1-50.1,0-1.1,26.6,0,50.8,0,50.8h-85.6s-2.6-23.8,0-50.8c-16.2.4-34.3.6-50.6,0l93.1-82.3h.2-.1Z"/>
      </a>

    </svg>
  </div>

  <script>
    var angeklickt = { bild1: false, bild2: false };

    function pruefen() {
      if (angeklickt.bild1 && angeklickt.bild2) {
        document.getElementById('pfeil-link').classList.add('sichtbar');
      }
    }

    ['bild1', 'bild2'].forEach(function(id) {
      var el = document.getElementById(id);

      el.addEventListener('click', function() {
        angeklickt[id] = true;
        el.classList.add('angeklickt');
        pruefen();
      });

      el.addEventListener('keydown', function(e) {
        if (e.key === 'Enter' || e.key === ' ') {
          e.preventDefault();
          angeklickt[id] = true;
          el.classList.add('angeklickt');
          pruefen();
        }
      });
    });
  </script>

  <!-- ════════════════════════════════════════════════════════════
       LEVEL-KONFIGURATION FÜR ICONS
  ════════════════════════════════════════════════════════════ -->
  <script>
    window.LEVEL_CONFIG = {
      hilfeUrl: '2_Keller_8H.html',    // ← Dateinamen der Hilfeseite anpassen
      menuUrl:  'levels.html'           // ← Dateinamen der Levelübersicht anpassen
    };
  </script>
  <script src="icons.js"></script>
</body>

</html>
