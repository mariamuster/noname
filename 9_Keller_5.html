<!DOCTYPE html>
<html lang="de">

<head>
  <meta charset="UTF-8">
  <title>Hinweise Keller</title>
  <link rel="stylesheet" href="image.css">
  <link rel="stylesheet" href="icons.css">
  <style>
    @font-face {
      font-family: 'Lex';
      src: url('fonts/Lexend_Regular.ttf') format('truetype');
    }

    body {
      font-family: 'Lex', sans-serif;
    }

    svg {
      border: none;
    }

    a:hover>path,
    a:hover>rect {
      fill: rgba(65, 65, 65, 0.7) !important;
    }

    a:focus-visible {
      outline: none;
    }

    a:focus-visible>path,
    a:focus-visible>rect {
      stroke: #005fcc;
      fill: rgba(0,95,204,0.08);
      stroke-width: 3px;
      filter: drop-shadow(0 0 4px #005fcc) drop-shadow(0 0 8px rgba(0,95,204,0.4));
    }

    #bild-small {
      cursor: pointer;
    }

    #bild-small>path {
      fill: transparent;
      pointer-events: all;
    }

    #bild-small:hover>path {
      fill: rgba(65, 65, 65, 0.7);
    }

    #bild-small:focus {
      outline: none;
    }

    #bild-small:focus-visible>path {
      stroke: #005fcc;
      fill: rgba(0,95,204,0.08);
      stroke-width: 3px;
      filter: drop-shadow(0 0 4px #005fcc) drop-shadow(0 0 8px rgba(0,95,204,0.4));
    }

    .d-zu-btn text {
      pointer-events: none;
    }

    .d-zu-btn:hover>path,
    .d-zu-btn:focus-visible>path {
      fill: rgba(65, 65, 65, 0.7) !important;
    }

    #zu-button {
      cursor: pointer;
    }

    #zu-button:hover .zu-hit-area {
      fill: rgba(65, 65, 65, 0.7) !important;
    }

    #zu-button:focus {
      outline: none;
    }

    #zu-button:focus-visible .zu-hit-area {
      stroke: #005fcc;
      fill: rgba(0,95,204,0.08);
      stroke-width: 3px;
      filter: drop-shadow(0 0 4px #005fcc) drop-shadow(0 0 8px rgba(0,95,204,0.4));
    }
  </style>
</head>

<body>
  <div class="room-wrapper">
    <img src="img/9_Keller_5.svg"
      alt="Ein Keller mit zusammengefaltetem Wäscheständer, Sicherungskasten, Waschmaschine und Boiler. Oben an der Decke hängen 4 kleine, violette Wesen. In der Waschmaschine ist ein magentafarbenes. Oberhalb der Waschmaschine ist ein blaues Rechteck. Vor dem Wäscheständer steht ein ockerfarbenes Wesen, mit vielen abgerundeten Stacheln. Alle Wesen schlafen."
      class="responsive-img" tabindex="0" />

    <svg class="room-overlay" viewBox="0 0 1600 900" fill="none" xmlns="http://www.w3.org/2000/svg">

      <g id="bild-small" role="button" tabindex="0" aria-label="Blaues Rechteck ">
        <path
          d="M1066.5,355.4c30.4.1,62.9.6,93-.7,1-39.9-1.8-81.4,0-121.3-22.5-.8-143.1-1.9-169.6-1.1,2.9,40.5,0,123.1,0,123.1h9.4s45.5,1.1,67.2,0h0Z" />
      </g>

      <g id="bild-panel" aria-hidden="true">
        <path style="fill:#2323ff; stroke:#000; stroke-linecap:round; stroke-linejoin:round; stroke-width:3px;"
          d="M764.7,711.3c129.3.4,267.5,2.6,395.5-3,4.3-169.7-7.7-346.2,0-515.8-95.7-3.4-608.5-8.1-721.2-4.7,12.3,172.2,0,523.5,0,523.5h40s193.5,4.7,285.8,0h0Z" />
       
       
        <g id="zu-button" role="button" tabindex="0" aria-label="Schließen" transform="translate(50, 50)">
          <g aria-hidden="true">
            <path class="zu-circle"
              d="M403.9,116.1c-9.4-8.2-22.5-12.2-34.9-10.5-3.6.8-7.3,2.3-11,3.3-3.2,1.1-6.5,1.8-9,4.2-14.4,16.2-16,43.7,2.2,57.8,9.9,8.4,31.1,10.1,42.4,3.7,5.1-3.4,10.6-7.2,14-12.4,7.6-14.2,7.7-33.8-3.3-46.3l-.4.2h0Z"
              style="fill:#fff; stroke:#000; stroke-linecap:round; stroke-linejoin:round; stroke-width:3px;" />
            <path d="M396,121.1c-13.8,13.8-26.8,28.7-41.6,41.4"
              style="fill:none; stroke:#000; stroke-linecap:round; stroke-linejoin:round; stroke-width:3px;" />
            <path d="M354.6,121.1c12.5,14.9,27.2,28.1,41.3,41.3"
              style="fill:none; stroke:#000; stroke-linecap:round; stroke-linejoin:round; stroke-width:3px;" />
          </g>
          <path class="zu-hit-area" style="fill:transparent;pointer-events:all;"
            d="M403.9,116.1c-9.4-8.2-22.5-12.2-34.9-10.5-3.6.8-7.3,2.3-11,3.3-3.2,1.1-6.5,1.8-9,4.2-14.4,16.2-16,43.7,2.2,57.8,9.9,8.4,31.1,10.1,42.4,3.7,5.1-3.4,10.6-7.2,14-12.4,7.6-14.2,7.7-33.8-3.3-46.3l-.4.2h0Z" />
        </g>
      </g>

      <a id="weiter-link" tabindex="0" aria-label="Zurück zur Treppe" role="button" aria-hidden="true">
        <g aria-hidden="true">
          <path style="fill:aqua;stroke:#000;stroke-linecap:round;stroke-linejoin:round;stroke-width:3px;"
            d="M338.4,212.2s84.1,75.6,105.9,93.6c-19.7,0-37.1,1.3-57,0-1.3,30.3,0,57.8,0,57.8h-97.4s-3-27.1,0-57.8c-18.4.4-39,.6-57.6,0l105.9-93.6h.2Z" />
        </g>
        <path style="fill:transparent;pointer-events:all;"
          d="M338.4,212.2s84.1,75.6,105.9,93.6c-19.7,0-37.1,1.3-57,0-1.3,30.3,0,57.8,0,57.8h-97.4s-3-27.1,0-57.8c-18.4.4-39,.6-57.6,0l105.9-93.6h.2Z" />
        <text class="room-label" x="20%" y="17%">Weiter</text>
      </a>

    </svg>
  </div>

  <style>
    :root {
      --wcag-farbe: rgb(35, 35, 255);
    }
  </style>
  <script>
    window.LEVEL_CONFIG = {
      hilfeUrl: '9_Keller_5H.html',
      menuUrl: 'levels.html'
    };

    // Navigation für weiter-link (href entfernt um URL-Vorlesen zu vermeiden)
    var weiterLink = document.getElementById('weiter-link');
    weiterLink.addEventListener('click', function() { window.location.href = '9_Keller_6.html'; });
    weiterLink.addEventListener('keydown', function(e) {
      if (e.key === 'Enter' || e.key === ' ') { e.preventDefault(); window.location.href = '9_Keller_6.html'; }
    });
  </script>
  <script src="icons.js"></script>

  <script>
    (function () {
      var bildSmall = document.getElementById('bild-small');
      var bildPanel = document.getElementById('bild-panel');
      var zuButton = document.getElementById('zu-button');
      var weiterLink = document.getElementById('weiter-link');

      bildPanel.style.display = 'none';
      weiterLink.style.display = 'none';
      weiterLink.setAttribute('tabindex', '-1');
      weiterLink.setAttribute('aria-hidden', 'true');

      // Hinweis text as HTML element in <body> so it scales with browser zoom
      var hinweisEl = document.createElement('p');
      var hinweisText = 'Ein Hinweis.';
      hinweisEl.setAttribute('aria-live', 'assertive');
      hinweisEl.setAttribute('aria-atomic', 'true');
      hinweisEl.setAttribute('tabindex', '0');
      hinweisEl.style.cssText = [
        'display:none', 'position:fixed', 'margin:0',
        "font-family:'Lex',sans-serif", 'font-size:4.5rem',
        'color:#ffffff', 'line-height:1.2', 'text-align:center',
        'z-index:100', 'overflow-y:auto', 'box-sizing:border-box',
        'padding:4px 8px', 'word-break:break-word'
      ].join(';');
      (function(){
        var s=document.querySelector('.room-overlay')||document.querySelector('.room-svg')||document.querySelector('svg');
        s?s.parentNode.insertBefore(hinweisEl,s):document.body.appendChild(hinweisEl);
      })();
      var tabTrapFn = null;

      function positionHinweis() {
        var svg = document.querySelector('.room-overlay');
        if (!svg) return;
        var r = svg.getBoundingClientRect();
        var sx = r.width  / 1600;
        var sy = r.height / 900;
        // Panel bounds approx: x=439–1160, y=188–711
        hinweisEl.style.width     = (721 * sx) + 'px';
        hinweisEl.style.left      = (r.left + 439 * sx) + 'px';
        hinweisEl.style.top       = (r.top  + 230 * sy) + 'px';
        hinweisEl.style.maxHeight = Math.max(80, 440 * sy) + 'px';
      }

      window.addEventListener('resize', function () {
        if (hinweisEl.style.display !== 'none') positionHinweis();
      });
      window.addEventListener('scroll', function () {
        if (hinweisEl.style.display !== 'none') positionHinweis();
      });

      function openBild() {
        bildSmall.style.display = 'none';
        bildPanel.style.display = '';
        bildPanel.setAttribute('aria-hidden', 'false');
        positionHinweis();
        hinweisEl.style.display = 'block';
        setTimeout(function() {
          hinweisEl.textContent = hinweisText;
          hinweisEl.focus();
          if (tabTrapFn) document.removeEventListener('keydown', tabTrapFn);
          tabTrapFn = function(e) {
            if (e.key !== 'Tab') return;
            e.preventDefault();
            if (document.activeElement === zuButton) { hinweisEl.focus(); }
            else { zuButton.focus(); }
          };
          document.addEventListener('keydown', tabTrapFn);
        }, 50);
      }

      function closeBild() {
        if (tabTrapFn) { document.removeEventListener('keydown', tabTrapFn); tabTrapFn = null; }
        bildPanel.style.display = 'none';
        bildPanel.setAttribute('aria-hidden', 'true');
        hinweisEl.style.display = 'none';
        hinweisEl.textContent = '';
        bildSmall.style.display = '';
        weiterLink.style.display = '';
        weiterLink.setAttribute('tabindex', '0');
        weiterLink.setAttribute('aria-hidden', 'false');
        weiterLink.focus();
      }

      bildSmall.addEventListener('click', openBild);
      bildSmall.addEventListener('keydown', function (e) {
        if (e.key === 'Enter' || e.key === ' ') { e.preventDefault(); openBild(); }
      });
      zuButton.addEventListener('click', closeBild);
      zuButton.addEventListener('keydown', function (e) {
        if (e.key === 'Enter' || e.key === ' ') { e.preventDefault(); closeBild(); }
      });

    }());
  </script>

</body>

</html>
