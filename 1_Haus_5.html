    a>path,
    a>rect {
      fill: transparent;
      pointer-events: all;
    }

    a:hover>path,
    a:hover>rect {
      fill: rgba(65, 65, 65, 0.7);
    }

    a:focus {

    }
    a:not(.ok-btn):focus>path,
    a:not(.ok-btn):focus>rect {

      fill: rgba(65, 65, 65, 0.2);
      stroke-width: 3px;
      filter: drop-shadow(0 0 6px white) drop-shadow(0 0 6px white);
    }

    a.key-btn:focus {
      outline: none;
    }
    a.key-btn:focus-visible > rect.focus-ring {
      display: block;
    }
    rect.focus-ring {
      display: none;
      fill: rgba(65, 65, 65, 0.2);
      stroke: black;
      stroke-width: 3px;
      rx: 12px;
      filter: drop-shadow(0 0 6px white) drop-shadow(0 0 6px white);
      pointer-events: none;
    }
    a.key-btn:focus-visible > path {
      fill: rgba(65, 65, 65, 0.2);
    }

    /* Schlüsselloch */
    a.ok-btn { outline: none; }
    a.ok-btn>path {
      pointer-events: all;
    }
    a.ok-btn:hover>path {
      fill: rgba(255, 220, 0, 0.6);
    }
    a.ok-btn:focus-visible>path {
      stroke: black;
      stroke-width: 8px;
      paint-order: stroke fill;
      fill: rgba(255, 220, 0, 0.6);
      filter: drop-shadow(0 0 6px white) drop-shadow(0 0 6px white);
    }

  
  </style>
</head>

  <script>
    const CORRECT_CODE = "1234";
    const MAX_LEN = CORRECT_CODE.length;

    let entered = "";

    const display = document.getElementById("display");
    const okHighlight = document.getElementById("ok-highlight");
    const okLink = document.getElementById("ok-link");

    function updateDisplay() {
      display.textContent = entered;
    }

    function checkCode() {
      if (entered === CORRECT_CODE) {
        okHighlight.setAttribute("visibility", "visible");
        okLink.style.display = "";
        setTimeout(() => okLink.focus(), 0);
      } else {
        okHighlight.setAttribute("visibility", "hidden");
        okLink.style.display = "none";
      }
    }

    document.querySelectorAll(".key-btn").forEach((btn) => {
      btn.addEventListener("click", function (e) {
        e.preventDefault();
        const key = this.getAttribute("data-key");
        if (key === "*") {
          entered = "";
        } else if (key === "#") {
          entered = entered.slice(0, -1);
        } else {
          if (entered.length < MAX_LEN) {
            entered += key;
          }
        }
        updateDisplay();
        checkCode();
      });
    });

    okLink.addEventListener("click", function (e) {
      e.preventDefault();
      window.location.href = "1_Haus_6.html";
    });

    // ── Physische Tastatur
    document.addEventListener("keydown", function (e) {
      if (e.key >= "0" && e.key <= "9") {
        if (entered.length < MAX_LEN) {
          entered += e.key;
          updateDisplay();
          checkCode();
          const btn = document.querySelector(`.key-btn[data-key="${e.key}"]`);
          if (btn) {
            const path = btn.querySelector("path");
            if (path) {
              const orig = path.getAttribute("fill");
              path.setAttribute("fill", "rgba(65,65,65,0.35)");
              setTimeout(
                () => path.setAttribute("fill", orig || "transparent"),
                150,
              );
            }
          }
        }
      } else if (e.key === "Backspace") {
        entered = entered.slice(0, -1);
        updateDisplay();
        checkCode();
      } else if (e.key === "Escape") {
        entered = "";
        updateDisplay();
        checkCode();
      }
    });

    // ── Tab/Enter auf SVG-Buttons ──────────────────────────────────
    document.querySelectorAll(".key-btn").forEach((btn) => {
      btn.setAttribute("tabindex", "0");
      btn.addEventListener("keydown", function (e) {
        if (e.key === "Enter" || e.key === " ") {
          e.preventDefault();
          const key = this.getAttribute("data-key");
          if (key === "*") {
            entered = "";
          } else if (key === "#") {
            entered = entered.slice(0, -1);
          } else {
            if (entered.length < MAX_LEN) entered += key;
          }
          updateDisplay();
          checkCode();
          // visuelles Feedback
          const path = this.querySelector("path");
          if (path) {
            const orig = path.getAttribute("fill");
            path.setAttribute("fill", "rgba(65,65,65,0.35)");
            setTimeout(
              () => path.setAttribute("fill", orig || "transparent"),
              150,
            );
          }
        }
      });
    });

    okLink.setAttribute("tabindex", "0");
    okLink.addEventListener("keydown", function (e) {
      if (e.key === "Enter" || e.key === " ") {
        e.preventDefault();
        if (okLink.style.display !== "none") {
          window.location.href = "1_Haus_6.html";
        }
      }
    });


  </script>
