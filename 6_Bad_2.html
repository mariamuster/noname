    /* ── WCAG-Icon Farbe hier ändern ──────────────────────── */
    /* gelb (Info vorhanden): #ff0   |   weiss (keine Info): #fff */
    :root { --wcag-farbe: #ff0; }

    @font-face {
      font-family: 'Lex';
      src: url('fonts/Lexend_Regular.ttf') format('truetype');
    }

    body {
      font-family: 'Lex', sans-serif;
      margin: 0;
    }

    svg {
      border: 0cm solid rgba(0, 0, 0, 0.454);
    }

                 a:hover>path,
a:hover>rect {
  fill: rgba(65, 65, 65, 0.7) !important;
}

a:focus { outline: none; }
a:focus-visible>path,
a:focus-visible>rect {
  stroke: black;
  fill: rgba(65, 65, 65, 0.2);      
  stroke-width: 3px;
  outline-offset: 4px;
  filter: drop-shadow(0 0 6px rgb(0, 0, 0)) drop-shadow(0 0 6px rgb(0, 0, 0));
}

    a:focus,
    g:focus {
      outline: none;
    }

    /* D1 kleiner ── */
    .wesen-d1 {
      transition: transform 0.15s ease;
      transform-box: fill-box;
      transform-origin: center;
    }

    /* ── D2 weg ── */
    .wesen-d2 {
      transition: transform 0.12s ease-out;
      transform-box: fill-box;
      transform-origin: center;
    }

    /* ── Button Labels ── */
    .btn-label {
      font-family: 'Lex', sans-serif;
      font-size: 28px;
      fill: #fff;
      pointer-events: none;
      opacity: 0;
      transition: opacity 0.15s;
    }

    /* Pfeil */
    .pfeil-shape {
      fill: aqua !important;
      pointer-events: none;
    }

    /* Fokus-Highlight-Rect  */
    .focus-highlight {
      stroke: black;
  fill: rgba(65, 65, 65, 0.2);      
  stroke-width: 3px;
  outline-offset: 4px;
}
    /* Abfluss */
    @keyframes drain {
      0% {
        transform: translate(0, 0) scale(1);
        opacity: 1;
      }

      60% {
        transform: translate(var(--dx), var(--dy)) scale(0.3);
        opacity: 0.6;
      }

      100% {
        transform: translate(var(--dx), var(--dy)) scale(0);
        opacity: 0;
      }
    }

    .draining {
      animation: drain 0.7s ease-in forwards;
      pointer-events: none;
    }
  </style>
</head>

        <path id="wcag-hover" d="M1359.5,64.8c-2.6-5.3-7.2-8.4-9.5-15.4-4.7-11.9,7.4-24.6,19.7-25.3,15.1-3.2,27.6,14.6,21.9,28.3-2.1,6.1-9.6,9.5-9,16.5v5c.2,4.3-.7,8.6-.7,12.9,0,2.5.6,5.2-.5,7.5-.5,1-1.5,1-2,0-1-2.1-.6-4.7-.7-7.1-.1-2.6-.1-5.5,0-8.1,0,0-1.2-.2-1.4-.2-.4,0-1,.2-1.2.1,0,3.8.3,7.8,0,11.7,0,1.7,0,5-1.9,4.5-2.5-1.2-.7-13.2-1.1-16.3-.6-.2-1.9-.4-2.5-.4.4,2.3-.3,5.1-.4,7.4.1,2.5.5,5.1,0,7.6-.4,2.1-2.1,2.4-2.5.2-.9-4.6-.1-9.8-.3-14.5-.3-.2-1.7-.4-2.1-.3-.5,4.6-.2,9.5-.4,14.1-.3,2.3-2.6,2.4-3,0-.4-4.8-.4-9.8-.3-14.6,0,0-.6-11.2-1.8-13.9Z"/>

      <!-- 2. Hilfe-Icon -->
      <a href="6_Bad_1W.html" id="hilfe-btn" aria-label="Hilfe">
        <!-- Visuelle Elemente in <g>, damit a:hover>path nicht greift -->

          <path class="st1" d="M1449.3,51c0-17,22.6-18.9,22.6-1.1s-10.9,5.7-13.2,13.5c-.7,2.6-.4,8.3-.4,8.3"/>
          <path class="st4" d="M1461.1,77.5c-3.6-3.6-8.7,2.4-4.7,6.4,3.2,3.2,7.9-3.1,4.7-6.4Z"/>
        </g>
        <!-- Hover-Pfad (folgt der Kreis-Form) -->
        <path id="hilfe-hover" d="M1463.7,29.9c-10.9-2.1-27.2,5.2-32.1,15.6s-2.1,39,15.3,42.5c17.1,3.4,29.5,1.9,38.5-15s3.5-18-.9-26.4c-4.5-8.7-11.7-15-20.9-16.8Z"/>
      </a>

      <!-- 3. Menu/Übersicht-Icon -->
      <a href="levels.html" id="menu-btn" aria-label="Übersicht aller Levels">
        <!-- Visuelle Linien in <g> -->
        <g>
               <rect class="st6" x="1509.04" y="33.65" width="72.41" height="55.35" rx="5.9" ry="5.9"/>
<path class="st1" d="M1574.6,37.6c-20.1.8-41.5-.6-61.7.4"/>
          <path class="st1" d="M1574.6,58.8c-23.1,2.3-41,.9-61.7,0"/>
          <path class="st1" d="M1574.6,81.6c-20.8.1-40.9-2.3-61.7,0"/>
        </g>
        <!-- Klickfläche (Rect passt hier gut) -->
        <rect x="1506" y="28" width="76" height="60" rx="6"/>
      </a>
    </svg>
  </div>

  <script>
    const svg = document.getElementById('main-svg');

    function svgPoint(clientX, clientY) {
      const pt = svg.createSVGPoint();
      pt.x = clientX; pt.y = clientY;
      return pt.matrixTransform(svg.getScreenCTM().inverse());
    }

    function getCenter(el) {
      const bb = el.getBBox();
      return { x: bb.x + bb.width / 2, y: bb.y + bb.height / 2 };
    }

    // ── Maus-vs-Tastatur-Erkennung ──
    let usingMouse = false;
    document.addEventListener('mousedown', () => { usingMouse = true; });
    document.addEventListener('keydown', () => { usingMouse = false; });

    // ── Fokus-Highlight-Hilfsfunktionen ──
    function showHighlight(rectEl, targetEl, padding, tx, ty) {
      if (usingMouse) return;
      const p = padding ?? 8;
      const ox = tx ?? 0;
      const oy = ty ?? 0;
      const bb = targetEl.getBBox();
      rectEl.setAttribute('x', bb.x + ox - p);
      rectEl.setAttribute('y', bb.y + oy - p);
      rectEl.setAttribute('width', bb.width + p * 2);
      rectEl.setAttribute('height', bb.height + p * 2);
      rectEl.style.opacity = '1';
    }

    function hideHighlight(rectEl) {
      rectEl.style.opacity = '0';
    }

    // ── Grenze ──
    const gBB = document.getElementById('Grenze').getBBox();
    const BOUNDS = {
      minX: gBB.x, maxX: gBB.x + gBB.width,
      minY: gBB.y, maxY: gBB.y + gBB.height
    };

    // ── Abfluss ──
    const abflussCenter = getCenter(document.getElementById('Abfluss'));

    // ── Wesen-Daten ──
    const d1Wesen = ['wesen7', 'wesen6', 'wesen4', 'wesen2'].map(id => ({
      el: document.getElementById(id),
      origCenter: null, scale: 1, tx: 0, ty: 0,
      alive: true, phase: 'interact'   // phase: 'interact' | 'drain'
    }));

    const d2Wesen = ['wesen8', 'wesen5', 'wesen3', 'wesen1'].map(id => ({
      el: document.getElementById(id),
      origCenter: null, scale: 1, tx: 0, ty: 0,
      alive: true, phase: 'interact'
    }));

    const allWesen = [...d1Wesen, ...d2Wesen];
    allWesen.forEach(w => { w.origCenter = getCenter(w.el); });

    function applyTransform(w) {
      w.el.style.transform = `translate(${w.tx}px,${w.ty}px) scale(${w.scale})`;
    }

    let interactionsActive = true;
    let btn24Clicked = false;
    let btn44Clicked = false;
    let targetScale = 1;

    // ════════════════════════════════════════
    // PHASE 1: Wesen reagieren auf Maus & Tab
    // ════════════════════════════════════════

    const SHRINK_RADIUS = 200;
    const FLEE_RADIUS = 200;
    const FLEE_STRENGTH = 120;

    // D1 klein
    function updateD1(p) {
      d1Wesen.forEach(w => {
        if (!w.alive || w.phase !== 'interact') return;
        const dx = p.x - (w.origCenter.x + w.tx);
        const dy = p.y - (w.origCenter.y + w.ty);
        const dist = Math.sqrt(dx * dx + dy * dy);
        w.scale = 1 - (dist < SHRINK_RADIUS ? (1 - dist / SHRINK_RADIUS) * 0.9 : 0);
        applyTransform(w);
      });
    }

    // D2 weg
    function clampD2(w) {
      const bb = w.el.getBBox();
      const hw = bb.width / 2, hh = bb.height / 2;
      w.tx = Math.max(BOUNDS.minX - w.origCenter.x + hw,
        Math.min(BOUNDS.maxX - w.origCenter.x - hw, w.tx));
      w.ty = Math.max(BOUNDS.minY - w.origCenter.y + hh,
        Math.min(BOUNDS.maxY - w.origCenter.y - hh, w.ty));
    }

    function updateD2(p) {
      d2Wesen.forEach(w => {
        if (!w.alive || w.phase !== 'interact') return;
        const cx = w.origCenter.x + w.tx;
        const cy = w.origCenter.y + w.ty;
        const dx = cx - p.x, dy = cy - p.y;
        const dist = Math.sqrt(dx * dx + dy * dy);
        if (dist < FLEE_RADIUS && dist > 0) {
          const push = (1 - dist / FLEE_RADIUS) * FLEE_STRENGTH;
          w.tx += (dx / dist) * push;
          w.ty += (dy / dist) * push;
          clampD2(w);
        }
        applyTransform(w);
      });
    }

    // Maus-Events
    svg.addEventListener('mousemove', e => {
      if (!interactionsActive) return;
      const p = svgPoint(e.clientX, e.clientY);
      updateD1(p);
      updateD2(p);
    });

    svg.addEventListener('mouseleave', () => {
      if (!interactionsActive) return;
      d1Wesen.forEach(w => {
        if (w.alive && w.phase === 'interact') { w.scale = 1; applyTransform(w); }
      });
    });


    const wesenHighlight = document.getElementById('wesen-focus-highlight');

    allWesen.forEach(w => {
      w.el.addEventListener('focus', () => {
        if (!w.alive) return;
        showHighlight(wesenHighlight, w.el, 10, w.tx, w.ty);

        if (!interactionsActive) return;

        const center = { x: w.origCenter.x + w.tx, y: w.origCenter.y + w.ty };
        updateD1(center);
        updateD2(center);
      });

      w.el.addEventListener('blur', () => {
        hideHighlight(wesenHighlight);

        if (!interactionsActive) return;

        d1Wesen.forEach(d => {
          if (d.alive && d.phase === 'interact') { d.scale = 1; applyTransform(d); }
        });
      });


    });

    // ════════════════════════════════════════
    // Buttons
    // ════════════════════════════════════════
    const btn24El = document.getElementById('btn-24');
    const btn44El = document.getElementById('btn-44');
    const label24El = document.getElementById('label-24');
    const label44El = document.getElementById('label-44');
    const focusRect24 = document.getElementById('focus-btn-24');
    const focusRect44 = document.getElementById('focus-btn-44');

    showHighlight(focusRect24, btn24El, 6); hideHighlight(focusRect24);
    showHighlight(focusRect44, btn44El, 6); hideHighlight(focusRect44);

    function setupButton(btnEl, labelEl, focusRect, action) {
      const pathEl = btnEl.querySelector('path');
      const on = () => { pathEl.style.fill = 'rgba(65,65,65,0.15)'; labelEl.style.opacity = '1'; };
      const off = () => { pathEl.style.fill = 'transparent'; labelEl.style.opacity = '0'; };

      btnEl.addEventListener('mouseenter', on);
      btnEl.addEventListener('mouseleave', off);
      btnEl.addEventListener('focus', () => { on(); showHighlight(focusRect, btnEl, 6); });
      btnEl.addEventListener('blur', () => { off(); hideHighlight(focusRect); });
      btnEl.addEventListener('click', action);
      btnEl.addEventListener('keydown', e => {
        if (e.key === 'Enter' || e.key === ' ') { e.preventDefault(); action(); }
      });
    }

    function applyScaleToAll(s) {
      targetScale = s;
      allWesen.forEach(w => {
        if (!w.alive) return;
        w.scale = s; applyTransform(w);
      });
    }

    setupButton(btn24El, label24El, focusRect24, () => {
      applyScaleToAll(0.35);
      btn24Clicked = true;
      checkBothClicked();
    });

    setupButton(btn44El, label44El, focusRect44, () => {
      applyScaleToAll(0.65);
      btn44Clicked = true;
      checkBothClicked();
    });

    function checkBothClicked() {
      if (!btn24Clicked || !btn44Clicked) return;
      interactionsActive = false;
      allWesen.forEach(w => {
        if (!w.alive) return;
        w.scale = targetScale;
        applyTransform(w);
      });
      enableAllClicks();
    }

    // ════════════════════════════════════════
    // PHASE 2: Abfluss 
    // ════════════════════════════════════════

    function drainWesen(w) {
      w.phase = 'drain';
      hideHighlight(wesenHighlight);
      const cx = w.origCenter.x + w.tx;
      const cy = w.origCenter.y + w.ty;
      const ddx = abflussCenter.x - cx;
      const ddy = abflussCenter.y - cy;
      const startTx = w.tx, startTy = w.ty, startScale = w.scale;
      const duration = 600;
      const t0 = performance.now();

      (function step(now) {
        const t = Math.min((now - t0) / duration, 1);
        const ease = t * t;
        w.el.style.transform = `translate(${startTx + ddx * ease}px,${startTy + ddy * ease}px) scale(${startScale * (1 - ease * 0.97)})`;
        if (t < 1) requestAnimationFrame(step);
        else w.el.style.display = 'none';
      })(performance.now());
    }

    function enableAllClicks() {
      allWesen.forEach((w, i) => {
        if (!w.alive) return;
        w.el.setAttribute('tabindex', String(12 + i));  // 12–19
        w.el.setAttribute('aria-label', 'Wesen entfernen');

        function remove() {
          if (!w.alive) return;
          w.alive = false;
          w.el.style.cursor = 'default';
          w.el.removeAttribute('tabindex');
          w.el.removeAttribute('role');
          w.el.removeEventListener('click', remove);
          w.el.removeEventListener('keydown', onKey);
          w.el.removeEventListener('focus', onFocus2);
          w.el.removeEventListener('blur', onBlur2);
          drainWesen(w);
          setTimeout(checkAllGone, 650);
        }

        function onKey(e) {
          if (e.key === 'Enter' || e.key === ' ') { e.preventDefault(); remove(); }
        }

        function onFocus2() { showHighlight(wesenHighlight, w.el, 10, w.tx, w.ty); }
        function onBlur2() { hideHighlight(wesenHighlight); }

        w.el.style.cursor = 'pointer';
        w.el.addEventListener('click', remove);
        w.el.addEventListener('keydown', onKey);
        w.el.addEventListener('focus', onFocus2);
        w.el.addEventListener('blur', onBlur2);
      });
    }

    function checkAllGone() {
      if (allWesen.every(w => !w.alive)) {
        document.getElementById('pfeil-btn').style.display = 'block';
        document.getElementById('zurueck-btn').style.display = 'block';
      }
    }
  </script>
