<!DOCTYPE html>
<html lang="de">

<head>
  <meta charset="UTF-8">
  <title>Keller 5</title>
  <link rel="stylesheet" href="image.css">
  <link rel="stylesheet" href="icons.css">
  <style>
    @font-face {
      font-family: 'Lex';
      src: url('fonts/Lexend_Regular.ttf') format('truetype');
    }

    body {
      font-family: 'Lex', sans-serif;
    }

    svg {
      border: none;
    }

    a:hover>path,
    a:hover>rect {
      fill: rgba(65, 65, 65, 0.7) !important;
    }

    a:focus-visible {
      outline: none;
    }

    a:focus-visible>path,
    a:focus-visible>rect {
      stroke: #005fcc;
      fill: rgba(0, 95, 204, 0.08);
      stroke-width: 3px;
      filter: drop-shadow(0 0 4px #005fcc) drop-shadow(0 0 8px rgba(0, 95, 204, 0.4));
    }

    #wesen-link>path {
      fill: transparent;
      pointer-events: all;
    }

    #wesen-link:hover>path,
    #wesen-link:focus-visible>path {
      fill: rgba(65, 65, 65, 0.7) !important;
    }

    /* Dialog */


    .d-feld {
      fill: #fff;
      stroke: #1d1e1c;
      stroke-width: 3px;
      stroke-linecap: round;
      stroke-linejoin: round;
    }

    .d-zu-shape {
      fill: #fff;
      stroke: #000;
      stroke-width: 3px;
      stroke-miterlimit: 10;
    }

    .d-btn-shape {
      fill: #fff;
      stroke: #1d1e1c;
      stroke-width: 3px;
      stroke-linecap: round;
      stroke-linejoin: round;
    }


    .d-weiter-btn,
    .d-zu-btn {
      cursor: pointer;
    }

    a.d-zu-btn>path {
      pointer-events: all;
    }

    a.d-weiter-btn>path {
      fill: transparent;
      pointer-events: all;
    }

    a.d-weiter-btn:hover>path,
    a.d-weiter-btn:focus-visible>path {
      fill: rgba(65, 65, 65, 0.7) !important;
    }

    .room-wrapper {
      position: relative;
    }

    #html-dialog {
      display: none;
      position: fixed;
      inset: 0;
      z-index: 10001;
      pointer-events: none;
    }

    #html-dlg-close,
    #html-dlg-weiter {
      position: fixed;
      pointer-events: auto;
      opacity: 0;
      background: none;
      border: none;
      cursor: pointer;
      padding: 0;
      margin: 0;
    }

    #html-dlg-close {
      pointer-events: none;
    }
  </style>
</head>

        <path

        <path

  <!-- HTML-Dialog für Screenreader-Zugänglichkeit -->
  <div id="html-dialog" role="dialog" aria-modal="true" aria-label="Gespräch">
    <!-- dlgTextEl wird per JS hier eingefügt -->
    <button id="html-dlg-close" aria-label="Dialog schliessen">✕</button>
    <button id="html-dlg-weiter" aria-label="Weiter" hidden>Weiter</button>
  </div>

  <script>
    const DIALOGS = [
      {
        group: 'dlg-1',
        weiterId: 'dlg1-weiter',
        lines: ['dlg1-line1'],
        endX: { end: 1300, start: 300 },
        conversation: [
          { text: 'Weisst du wo Büro 146 ist?', align: 'end' },
          { text: 'Probiers mal oben.', align: 'start' },
          { text: 'Ok, danke.', align: 'end' },
        ],
      },
    ];

    let convStep = 0;
    let openerLink = null;

    const overlayGroup = document.getElementById('dialog-overlay-group');
    const roomSvg = document.getElementById('room-svg');
    const htmlDialog = document.getElementById('html-dialog');
    const htmlDlgClose = document.getElementById('html-dlg-close');
    const htmlDlgWeiter = document.getElementById('html-dlg-weiter');

    var dlgTextEl = (function () {
      var el = document.getElementById('dlg1-text-html');
      if (!el) {
        el = document.createElement('p');
        el.id = 'dlg1-text-html';
        el.setAttribute('tabindex', '0');
        el.setAttribute('aria-live', 'polite');
        el.style.cssText = [
          'visibility:hidden', 'position:fixed', 'margin:0',
          "font-family:'Lex',sans-serif", 'font-size:1.8rem',
          'color:#000', 'line-height:1.3', 'overflow-y:auto', 'overflow-x:hidden',
          'z-index:10001', 'box-sizing:border-box', 'padding:4px 10px',
          'pointer-events:auto'
        ].join(';');
        // In den HTML-Dialog einfügen (vor den Buttons)
        htmlDialog.insertBefore(el, htmlDlgClose);
      }
      return el;
    })();

    function positionDialogText() {
      var svg = document.getElementById('room-svg');
      if (!svg || !dlgTextEl) return;
      var r = svg.getBoundingClientRect();
      var sx = r.width / 1600;
      var sy = r.height / 900;
      dlgTextEl.style.left = (r.left + 240 * sx) + 'px';
      dlgTextEl.style.top = (r.top + 295 * sy) + 'px';
      dlgTextEl.style.width = (910 * sx) + 'px';
      dlgTextEl.style.maxHeight = Math.max(30, 150 * sy) + 'px';
    }

    function positionDialogButtons() {
      var svg = document.getElementById('room-svg');
      if (!svg) return;
      var r = svg.getBoundingClientRect();
      var sx = r.width / 1600;
      var sy = r.height / 900;

      htmlDlgClose.style.left = (r.left + (153 - 38) * sx) + 'px';
      htmlDlgClose.style.top = (r.top + (210 - 38) * sy) + 'px';
      htmlDlgClose.style.width = (76 * sx) + 'px';
      htmlDlgClose.style.height = (76 * sy) + 'px';

      htmlDlgWeiter.style.left = (r.left + 1192 * sx) + 'px';
      htmlDlgWeiter.style.top = (r.top + 415 * sy) + 'px';
      htmlDlgWeiter.style.width = (212 * sx) + 'px';
      htmlDlgWeiter.style.height = (57 * sy) + 'px';
    }

    window.addEventListener('resize', function () {
      if (isDialogOpen()) { positionDialogText(); positionDialogButtons(); }
    });
    window.addEventListener('scroll', function () {
      if (isDialogOpen()) { positionDialogText(); positionDialogButtons(); }
    });

    function isDialogOpen() {
      return overlayGroup.getAttribute('display') !== 'none';
    }

    function renderLines(def) {
      const entry = def.conversation[convStep - 1];
      dlgTextEl.textContent = entry.text;
      dlgTextEl.style.textAlign = entry.align === 'end' ? 'right' : 'left';
      dlgTextEl.style.visibility = 'visible';
      const w = document.getElementById(def.weiterId);
      if (w) w.setAttribute('visibility', convStep >= def.conversation.length ? 'hidden' : 'visible');
      if (convStep < def.conversation.length) {
        htmlDlgWeiter.removeAttribute('hidden');
      } else {
        htmlDlgWeiter.setAttribute('hidden', '');
      }
      htmlDlgClose.tabIndex = (convStep >= def.conversation.length) ? 0 : -1;
    }

    function openDialog(opener) {
      openerLink = opener;
      convStep = 1;
      const def = DIALOGS[0];
      document.getElementById(def.group).setAttribute('visibility', 'visible');
      renderLines(def);
      positionDialogText();
      positionDialogButtons();
      overlayGroup.setAttribute('display', 'inline');
      htmlDialog.style.display = 'block';
      setTimeout(function () {
        dlgTextEl.focus({ preventScroll: true });
      }, 50);
    }

    function closeDialog() {
      overlayGroup.setAttribute('display', 'none');
      document.getElementById(DIALOGS[0].group).setAttribute('visibility', 'hidden');
      dlgTextEl.style.visibility = 'hidden';
      dlgTextEl.textContent = '';
      htmlDialog.style.display = 'none';
      htmlDlgWeiter.setAttribute('hidden', '');
      convStep = 0;
      if (openerLink) openerLink.focus();
      const pfeil = document.getElementById('pfeil-link');
      pfeil.style.visibility = 'visible';
      pfeil.style.pointerEvents = 'auto';
    }

    function advanceConversation() {
      const def = DIALOGS[0];
      if (convStep < def.conversation.length) {
        convStep++;
        renderLines(def);
        setTimeout(function () {
          dlgTextEl.focus({ preventScroll: true });
        }, 50);
      } else {
        closeDialog();
      }
    }

    htmlDlgClose.addEventListener('click', closeDialog);
    htmlDlgWeiter.addEventListener('click', advanceConversation);
    (function () {
      var zuPath = document.querySelector('.d-zu-shape');
      var weiterPath = document.querySelector('.d-btn-shape');
      var HOVER_FILL = 'rgba(65,65,65,0.7)';
      if (htmlDlgWeiter && weiterPath) {
        htmlDlgWeiter.addEventListener('mouseenter', function () { weiterPath.style.fill = HOVER_FILL; });
        htmlDlgWeiter.addEventListener('mouseleave', function () { weiterPath.style.fill = ''; });
      }
      if (htmlDlgWeiter && weiterPath) {
        htmlDlgWeiter.addEventListener('focus', function () {
          if (!this.matches(':focus-visible')) return;
          weiterPath.style.fill = 'rgba(0,95,204,0.08)';
          weiterPath.style.stroke = '#005fcc';
          weiterPath.style.strokeWidth = '3px';
          weiterPath.style.filter = 'drop-shadow(0 0 4px #005fcc) drop-shadow(0 0 8px rgba(0,95,204,0.4))';
        });
        htmlDlgWeiter.addEventListener('blur', function () {
          weiterPath.style.fill = '';
          weiterPath.style.stroke = '';
          weiterPath.style.strokeWidth = '';
          weiterPath.style.filter = '';
        });
      }

      if (htmlDlgClose && zuPath) {
        htmlDlgClose.addEventListener('focus', function () {
          if (!this.matches(':focus-visible')) return;
          zuPath.style.fill = 'rgba(0,95,204,0.08)';
          zuPath.style.stroke = '#005fcc';
          zuPath.style.strokeWidth = '3px';
          zuPath.style.filter = 'drop-shadow(0 0 4px #005fcc) drop-shadow(0 0 8px rgba(0,95,204,0.4))';
        });
        htmlDlgClose.addEventListener('blur', function () {
          zuPath.style.fill = '';
          zuPath.style.stroke = '';
          zuPath.style.strokeWidth = '';
          zuPath.style.filter = '';
        });
      }
    })();

    document.getElementById('wesen-link').addEventListener('click', function (e) {
      e.preventDefault();
      openDialog(this);
    });

    roomSvg.addEventListener('click', function (e) {
      if (!isDialogOpen()) return;
      if (e.target.closest('.d-weiter-btn')) { e.preventDefault(); advanceConversation(); return; }
      if (e.target.closest('.d-zu-btn')) { e.preventDefault(); closeDialog(); return; }
    });

    document.addEventListener('keydown', function (e) {
      if (!isDialogOpen()) return;
      if (e.key === 'Escape') { closeDialog(); return; }
      if (e.key === 'Tab') {

        var tabbable = htmlDlgWeiter.hasAttribute('hidden')
          ? [dlgTextEl, htmlDlgClose]
          : [dlgTextEl, htmlDlgWeiter];
        var first = tabbable[0], last = tabbable[tabbable.length - 1];
        if (e.shiftKey) {
          if (document.activeElement === first) { e.preventDefault(); last.focus(); }
        } else {
          if (document.activeElement === last) { e.preventDefault(); first.focus(); }
        }
      }
    });
  </script>

  <script>
    window.LEVEL_CONFIG = {
      hilfeUrl: '2_Keller_5H.html',
      menuUrl: 'levels.html',
    };

  <script src="icons.js"></script>

  <script>
    (function () {
      var btn_2_Keller_6_html = document.getElementById("pfeil-link");
      if (btn_2_Keller_6_html) {
        btn_2_Keller_6_html.addEventListener("click", function () { window.location.href = "2_Keller_6.html"; });
      }
      document.addEventListener("keydown", function (e) {
        if (e.key !== "Enter" && e.key !== " ") return;
        if (btn_2_Keller_6_html && document.activeElement === btn_2_Keller_6_html) {
          e.preventDefault(); window.location.href = "2_Keller_6.html"; return;
        }
      });
    })();
  </script>
