<!doctype html>
<html lang="de">

<head>
  <meta charset="UTF-8" />
  <title>Info Zoom</title>
  <link rel="stylesheet" href="image.css">
  <link rel="stylesheet" href="icons.css">
  <style>
    @font-face {
      font-family: 'Lexend';
      src: url('fonts/Lexend-Regular.ttf') format('truetype');
    }

    body {
      background-color: rgb(0, 200, 0);
      font-family: 'Lexend', sans-serif;
    }

    svg {
      border: 0cm solid rgba(0, 0, 0, 0.6);
    }

    /* SVG overlay close button */
    a>path,
    a>rect {
      fill: transparent;
      pointer-events: all;
    }

    a:hover>path,
    a:hover>rect {
      fill: rgba(65, 65, 65, 0.7) !important;
    }

    a:focus {
      outline: none;
    }

    a:focus>path,
    a:focus>rect {
      stroke: black;
      fill: rgba(65, 65, 65, 0.2);
      stroke-width: 3px;
      filter: drop-shadow(0 0 6px rgb(0, 0, 0)) drop-shadow(0 0 6px rgb(0, 0, 0));
    }

    /* Weiter-Button SVG-Overlay */
    .weiter-svg {
      position: absolute;
      inset: 0;
      width: 100%;
      height: 100%;
      z-index: 11;
      pointer-events: none;
    }

    /* Weiter-Button Pfad */
    .weiter-path {
      fill: white;
      stroke: black;
      stroke-width: 3px;
      pointer-events: all;
      cursor: pointer;
    }

    .d-weiter-btn:hover .weiter-path,
    .d-weiter-btn:focus-visible .weiter-path {
      fill: rgba(65, 65, 65, 0.7);
    }

    /* text SVG overlay */
    .text-svg {
      position: absolute;
      inset: 0;
      width: 100%;
      height: 100%;
      z-index: 5;
      pointer-events: none;
    }

    /* SVG text styles — defined in CSS so pt units behave like Howto_1 */
    .text-svg .svg-h1 {
      font-family: 'Lexend', sans-serif;
      font-size: 4.5vw;
      font-weight: 700;
      fill: #1a1a1a;
    }

    .text-svg .svg-p {
      font-family: 'Lexend', sans-serif;
      font-size: 2vw;
      fill: #1a1a1a;
       margin: 0 0 1.5em 0;

    }
  </style>
</head>

<body>
  <div class="room-wrapper">
    <img src="img/Info_3.svg" alt="Infofenster, mit vier Icons." class="responsive-img" tabindex="0" />

    <!-- ── text overlay in SVG coordinate space ── -->
    <svg class="text-svg" viewBox="0 0 1600 900" preserveAspectRatio="xMidYMid meet" xmlns="http://www.w3.org/2000/svg">
      <!-- Header -->
      <text class="svg-h1" x="430" y="184">Instruktionen</text>
      <!-- Para 1 -->
      <text class="svg-p" x="430" y="280">Du musst auf dem Amt in Büro 146 etwas holen.</text>
      <!-- Para 2 -->
      <text class="svg-p">
        <tspan x="550" y="400">Wenn das gelbe Wesen erscheint, musst du </tspan>
        <tspan x="550" dy="35">etwas lernen, um weiterzukommen. Als Quelle </tspan>
        <tspan x="550" dy="35">sind die WCAG, die «Web Content Accessibility </tspan>
        <tspan x="550" dy="35">Guidelines» verlinkt.</tspan>
      </text>
      <!-- Para 3: near Hilfe icon (~y 595) -->
      <text class="svg-p" x="550" y="608">Hier gibt es Hilfe.</text>
      <!-- Para 4: near Levels icon (~y 687) -->
      <text class="svg-p" x="550" y="697">Hier kannst du die einzelnen Levels sehen.</text>
    </svg>

    <svg class="weiter-svg" viewBox="0 0 1600 900" preserveAspectRatio="xMidYMid meet">
      <a class="d-weiter-btn" href="1_Haus_1.html" id="dlg1-weiter" role="button" aria-label="Start">
        <g transform="translate(-200, 0)">
          <path class="weiter-path"
            d="M1192,841.7c70.8-2.1,141.4.4,212.2-3.5l4.7-56.1c-33.8-9.6-74.7,1.1-109.2.6-41.5,0-65-2.3-108.7-.8l1.1,59.8Z" />
          <text font-family="Lex,sans-serif" font-size="25" fill="#000" text-anchor="middle" x="1300"
            y="820">Start</text>
        </g>
      </a>
    </svg>
  </div>


</body>

</html>
